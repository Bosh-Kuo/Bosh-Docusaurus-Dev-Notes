<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Top row: source file -> arrow -> destination file -->
  <rect x="20" y="24" width="100" height="40" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="70" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#374151">source</text>
  <text x="70" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#374151">file</text>

  <line x1="120" y1="44" x2="638" y2="44" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="640" y="24" width="100" height="40" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="690" y="40" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#374151">destination</text>
  <text x="690" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#374151">file</text>

  <!-- Step list box -->
  <rect x="140" y="76" width="480" height="388" rx="4" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Header -->
  <text x="380" y="102" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">Example System-Call Sequence</text>

  <!-- Steps -->
  <text x="168" y="126" font-family="sans-serif" font-size="12" fill="#374151">Acquire input file name</text>
  <text x="198" y="144" font-family="sans-serif" font-size="12" fill="#374151">Write prompt to screen</text>
  <text x="198" y="160" font-family="sans-serif" font-size="12" fill="#374151">Accept input</text>

  <text x="168" y="180" font-family="sans-serif" font-size="12" fill="#374151">Acquire output file name</text>
  <text x="198" y="198" font-family="sans-serif" font-size="12" fill="#374151">Write prompt to screen</text>
  <text x="198" y="214" font-family="sans-serif" font-size="12" fill="#374151">Accept input</text>

  <text x="168" y="234" font-family="sans-serif" font-size="12" fill="#374151">Open the input file</text>
  <text x="198" y="250" font-family="sans-serif" font-size="12" fill="#6b7280" font-style="italic">if file doesn't exist, abort</text>

  <text x="168" y="270" font-family="sans-serif" font-size="12" fill="#374151">Create output file</text>
  <text x="198" y="286" font-family="sans-serif" font-size="12" fill="#6b7280" font-style="italic">if file exists, abort</text>

  <!-- Loop bracket region -->
  <rect x="156" y="300" width="454" height="76" rx="2" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="168" y="318" font-family="sans-serif" font-size="12" fill="#374151">Loop</text>
  <text x="198" y="336" font-family="sans-serif" font-size="12" fill="#374151">Read from input file</text>
  <text x="198" y="352" font-family="sans-serif" font-size="12" fill="#374151">Write to output file</text>
  <text x="168" y="370" font-family="sans-serif" font-size="12" fill="#374151">Until read fails</text>

  <text x="168" y="396" font-family="sans-serif" font-size="12" fill="#374151">Close output file</text>
  <text x="168" y="414" font-family="sans-serif" font-size="12" fill="#374151">Write completion message to screen</text>
  <text x="168" y="432" font-family="sans-serif" font-size="12" fill="#374151">Terminate normally</text>
</svg>
