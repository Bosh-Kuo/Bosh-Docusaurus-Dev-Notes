  <text x="120" y="178" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#d97706">•</text>
  <text x="120" y="196" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#d97706">•</text>

  <!-- Layer 0 (innermost) -->
