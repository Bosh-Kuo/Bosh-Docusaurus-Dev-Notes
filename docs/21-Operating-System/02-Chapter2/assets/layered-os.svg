  <text x="240" y="176" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1d4ed8">layer 0</text>
  <text x="240" y="194" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">hardware</text>
