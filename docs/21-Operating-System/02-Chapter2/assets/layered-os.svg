  <text x="38" y="42" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6b7280">layer N</text>
  <text x="38" y="58" font-family="sans-serif" font-size="11" fill="#9ca3af">user interface</text>

  <!-- Dots between Layer N ring and Layer 1 -->
  <text x="56" y="148" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">•</text>
  <text x="56" y="168" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">•</text>
  <text x="56" y="188" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">•</text>

  <!-- Layer 1 -->
  <rect x="90" y="90" width="300" height="140" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="108" y="115" font-family="sans-serif" font-size="12" font-weight="bold" fill="#92400e">layer 1</text>

  <!-- Dots between Layer 1 ring and Layer 0 -->
