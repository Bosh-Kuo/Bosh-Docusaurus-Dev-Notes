<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 415" width="640" height="415">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- (the users) box -->
  <rect x="80" y="10" width="480" height="38" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" rx="2"/>
  <text x="320" y="34" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">(the users)</text>

  <!-- System programs box -->
  <rect x="80" y="58" width="480" height="58" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" rx="2"/>
  <text x="320" y="77" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151">shells and commands</text>
  <text x="320" y="93" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151">compilers and interpreters</text>
  <text x="320" y="108" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151">system libraries</text>

  <!-- system-call interface label + line -->
  <text x="320" y="122" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">system-call interface to the kernel</text>
  <line x1="80" y1="127" x2="560" y2="127" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- "kernel" rotated side label -->
  <text x="42" y="228" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#92400e" transform="rotate(-90, 42, 228)">kernel</text>

  <!-- Kernel outer box -->
  <rect x="80" y="132" width="480" height="195" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" rx="2"/>

  <!-- Kernel vertical grid lines -->
  <line x1="240" y1="132" x2="240" y2="327" stroke="#d97706" stroke-width="1"/>
  <line x1="400" y1="132" x2="400" y2="327" stroke="#d97706" stroke-width="1"/>

  <!-- Kernel horizontal grid lines -->
  <line x1="80" y1="197" x2="560" y2="197" stroke="#d97706" stroke-width="1"/>
  <line x1="80" y1="262" x2="560" y2="262" stroke="#d97706" stroke-width="1"/>

  <!-- Row 1 cells -->
  <text x="160" y="158" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">signals terminal</text>
  <text x="160" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">handling</text>
  <text x="320" y="165" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">file system</text>
  <text x="480" y="165" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">CPU scheduling</text>

  <!-- Row 2 cells -->
  <text x="160" y="227" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">character I/O system</text>
  <text x="320" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">swapping block</text>
  <text x="320" y="236" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">I/O system</text>
  <text x="480" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">page replacement</text>
  <text x="480" y="236" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">demand paging</text>

  <!-- Row 3 cells -->
  <text x="160" y="292" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">terminal drivers</text>
  <text x="320" y="292" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">disk and tape drivers</text>
  <text x="480" y="292" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">virtual memory</text>

  <!-- kernel interface to hardware label + line -->
  <line x1="80" y1="332" x2="560" y2="332" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="320" y="344" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">kernel interface to the hardware</text>

  <!-- Hardware boxes -->
  <rect x="80" y="352" width="148" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  <text x="154" y="372" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">terminal controllers</text>
  <text x="154" y="387" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">terminals</text>

  <rect x="246" y="352" width="148" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  <text x="320" y="372" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">device controllers</text>
  <text x="320" y="387" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">disks and tapes</text>

  <rect x="412" y="352" width="148" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  <text x="486" y="372" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">memory controllers</text>
  <text x="486" y="387" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">physical memory</text>
</svg>
