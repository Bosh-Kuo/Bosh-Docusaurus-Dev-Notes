<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="500" height="340">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── (a) System Startup ── -->
  <text x="125" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">(a) At system startup</text>

  <!-- Memory bar (a) -->
  <rect x="60" y="40" width="130" height="240" rx="4" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Free memory region (large, top) -->
  <rect x="60" y="40" width="130" height="192" rx="0" fill="#f3f4f6" stroke="none"/>
  <rect x="60" y="40" width="130" height="192" rx="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="125" y="130" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">free</text>
  <text x="125" y="148" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">memory</text>

  <!-- Boot loader region (bottom) -->
  <rect x="60" y="232" width="130" height="48" rx="0" fill="#fef3c7" stroke="none"/>
  <rect x="60" y="232" width="130" height="48" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <text x="125" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e">boot</text>
  <text x="125" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e">loader</text>

  <!-- Memory boundary divider between regions -->
  <line x1="60" y1="232" x2="190" y2="232" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- ── (b) Running a Sketch ── -->
  <text x="375" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">(b) Running a sketch</text>

  <!-- Memory bar (b) -->
  <rect x="310" y="40" width="130" height="240" rx="4" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Free memory region (smaller, top) -->
  <rect x="310" y="40" width="130" height="80" rx="0" fill="#f3f4f6" stroke="none"/>
  <rect x="310" y="40" width="130" height="80" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="375" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b7280">free memory</text>

  <!-- Sketch (user program) region (middle) -->
  <rect x="310" y="120" width="130" height="112" rx="0" fill="#dcfce7" stroke="none"/>
  <rect x="310" y="120" width="130" height="112" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="375" y="168" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d">user program</text>
  <text x="375" y="184" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d">(sketch)</text>

  <!-- Boot loader region (bottom) -->
  <rect x="310" y="232" width="130" height="48" rx="0" fill="#fef3c7" stroke="none"/>
  <rect x="310" y="232" width="130" height="48" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <text x="375" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e">boot</text>
  <text x="375" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e">loader</text>

  <!-- Dividers (b) -->
  <line x1="310" y1="120" x2="440" y2="120" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="310" y1="232" x2="440" y2="232" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Memory end caps -->
  <rect x="60" y="40" width="130" height="240" rx="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="310" y="40" width="130" height="240" rx="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="20" y="302" width="14" height="14" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="40" y="313" font-family="sans-serif" font-size="11" fill="#374151">Boot loader (persistent)</text>
  <rect x="230" y="302" width="14" height="14" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="250" y="313" font-family="sans-serif" font-size="11" fill="#374151">Sketch loaded into flash memory</text>
</svg>
