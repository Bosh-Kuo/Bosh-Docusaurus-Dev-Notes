<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 490" width="520" height="490">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- applications (large light-blue box) -->
  <rect x="60" y="10" width="400" height="88" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  <text x="148" y="62" font-family="sans-serif" font-size="15" text-anchor="middle" fill="#1d4ed8">applications</text>

  <!-- glibc (grey sub-box inside applications, bottom-right) -->
  <rect x="228" y="38" width="226" height="52" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" rx="2"/>
  <text x="341" y="62" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151">glibc standard c library</text>

  <!-- Left arrow: from applications area directly down -->
  <line x1="150" y1="98" x2="150" y2="126" stroke="#374151" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Right arrow: from glibc down -->
  <line x1="341" y1="90" x2="341" y2="126" stroke="#374151" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- system-call interface -->
  <rect x="60" y="128" width="400" height="44" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="260" y="155" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#374151">system-call interface</text>

  <!-- Two arrows down from system-call interface -->
  <line x1="150" y1="172" x2="150" y2="198" stroke="#374151" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="341" y1="172" x2="341" y2="198" stroke="#374151" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Kernel area: 2×3 grid + device drivers -->
  <!-- Background for 2×3 grid rows -->
  <rect x="60" y="200" width="400" height="192" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="2"/>

  <!-- Vertical divider inside grid -->
  <line x1="260" y1="200" x2="260" y2="392" stroke="#2563eb" stroke-width="1"/>
  <!-- Horizontal dividers inside grid -->
  <line x1="60" y1="264" x2="460" y2="264" stroke="#2563eb" stroke-width="1"/>
  <line x1="60" y1="328" x2="460" y2="328" stroke="#2563eb" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="160" y="227" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">file</text>
  <text x="160" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">systems</text>
  <text x="360" y="227" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">CPU</text>
  <text x="360" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">scheduler</text>

  <!-- Row 2 -->
  <text x="160" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">networks</text>
  <text x="160" y="306" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">(TCP/IP)</text>
  <text x="360" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">memory</text>
  <text x="360" y="306" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">manager</text>

  <!-- Row 3 -->
  <text x="160" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">block</text>
  <text x="160" y="366" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">devices</text>
  <text x="360" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">character</text>
  <text x="360" y="366" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">devices</text>

  <!-- device drivers (grey, inside kernel area outer border) -->
  <rect x="60" y="392" width="400" height="44" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="260" y="419" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#374151">device drivers</text>

  <!-- Two arrows from device drivers down -->
  <line x1="150" y1="436" x2="150" y2="460" stroke="#374151" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="341" y1="436" x2="341" y2="460" stroke="#374151" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- hardware -->
  <rect x="60" y="462" width="400" height="20" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="260" y="477" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#374151">hardware</text>
</svg>
