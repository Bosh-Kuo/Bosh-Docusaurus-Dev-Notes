<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 440" width="340" height="440">
  <!-- Memory bar -->
  <text x="190" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b7280">high memory</text>

  <!-- Kernel (top, blue) -->
  <rect x="100" y="30" width="180" height="60" rx="0" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="55" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8">kernel</text>
  <text x="190" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2563eb">(always in memory)</text>

  <!-- Free memory -->
  <rect x="100" y="90" width="180" height="50" rx="0" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="190" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b7280">free memory</text>

  <!-- Process C -->
  <rect x="100" y="140" width="180" height="52" rx="0" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="190" y="162" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6d28d9">process C</text>
  <text x="190" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">(background)</text>

  <!-- Interpreter (shell) — highlighted -->
  <rect x="100" y="192" width="180" height="52" rx="0" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="190" y="214" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d">interpreter</text>
  <text x="190" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#16a34a">(shell — running)</text>

  <!-- Process B -->
  <rect x="100" y="244" width="180" height="52" rx="0" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="190" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6d28d9">process B</text>
  <text x="190" y="282" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">(background)</text>

  <!-- Process D (low memory) -->
  <rect x="100" y="296" width="180" height="52" rx="0" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="190" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6d28d9">process D</text>
  <text x="190" y="334" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">(background)</text>

  <!-- Border of whole memory bar -->
  <rect x="100" y="30" width="180" height="318" rx="4" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- High / Low memory labels -->
  <text x="190" y="368" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6b7280">low memory</text>

  <!-- Legend -->
  <rect x="30" y="395" width="12" height="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="48" y="405" font-family="sans-serif" font-size="11" fill="#374151">Kernel</text>
  <rect x="120" y="395" width="12" height="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="138" y="405" font-family="sans-serif" font-size="11" fill="#374151">Shell (interpreter)</text>
  <rect x="255" y="395" width="12" height="12" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="273" y="405" font-family="sans-serif" font-size="11" fill="#374151">Processes</text>
</svg>
