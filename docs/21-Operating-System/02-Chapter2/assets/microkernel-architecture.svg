<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 450" width="590" height="450">
  <defs>
    <!-- Standard arrowhead (for marker-end) -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Reversed arrowhead (for marker-start on bidirectional arrows) -->
    <marker id="arr-rev" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── User-mode boxes ── -->
  <rect x="28" y="10" width="148" height="76" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="102" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">application</text>
  <text x="102" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">program</text>

  <rect x="208" y="10" width="124" height="76" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="270" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">file</text>
  <text x="270" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">system</text>

  <rect x="366" y="10" width="138" height="76" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="435" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">device</text>
  <text x="435" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">driver</text>

  <!-- "user mode" right bracket -->
  <line x1="528" y1="10" x2="528" y2="86" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="518" y1="10" x2="528" y2="10" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="518" y1="86" x2="528" y2="86" stroke="#6b7280" stroke-width="1.5"/>
  <text x="540" y="44" font-family="sans-serif" font-size="10" fill="#6b7280">user</text>
  <text x="540" y="58" font-family="sans-serif" font-size="10" fill="#6b7280">mode</text>

  <!-- ── Dotted lines from dashed-rect UP to user boxes (arrowheads pointing up) ── -->
  <line x1="102" y1="140" x2="102" y2="86" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="270" y1="140" x2="270" y2="86" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="435" y1="140" x2="435" y2="86" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ── Kernel area (large light-blue box) ── -->
  <rect x="28" y="126" width="486" height="210" fill="#e0f2fe" stroke="#2563eb" stroke-width="1.5" rx="2"/>

  <!-- Dashed message-passing rectangle at top of kernel (connecting the three vertical lines) -->
  <rect x="88" y="133" width="362" height="16" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- "messages" labels on the dashed rectangle -->
  <text x="186" y="145" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">messages</text>
  <text x="352" y="145" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">messages</text>

  <!-- ── Three ovals inside kernel ── -->
  <!-- interprocess communication -->
  <ellipse cx="112" cy="228" rx="80" ry="40" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="112" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">interprocess</text>
  <text x="112" y="237" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">communication</text>

  <!-- memory management -->
  <ellipse cx="280" cy="228" rx="82" ry="40" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="280" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">memory</text>
  <text x="280" y="237" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">management</text>

  <!-- CPU scheduling -->
  <ellipse cx="450" cy="228" rx="62" ry="40" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">CPU</text>
  <text x="450" y="237" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1d4ed8">scheduling</text>

  <!-- "microkernel" label at bottom of kernel area -->
  <text x="280" y="322" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">microkernel</text>

  <!-- "kernel mode" right bracket -->
  <line x1="528" y1="126" x2="528" y2="336" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="518" y1="126" x2="528" y2="126" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="518" y1="336" x2="528" y2="336" stroke="#6b7280" stroke-width="1.5"/>
  <text x="540" y="224" font-family="sans-serif" font-size="10" fill="#6b7280">kernel</text>
  <text x="540" y="238" font-family="sans-serif" font-size="10" fill="#6b7280">mode</text>

  <!-- ── Bidirectional arrows: kernel ↕ hardware (60px gap avoids diamond overlap) ── -->
  <line x1="152" y1="337" x2="152" y2="397" stroke="#374151" stroke-width="1.5" marker-start="url(#arr-rev)" marker-end="url(#arr)"/>
  <line x1="420" y1="337" x2="420" y2="397" stroke="#374151" stroke-width="1.5" marker-start="url(#arr-rev)" marker-end="url(#arr)"/>

  <!-- ── Hardware box ── -->
  <rect x="28" y="400" width="486" height="38" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="280" y="424" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#374151">hardware</text>
</svg>
