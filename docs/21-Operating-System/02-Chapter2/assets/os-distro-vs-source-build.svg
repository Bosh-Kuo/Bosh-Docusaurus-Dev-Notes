<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 385" width="640" height="385">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Left column header: Build from Source (green) -->
  <rect x="20" y="10" width="265" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="152" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#14532d">Build from Source</text>
  <text x="152" y="43" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#16a34a">(you run every step yourself)</text>

  <!-- Right column header: Install Pre-built Distro (purple) -->
  <rect x="355" y="10" width="265" height="40" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="487" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4c1d95">Install Pre-built Distro</text>
  <text x="487" y="43" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed">(distro maintainers ran the steps for you)</text>

  <!-- LEFT: Box 1 - Obtain Source Code -->
  <rect x="38" y="64" width="228" height="34" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="152" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">Obtain Source Code</text>

  <line x1="152" y1="98" x2="152" y2="110" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LEFT: Box 2 - Configure -->
  <rect x="38" y="114" width="228" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="152" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#14532d">make menuconfig</text>
  <text x="152" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#16a34a">generate .config file</text>

  <line x1="152" y1="148" x2="152" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LEFT: Box 3 - Compile -->
  <rect x="38" y="164" width="228" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="152" y="182" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#14532d">make + make modules</text>
  <text x="152" y="194" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#16a34a">compile kernel and drivers</text>

  <line x1="152" y1="198" x2="152" y2="210" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LEFT: Box 4 - OS Binary (amber highlight, this is the compiled output) -->
  <rect x="38" y="214" width="228" height="34" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="152" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#92400e">OS Binary (vmlinuz)</text>
  <text x="152" y="243" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d97706">compiled output</text>

  <line x1="152" y1="248" x2="152" y2="260" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LEFT: Box 5 - Install to Disk -->
  <rect x="38" y="264" width="228" height="34" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="152" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">Install to Disk</text>

  <line x1="152" y1="298" x2="152" y2="314" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RIGHT: Ubuntu ISO box (tall, spans equivalent of left steps 1-4) -->
  <rect x="373" y="64" width="228" height="184" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <!-- ISO title -->
  <text x="487" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4c1d95">Ubuntu .iso</text>
  <!-- Inner dashed region showing what Canonical ran -->
  <rect x="386" y="92" width="202" height="148" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-dasharray="5,3" stroke-width="1"/>
  <text x="487" y="108" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#7c3aed">Canonical already ran:</text>
  <text x="487" y="124" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280">1. Obtain source code</text>
  <text x="487" y="139" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280">2. make menuconfig</text>
  <text x="487" y="154" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280">3. make + make modules</text>
  <text x="487" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280">4. Package as .iso image</text>
  <line x1="398" y1="178" x2="576" y2="178" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="487" y="192" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7c3aed" font-style="italic">.config: broad hardware support</text>
  <text x="487" y="206" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7c3aed" font-style="italic">for millions of different machines</text>
  <text x="487" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7c3aed" font-style="italic">same binary for all users</text>

  <line x1="487" y1="248" x2="487" y2="260" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RIGHT: Install box (aligned with left Box 5 at y=264) -->
  <rect x="373" y="264" width="228" height="34" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="487" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">Write to USB + Run Installer</text>
  <text x="487" y="293" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">copies pre-built OS to disk</text>

  <line x1="487" y1="298" x2="487" y2="314" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Common bottom box: OS Running on Hardware -->
  <rect x="120" y="318" width="400" height="42" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="337" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#14532d">OS Running on Hardware</text>
  <text x="320" y="352" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#16a34a">same end result — either path works</text>
</svg>
