<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 500" width="520" height="500">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── C Program code box ── -->
  <rect x="150" y="20" width="220" height="200" rx="4" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="168" y="44"  font-family="monospace" font-size="12" fill="#374151">#include &lt;stdio.h&gt;</text>
  <text x="168" y="62"  font-family="monospace" font-size="12" fill="#374151">int main()</text>
  <text x="168" y="78"  font-family="monospace" font-size="12" fill="#374151">{</text>
  <text x="178" y="95"  font-family="monospace" font-size="12" fill="#6b7280">  •</text>
  <text x="178" y="110" font-family="monospace" font-size="12" fill="#6b7280">  •</text>
  <text x="178" y="125" font-family="monospace" font-size="12" fill="#6b7280">  •</text>

  <!-- Highlighted printf line with bracket on left -->
  <rect x="158" y="131" width="204" height="20" rx="2" fill="#fef9c3" stroke="none"/>
  <!-- Left bracket indicator -->
  <line x1="162" y1="131" x2="162" y2="151" stroke="#374151" stroke-width="1.5"/>
  <line x1="162" y1="131" x2="170" y2="131" stroke="#374151" stroke-width="1.5"/>
  <line x1="162" y1="151" x2="170" y2="151" stroke="#374151" stroke-width="1.5"/>
  <text x="172" y="145" font-family="monospace" font-size="12" fill="#92400e">printf ("Greetings");</text>

  <text x="178" y="165" font-family="monospace" font-size="12" fill="#6b7280">  •</text>
  <text x="178" y="180" font-family="monospace" font-size="12" fill="#6b7280">  •</text>
  <text x="168" y="200" font-family="monospace" font-size="12" fill="#374151">  return 0;</text>
  <text x="168" y="215" font-family="monospace" font-size="12" fill="#374151">}</text>

  <!-- ── Arrow: printf line → C library (forward call, left-center of code box) ── -->
  <line x1="218" y1="220" x2="218" y2="258" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── User mode / Kernel mode labels ── -->
  <text x="22" y="268" font-family="sans-serif" font-size="11" fill="#6b7280">user</text>
  <text x="22" y="282" font-family="sans-serif" font-size="11" fill="#6b7280">mode</text>

  <!-- ── Standard C Library box — spans user/kernel boundary ── -->
  <rect x="80" y="258" width="360" height="44" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="260" y="285" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1d4ed8">standard C library</text>

  <!-- Dashed boundary line at bottom of C library box -->
  <line x1="80" y1="302" x2="440" y2="302" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="22" y="314" font-family="sans-serif" font-size="11" fill="#6b7280">kernel</text>
  <text x="22" y="328" font-family="sans-serif" font-size="11" fill="#6b7280">mode</text>

  <!-- ── Write() system call cloud (kernel area) ── -->
  <rect x="165" y="370" width="190" height="56" rx="28" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="394" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#15803d">write()</text>
  <text x="260" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d">system call</text>

  <!-- ── Left arc: C library → write() system call ── -->
  <!-- Curve: from bottom-left of C library (160, 302), bulges left, to left side of cloud (185, 370) -->
  <path d="M 160 302 Q 90 340 190 370" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- "write()" label to the left of this arc -->
  <text x="82" y="342" font-family="sans-serif" font-size="12" fill="#374151">write()</text>

  <!-- ── Right arc: write() system call → C library ── -->
  <!-- Curve: from right side of cloud (335, 370), bulges right, to bottom-right of C library (360, 302) -->
  <path d="M 330 370 Q 430 340 360 302" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Return arrow: C library right edge → back to printf line in code box ── -->
  <!-- Goes: up from right of C library (440, 258), then left to right edge of code box at printf level -->
  <line x1="440" y1="258" x2="440" y2="141" stroke="#374151" stroke-width="1.5"/>
  <line x1="440" y1="141" x2="374" y2="141" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
