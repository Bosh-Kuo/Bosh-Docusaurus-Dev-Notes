<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 295" width="440" height="295">

  <!-- applications -->
  <rect x="60" y="10" width="320" height="42" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="220" y="36" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#374151">applications</text>

  <!-- user experience -->
  <rect x="60" y="62" width="320" height="42" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="220" y="88" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#15803d">user experience</text>

  <!-- application frameworks -->
  <rect x="60" y="114" width="320" height="42" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="220" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#92400e">application frameworks</text>

  <!-- core frameworks -->
  <rect x="60" y="166" width="320" height="42" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="220" y="192" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#1d4ed8">core frameworks</text>

  <!-- kernel environment (Darwin) -->
  <rect x="60" y="218" width="320" height="52" rx="3" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="220" y="240" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#be185d">kernel environment</text>
  <text x="220" y="258" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#be185d">(Darwin)</text>
</svg>
