<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEFT panel: Message Passing Model -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="10" y="10" width="330" height="280" rx="6" fill="#fafafa" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="175" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151">Message Passing</text>

  <!-- Process A (sender) -->
  <rect x="30" y="60" width="100" height="50" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="80" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6d28d9">Process A</text>
  <text x="80" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">(sender)</text>

  <!-- OS Kernel (intermediary) -->
  <rect x="112" y="145" width="116" height="48" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="170" y="163" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d4ed8">OS Kernel</text>
  <text x="170" y="179" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2563eb">(routes message)</text>

  <!-- Process B (receiver) -->
  <rect x="210" y="60" width="100" height="50" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="260" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6d28d9">Process B</text>
  <text x="260" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">(receiver)</text>

  <!-- Arrow: A -> kernel -->
  <line x1="100" y1="102" x2="140" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="95" y="134" font-family="sans-serif" font-size="10" fill="#374151">send()</text>

  <!-- Arrow: kernel -> B -->
  <line x1="200" y1="145" x2="240" y2="102" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="222" y="128" font-family="sans-serif" font-size="10" fill="#374151">receive()</text>

  <!-- Characteristics -->
  <text x="30" y="224" font-family="sans-serif" font-size="11" fill="#374151">• OS mediates every message</text>
  <text x="30" y="242" font-family="sans-serif" font-size="11" fill="#374151">• Safer: no shared state to protect</text>
  <text x="30" y="260" font-family="sans-serif" font-size="11" fill="#374151">• Good for cross-machine IPC</text>
  <text x="30" y="278" font-family="sans-serif" font-size="11" fill="#374151">• Slower (kernel involvement each time)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- RIGHT panel: Shared Memory Model -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="380" y="10" width="330" height="280" rx="6" fill="#fafafa" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="545" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151">Shared Memory</text>

  <!-- Process A -->
  <rect x="400" y="60" width="100" height="50" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6d28d9">Process A</text>

  <!-- Shared memory region -->
  <rect x="487" y="145" width="116" height="48" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="545" y="163" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d">Shared</text>
  <text x="545" y="179" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#15803d">Memory</text>

  <!-- Process B -->
  <rect x="580" y="60" width="100" height="50" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="630" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6d28d9">Process B</text>

  <!-- Arrow: A <-> shared memory (bidirectional) -->
  <line x1="470" y1="102" x2="510" y2="145" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="140" x2="470" y2="104" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: B <-> shared memory (bidirectional) -->
  <line x1="610" y1="102" x2="580" y2="145" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="140" x2="610" y2="104" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Characteristics -->
  <text x="400" y="224" font-family="sans-serif" font-size="11" fill="#374151">• Processes read/write directly</text>
  <text x="400" y="242" font-family="sans-serif" font-size="11" fill="#374151">• Max speed (memory bandwidth)</text>
  <text x="400" y="260" font-family="sans-serif" font-size="11" fill="#374151">• Requires sync/lock mechanism</text>
  <text x="400" y="278" font-family="sans-serif" font-size="11" fill="#374151">• Best for same-machine, large data</text>
</svg>
