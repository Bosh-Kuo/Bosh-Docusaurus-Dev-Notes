<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 215" width="760" height="215"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr-v" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="10" y="8" width="12" height="12" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="26" y="19" fill="#64748b" font-size="11">Ready Queue Wait</text>
  <rect x="162" y="8" width="12" height="12" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="178" y="19" fill="#64748b" font-size="11">CPU Burst</text>
  <rect x="262" y="8" width="12" height="12" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="278" y="19" fill="#64748b" font-size="11">I/O Burst</text>

  <!-- Process lifecycle timeline bar (y=50 to y=92) -->
  <!-- Segment 1: Ready Queue Wait (x=55 to 210, w=155) -->
  <rect x="55" y="50" width="155" height="42" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="132" y="76" text-anchor="middle" fill="#64748b" font-size="11">Ready Queue</text>

  <!-- Segment 2: CPU Burst 1 (x=210 to 355, w=145) -->
  <rect x="210" y="50" width="145" height="42" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="282" y="72" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">CPU Burst 1</text>

  <!-- Segment 3: I/O Burst (x=355 to 475, w=120) -->
  <rect x="355" y="50" width="120" height="42" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="415" y="72" text-anchor="middle" fill="#15803d" font-size="11">I/O Burst</text>

  <!-- Segment 4: Ready Queue Wait 2 (x=475 to 560, w=85) -->
  <rect x="475" y="50" width="85" height="42" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="517" y="78" text-anchor="middle" fill="#64748b" font-size="10">Ready</text>

  <!-- Segment 5: CPU Burst 2 (x=560 to 705, w=145) -->
  <rect x="560" y="50" width="145" height="42" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="632" y="72" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">CPU Burst 2</text>

  <!-- Event labels above -->
  <text x="55" y="44" text-anchor="middle" fill="#64748b" font-size="10">submit</text>
  <text x="210" y="44" text-anchor="middle" fill="#7c3aed" font-size="10">1st run</text>
  <text x="705" y="44" text-anchor="middle" fill="#dc2626" font-size="10">done</text>

  <!-- Metric 1: Response Time — arrival to 1st CPU start -->
  <line x1="55" y1="100" x2="55" y2="112" stroke="#7c3aed" stroke-width="1.3"/>
  <line x1="210" y1="100" x2="210" y2="112" stroke="#7c3aed" stroke-width="1.3"/>
  <line x1="55" y1="112" x2="208" y2="112" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <text x="132" y="126" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="600">Response Time</text>

  <!-- Metric 2: Waiting Time — highlight ready queue segments -->
  <rect x="55" y="135" width="155" height="14" rx="2" fill="#fef9c3" stroke="#d97706" stroke-width="1.2"/>
  <rect x="475" y="135" width="85" height="14" rx="2" fill="#fef9c3" stroke="#d97706" stroke-width="1.2"/>
  <line x1="210" y1="142" x2="475" y2="142" stroke="#d97706" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="560" y1="142" x2="705" y2="142" stroke="#d97706" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="132" y="146" text-anchor="middle" fill="#92400e" font-size="10">wait1</text>
  <text x="517" y="146" text-anchor="middle" fill="#92400e" font-size="10">wait2</text>
  <text x="620" y="160" text-anchor="middle" fill="#b45309" font-size="11" font-weight="600">Waiting Time = wait1 + wait2</text>

  <!-- Metric 3: Turnaround Time — submission to completion -->
  <line x1="55" y1="165" x2="55" y2="176" stroke="#dc2626" stroke-width="1.3"/>
  <line x1="705" y1="165" x2="705" y2="176" stroke="#dc2626" stroke-width="1.3"/>
  <line x1="55" y1="176" x2="703" y2="176" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="380" y="191" text-anchor="middle" fill="#b91c1c" font-size="11" font-weight="600">Turnaround Time (submission to completion)</text>

  <!-- Bottom note -->
  <text x="380" y="210" text-anchor="middle" fill="#94a3b8" font-size="10.5">CPU Utilization: overall % CPU active  |  Throughput: processes completed per time unit</text>
</svg>
