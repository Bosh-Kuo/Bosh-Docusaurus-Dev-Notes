<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="720" height="420" fill="#f8fafc" rx="10"/>

  <!-- Process boundary -->
  <rect x="20" y="20" width="680" height="380" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="34" y="44" font-size="12" font-weight="bold" fill="#1e40af">Process A</text>
  <text x="700" y="44" text-anchor="end" font-size="11" fill="#d97706" font-weight="bold">PCS: competition within this boundary only</text>

  <!-- ── Row 1: User Threads with priorities ── -->
  <text x="360" y="65" text-anchor="middle" font-size="11" fill="#374151">4 User-Level Threads competing for 2 available LWPs</text>

  <!-- T1: Priority 10, waiting -->
  <rect x="50" y="75" width="130" height="60" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="115" y="98"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6b7280">T1</text>
  <text x="115" y="116" text-anchor="middle" font-size="10" fill="#9ca3af">Priority = 10</text>
  <text x="115" y="128" text-anchor="middle" font-size="9"  fill="#d1d5db">waiting...</text>

  <!-- T2: Priority 20, selected (running) -->
  <rect x="200" y="75" width="130" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="265" y="98"  text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">T2</text>
  <text x="265" y="116" text-anchor="middle" font-size="10" fill="#15803d" font-weight="bold">Priority = 20 ★</text>
  <text x="265" y="128" text-anchor="middle" font-size="9"  fill="#166534">selected</text>

  <!-- T3: Priority 20, selected (running) -->
  <rect x="390" y="75" width="130" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="455" y="98"  text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">T3</text>
  <text x="455" y="116" text-anchor="middle" font-size="10" fill="#15803d" font-weight="bold">Priority = 20 ★</text>
  <text x="455" y="128" text-anchor="middle" font-size="9"  fill="#166534">selected</text>

  <!-- T4: Priority 5, waiting -->
  <rect x="540" y="75" width="130" height="60" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="605" y="98"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6b7280">T4</text>
  <text x="605" y="116" text-anchor="middle" font-size="10" fill="#9ca3af">Priority = 5</text>
  <text x="605" y="128" text-anchor="middle" font-size="9"  fill="#d1d5db">waiting...</text>

  <!-- Blocked arrows for T1, T4 (X mark) -->
  <!-- T1 blocked -->
  <line x1="115" y1="135" x2="115" y2="163" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="107" y1="145" x2="123" y2="161" stroke="#ef4444" stroke-width="2"/>
  <line x1="123" y1="145" x2="107" y2="161" stroke="#ef4444" stroke-width="2"/>

  <!-- T4 blocked -->
  <line x1="605" y1="135" x2="605" y2="163" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="597" y1="145" x2="613" y2="161" stroke="#ef4444" stroke-width="2"/>
  <line x1="613" y1="145" x2="597" y2="161" stroke="#ef4444" stroke-width="2"/>

  <!-- Arrows for T2, T3 (selected) -->
  <line x1="265" y1="135" x2="265" y2="175" stroke="#16a34a" stroke-width="2"/>
  <polygon points="265,175 260,166 270,166" fill="#16a34a"/>

  <line x1="455" y1="135" x2="455" y2="175" stroke="#16a34a" stroke-width="2"/>
  <polygon points="455,175 450,166 460,166" fill="#16a34a"/>

  <!-- ── Row 2: Thread Library Scheduler ── -->
  <rect x="40" y="175" width="640" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="191" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Thread Library Scheduler (PCS)</text>
  <text x="360" y="208" text-anchor="middle" font-size="10" fill="#b45309">selects runnable threads with highest priority for available LWPs</text>

  <!-- Arrows: Thread Library → LWPs -->
  <line x1="265" y1="215" x2="265" y2="255" stroke="#d97706" stroke-width="1.8"/>
  <polygon points="265,255 260,246 270,246" fill="#d97706"/>

  <line x1="455" y1="215" x2="455" y2="255" stroke="#d97706" stroke-width="1.8"/>
  <polygon points="455,255 450,246 460,246" fill="#d97706"/>

  <!-- ── Row 3: LWPs (running) ── -->
  <rect x="175" y="255" width="160" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="255" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">LWP 1</text>
  <text x="255" y="291" text-anchor="middle" font-size="10" fill="#166534">running T2</text>
  <text x="255" y="305" text-anchor="middle" font-size="9"  fill="#166534">(Priority 20)</text>

  <rect x="385" y="255" width="160" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="465" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">LWP 2</text>
  <text x="465" y="291" text-anchor="middle" font-size="10" fill="#166534">running T3</text>
  <text x="465" y="305" text-anchor="middle" font-size="9"  fill="#166534">(Priority 20)</text>

  <!-- ── Annotation: equal priority note ── -->
  <!-- Brace between LWP1 and LWP2 -->
  <line x1="255" y1="320" x2="255" y2="345" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="465" y1="320" x2="465" y2="345" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="255" y1="345" x2="465" y2="345" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="360" y1="345" x2="360" y2="358" stroke="#7c3aed" stroke-width="1.5"/>

  <rect x="200" y="358" width="320" height="36" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="360" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">T2 and T3 have equal priority (20)</text>
  <text x="360" y="386" text-anchor="middle" font-size="9" fill="#6d28d9">No time-slicing guarantee — either may run indefinitely until preempted</text>

  <!-- Legend: T1/T4 cannot get LWP -->
  <rect x="42" y="330" width="18" height="18" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="65" y="343" font-size="10" fill="#6b7280">Lower priority — blocked from LWP</text>

  <rect x="42" y="355" width="18" height="18" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="65" y="368" font-size="10" fill="#15803d">Highest priority — scheduled onto LWP</text>
</svg>
