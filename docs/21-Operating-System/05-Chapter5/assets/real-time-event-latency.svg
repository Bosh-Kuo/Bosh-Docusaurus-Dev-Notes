<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 110" width="500" height="110"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <rect width="500" height="110" fill="#f8fafc" rx="6"/>

  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Top labels -->
  <text x="120" y="18" text-anchor="middle" fill="#374151" font-size="11">event E first occurs</text>
  <text x="385" y="18" text-anchor="middle" fill="#374151" font-size="11">real-time system responds to E</text>

  <!-- Dashed vertical guides -->
  <line x1="120" y1="22" x2="120" y2="68" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="385" y1="22" x2="385" y2="68" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Event latency bidirectional arrow -->
  <line x1="128" y1="48" x2="377" y2="48" stroke="#374151" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="252" y="43" text-anchor="middle" fill="#374151" font-size="12">event latency</text>

  <!-- Timeline -->
  <line x1="60" y1="68" x2="450" y2="68" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- t0 tick -->
  <line x1="120" y1="62" x2="120" y2="75" stroke="#374151" stroke-width="2"/>
  <text x="116" y="89" fill="#64748b" font-size="11">t</text>
  <text x="124" y="92" fill="#64748b" font-size="8">0</text>

  <!-- t1 tick -->
  <line x1="385" y1="62" x2="385" y2="75" stroke="#374151" stroke-width="2"/>
  <text x="381" y="89" fill="#64748b" font-size="11">t</text>
  <text x="389" y="92" fill="#64748b" font-size="8">1</text>

  <!-- Time label -->
  <text x="455" y="72" fill="#64748b" font-size="11">Time</text>

</svg>
