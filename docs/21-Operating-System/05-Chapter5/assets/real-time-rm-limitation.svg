<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 125" width="580" height="125"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <rect width="580" height="125" fill="#f8fafc" rx="6"/>

  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- === Scale: x(t) = 60 + t*3.0 === -->
  <!-- x(25)=135, x(50)=210, x(75)=285, x(80)=300, x(85)=315, x(100)=360, x(125)=435, x(160)=540 -->

  <!-- === Deadline arrows === -->
  <text x="6" y="20" fill="#94a3b8" font-size="9">deadlines</text>

  <!-- P1 deadlines at t=50(x=210), t=100(x=360), t=150(x=510): all met (blue) -->
  <text x="205" y="10" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="bold">P</text>
  <text x="210" y="13" fill="#2563eb" font-size="7">1</text>
  <line x1="205" y1="12" x2="205" y2="41" stroke="#2563eb" stroke-width="1.5"/>
  <polygon points="201,38 209,38 205,44" fill="#2563eb"/>

  <text x="355" y="10" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="bold">P</text>
  <text x="360" y="13" fill="#2563eb" font-size="7">1</text>
  <line x1="355" y1="12" x2="355" y2="41" stroke="#2563eb" stroke-width="1.5"/>
  <polygon points="351,38 359,38 355,44" fill="#2563eb"/>

  <text x="503" y="10" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="bold">P</text>
  <text x="508" y="13" fill="#2563eb" font-size="7">1</text>
  <line x1="503" y1="12" x2="503" y2="41" stroke="#2563eb" stroke-width="1.5"/>
  <polygon points="499,38 507,38 503,44" fill="#2563eb"/>

  <!-- P2 deadline at t=80 (x=300): MISSED (red) -->
  <text x="295" y="10" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="bold">P</text>
  <text x="300" y="13" fill="#dc2626" font-size="7">2</text>
  <text x="315" y="10" fill="#dc2626" font-size="9">MISSED</text>
  <line x1="295" y1="12" x2="295" y2="41" stroke="#dc2626" stroke-width="1.5"/>
  <polygon points="291,38 299,38 295,44" fill="#dc2626"/>

  <!-- P2 deadline at t=160 (x=540): met (green) -->
  <text x="533" y="10" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="bold">P</text>
  <text x="538" y="13" fill="#16a34a" font-size="7">2</text>
  <line x1="533" y1="12" x2="533" y2="41" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="529,38 537,38 533,44" fill="#16a34a"/>

  <!-- === Gantt bar (y=44 to y=80) === -->

  <!-- P1(0-25): x=60, w=75 -->
  <rect x="60" y="44" width="75" height="36" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="92" y="65" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="13">P</text>
  <text x="100" y="70" fill="#1e40af" font-size="9">1</text>

  <!-- P2(25-50): x=135, w=75 -->
  <rect x="135" y="44" width="75" height="36" rx="1" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="167" y="65" text-anchor="middle" fill="#15803d" font-weight="bold" font-size="13">P</text>
  <text x="175" y="70" fill="#15803d" font-size="9">2</text>

  <!-- P1(50-75): x=210, w=75 -->
  <rect x="210" y="44" width="75" height="36" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="242" y="65" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="13">P</text>
  <text x="250" y="70" fill="#1e40af" font-size="9">1</text>

  <!-- P2(75-85): x=285, w=30 - MISSED deadline at t=80(x=300) -->
  <rect x="285" y="44" width="30" height="36" rx="1" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="300" y="65" text-anchor="middle" fill="#991b1b" font-weight="bold" font-size="11">P</text>
  <text x="307" y="70" fill="#991b1b" font-size="9">2</text>

  <!-- Idle(85-100): x=315, w=45 -->
  <rect x="315" y="44" width="45" height="36" rx="1" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- P1(100-125): x=360, w=75 -->
  <rect x="360" y="44" width="75" height="36" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="392" y="65" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="13">P</text>
  <text x="400" y="70" fill="#1e40af" font-size="9">1</text>

  <!-- P2(125-160): x=435, w=105 -->
  <rect x="435" y="44" width="105" height="36" rx="1" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="482" y="65" text-anchor="middle" fill="#15803d" font-weight="bold" font-size="13">P</text>
  <text x="490" y="70" fill="#15803d" font-size="9">2</text>

  <!-- === Timeline === -->
  <line x1="50" y1="80" x2="553" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Time ticks -->
  <line x1="60" y1="76" x2="60" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="60" y="97" text-anchor="middle" fill="#64748b" font-size="10">0</text>

  <line x1="135" y1="76" x2="135" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="135" y="97" text-anchor="middle" fill="#64748b" font-size="10">25</text>

  <line x1="210" y1="76" x2="210" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="210" y="97" text-anchor="middle" fill="#64748b" font-size="10">50</text>

  <line x1="285" y1="76" x2="285" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="285" y="97" text-anchor="middle" fill="#64748b" font-size="10">75</text>

  <line x1="300" y1="76" x2="300" y2="84" stroke="#dc2626" stroke-width="1.5"/>
  <text x="300" y="97" text-anchor="middle" fill="#dc2626" font-size="10">80</text>

  <line x1="315" y1="76" x2="315" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="315" y="108" text-anchor="middle" fill="#64748b" font-size="10">85</text>

  <line x1="360" y1="76" x2="360" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="360" y="97" text-anchor="middle" fill="#64748b" font-size="10">100</text>

  <line x1="435" y1="76" x2="435" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="435" y="108" text-anchor="middle" fill="#64748b" font-size="10">125</text>

  <line x1="540" y1="76" x2="540" y2="84" stroke="#64748b" stroke-width="1.5"/>
  <text x="540" y="97" text-anchor="middle" fill="#64748b" font-size="10">160</text>

</svg>
