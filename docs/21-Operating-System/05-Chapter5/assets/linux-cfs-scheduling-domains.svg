<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" width="620" height="340" font-family="monospace, sans-serif" font-size="13">

  <rect width="620" height="340" fill="#f8fafc" rx="8"/>

  <!-- ===== Physical processor domain (NUMA node) outer box ===== -->
  <rect x="20" y="20" width="580" height="300" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5" rx="10"/>
  <text x="310" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">physical processor domain (NUMA node)</text>

  <!-- ===== domain0 box ===== -->
  <rect x="40" y="55" width="250" height="240" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="165" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">domain0</text>

  <!-- core0 box -->
  <rect x="60" y="85" width="90" height="44" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="105" y="112" text-anchor="middle" font-size="12" fill="#1d4ed8">core0</text>

  <!-- core1 box -->
  <rect x="60" y="175" width="90" height="44" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="105" y="202" text-anchor="middle" font-size="12" fill="#1d4ed8">core1</text>

  <!-- L2 cache (domain0) -->
  <rect x="180" y="115" width="88" height="86" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="5"/>
  <text x="224" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">L2</text>

  <!-- connections: core0/core1 -> L2 (domain0) -->
  <line x1="150" y1="107" x2="180" y2="138" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="150" y1="197" x2="180" y2="172" stroke="#2563eb" stroke-width="1.5"/>

  <!-- ===== domain1 box ===== -->
  <rect x="330" y="55" width="250" height="240" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="8"/>
  <text x="455" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">domain1</text>

  <!-- core2 box -->
  <rect x="350" y="85" width="90" height="44" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5" rx="5"/>
  <text x="395" y="112" text-anchor="middle" font-size="12" fill="#be185d">core2</text>

  <!-- core3 box -->
  <rect x="350" y="175" width="90" height="44" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5" rx="5"/>
  <text x="395" y="202" text-anchor="middle" font-size="12" fill="#be185d">core3</text>

  <!-- L2 cache (domain1) -->
  <rect x="470" y="115" width="88" height="86" fill="#fbcfe8" stroke="#db2777" stroke-width="1.5" rx="5"/>
  <text x="514" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#9d174d">L2</text>

  <!-- connections: core2/core3 -> L2 (domain1) -->
  <line x1="440" y1="107" x2="470" y2="138" stroke="#db2777" stroke-width="1.5"/>
  <line x1="440" y1="197" x2="470" y2="172" stroke="#db2777" stroke-width="1.5"/>

  <!-- ===== L3 cache shared (bottom center) ===== -->
  <rect x="226" y="262" width="168" height="44" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="6"/>
  <text x="310" y="289" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">L3</text>

  <!-- domain0 bottom -> L3 -->
  <line x1="200" y1="295" x2="226" y2="284" stroke="#16a34a" stroke-width="1.5"/>
  <!-- domain1 bottom -> L3 -->
  <line x1="420" y1="295" x2="394" y2="284" stroke="#16a34a" stroke-width="1.5"/>

</svg>
