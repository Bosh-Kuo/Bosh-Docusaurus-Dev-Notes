<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580" height="180" font-family="monospace, sans-serif" font-size="13">

  <rect width="580" height="180" fill="#f8fafc" rx="8"/>

  <!-- Legend -->
  <rect x="30" y="12" width="22" height="16" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="2"/>
  <text x="57" y="25" fill="#1e293b" font-size="12">compute cycle (C)</text>
  <rect x="210" y="12" width="22" height="16" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="2"/>
  <text x="237" y="25" fill="#1e293b" font-size="12">memory stall cycle (M)</text>

  <!-- thread₁ label -->
  <text x="10" y="74" fill="#475569" font-size="12">thread₁</text>

  <!-- thread₁ timeline: C M C M C M C -->
  <!-- cell width=56, height=26, y=55 -->
  <rect x="70"  y="55" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="98"  y="73" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <rect x="126" y="55" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="154" y="73" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <rect x="182" y="55" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="210" y="73" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <rect x="238" y="55" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="266" y="73" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <rect x="294" y="55" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="322" y="73" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <rect x="350" y="55" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="378" y="73" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <rect x="406" y="55" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="434" y="73" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <!-- thread₀ label -->
  <text x="10" y="122" fill="#475569" font-size="12">thread₀</text>

  <!-- thread₀ timeline: interleaved — M C M C M C M -->
  <rect x="70"  y="103" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="98"  y="121" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <rect x="126" y="103" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="154" y="121" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <rect x="182" y="103" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="210" y="121" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <rect x="238" y="103" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="266" y="121" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <rect x="294" y="103" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="322" y="121" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <rect x="350" y="103" width="56" height="26" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="3"/>
  <text x="378" y="121" text-anchor="middle" fill="#1e40af" font-weight="bold">C</text>

  <rect x="406" y="103" width="56" height="26" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" rx="3"/>
  <text x="434" y="121" text-anchor="middle" fill="#991b1b" font-weight="bold">M</text>

  <!-- time arrow -->
  <line x1="70" y1="152" x2="475" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tarr)"/>
  <text x="482" y="156" fill="#64748b" font-size="12">time</text>

  <!-- Annotation: core never idle -->
  <text x="240" y="170" text-anchor="middle" fill="#7c3aed" font-size="11">when one thread stalls, core switches to the other — no wasted cycles</text>

  <defs>
    <marker id="tarr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
