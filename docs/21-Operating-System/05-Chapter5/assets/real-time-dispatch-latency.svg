<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 182" width="660" height="182"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <rect width="660" height="182" fill="#f8fafc" rx="6"/>

  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#374151"/>
    </marker>
    <marker id="time-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Vertical line x positions: x1=70, x2=210, x3=360, x4=485, x5=580 -->
  <!-- Timeline y: 108 -->

  <!-- === Vertical lines === -->
  <line x1="70"  y1="8"   x2="70"  y2="110" stroke="#374151" stroke-width="1.5"/>
  <line x1="210" y1="30"  x2="210" y2="160" stroke="#374151" stroke-width="1"/>
  <line x1="360" y1="108" x2="360" y2="160" stroke="#374151" stroke-width="1"/>
  <line x1="485" y1="30"  x2="485" y2="160" stroke="#374151" stroke-width="1.5"/>
  <line x1="580" y1="8"   x2="580" y2="110" stroke="#374151" stroke-width="1.5"/>

  <!-- === Top labels === -->
  <text x="70"  y="12" text-anchor="middle" fill="#374151" font-size="11" font-weight="bold">event</text>
  <text x="580" y="12" text-anchor="end"    fill="#374151" font-size="11" font-weight="bold">response to event</text>

  <!-- === Response interval double-arrow (y=30) === -->
  <line x1="70" y1="30" x2="580" y2="30" stroke="#374151" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="325" y="25" text-anchor="middle" fill="#374151" font-size="11">response interval</text>

  <!-- === "process made available" label (above x2, right-aligned to avoid overlap) === -->
  <text x="215" y="47" text-anchor="start" fill="#374151" font-size="10">process made</text>
  <text x="215" y="59" text-anchor="start" fill="#374151" font-size="10">available</text>

  <!-- === Interrupt processing right-arrow (y=80): x1->x2 === -->
  <line x1="74" y1="80" x2="204" y2="80" stroke="#374151" stroke-width="1.5"
        marker-end="url(#arr-r)"/>
  <text x="142" y="72" text-anchor="middle" fill="#374151" font-size="10">interrupt</text>
  <text x="142" y="86" text-anchor="middle" fill="#374151" font-size="10">processing</text>

  <!-- === Dispatch latency double-arrow (y=70): x2->x4 === -->
  <line x1="214" y1="70" x2="481" y2="70" stroke="#374151" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="347" y="64" text-anchor="middle" fill="#374151" font-size="11">dispatch latency</text>

  <!-- === Real-time process execution right-arrow (y=80): x4->x5 === -->
  <line x1="489" y1="80" x2="578" y2="80" stroke="#374151" stroke-width="1.5"
        marker-end="url(#arr-r)"/>
  <text x="534" y="65" text-anchor="middle" fill="#374151" font-size="9">real-time</text>
  <text x="534" y="77" text-anchor="middle" fill="#374151" font-size="9">process</text>
  <text x="534" y="89" text-anchor="middle" fill="#374151" font-size="9">execution</text>

  <!-- === Horizontal timeline (y=108) === -->
  <line x1="50" y1="108" x2="610" y2="108" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#time-r)"/>
  <text x="618" y="112" fill="#64748b" font-size="11">time</text>

  <!-- === Conflicts double-arrow (y=142): x2->x3 === -->
  <line x1="214" y1="142" x2="356" y2="142" stroke="#374151" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="283" y="160" text-anchor="middle" fill="#374151" font-size="11">conflicts</text>

  <!-- === Dispatch double-arrow (y=142): x3->x4 === -->
  <line x1="364" y1="142" x2="481" y2="142" stroke="#374151" stroke-width="1.5"
        marker-start="url(#arr-l)" marker-end="url(#arr-r)"/>
  <text x="422" y="160" text-anchor="middle" fill="#374151" font-size="11">dispatch</text>

</svg>
