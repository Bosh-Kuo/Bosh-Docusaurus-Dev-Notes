<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="500" fill="#f8fafc" rx="10"/>

  <!-- ═══ USER SPACE ═══ -->
  <rect x="20" y="20" width="780" height="280" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="30" y="42" font-size="12" font-weight="bold" fill="#15803d">User Space</text>

  <!-- PCS label (spans process boxes) -->
  <text x="400" y="42" text-anchor="middle" font-size="11" fill="#d97706" font-weight="bold">← PCS: competition within each process boundary →</text>

  <!-- ── Process A ── -->
  <rect x="40" y="55" width="360" height="230" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="220" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Process A</text>

  <!-- User threads in Process A -->
  <rect x="60"  y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="90"  y="113" text-anchor="middle" font-size="11" fill="#1e40af">T1</text>

  <rect x="130" y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="160" y="113" text-anchor="middle" font-size="11" fill="#1e40af">T2</text>

  <rect x="200" y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="230" y="113" text-anchor="middle" font-size="11" fill="#1e40af">T3</text>

  <rect x="270" y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="300" y="113" text-anchor="middle" font-size="11" fill="#1e40af">T4</text>

  <!-- Thread Library label -->
  <rect x="55" y="143" width="325" height="30" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="218" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Thread Library Scheduler (PCS)</text>

  <!-- Arrows from thread lib to LWPs -->
  <line x1="130" y1="173" x2="110" y2="200" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="110,200 105,189 116,193" fill="#d97706"/>

  <line x1="218" y1="173" x2="218" y2="200" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="218,200 213,189 223,189" fill="#d97706"/>

  <line x1="305" y1="173" x2="325" y2="200" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="325,200 319,190 330,190" fill="#d97706"/>

  <!-- LWPs in Process A -->
  <rect x="65"  y="200" width="90" height="36" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="110" y="218" text-anchor="middle" font-size="10" fill="#14532d">LWP 1</text>
  <text x="110" y="230" text-anchor="middle" font-size="9"  fill="#166534">(Kernel Thread)</text>

  <rect x="173" y="200" width="90" height="36" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="218" y="218" text-anchor="middle" font-size="10" fill="#14532d">LWP 2</text>
  <text x="218" y="230" text-anchor="middle" font-size="9"  fill="#166534">(Kernel Thread)</text>

  <rect x="281" y="200" width="90" height="36" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="326" y="218" text-anchor="middle" font-size="10" fill="#14532d">LWP 3</text>
  <text x="326" y="230" text-anchor="middle" font-size="9"  fill="#166534">(Kernel Thread)</text>

  <!-- ── Process B ── -->
  <rect x="420" y="55" width="360" height="230" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Process B</text>

  <!-- User threads in Process B -->
  <rect x="440" y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="470" y="113" text-anchor="middle" font-size="11" fill="#1e40af">T5</text>

  <rect x="510" y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="540" y="113" text-anchor="middle" font-size="11" fill="#1e40af">T6</text>

  <rect x="580" y="90" width="60" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="610" y="113" text-anchor="middle" font-size="11" fill="#1e40af">T7</text>

  <!-- Thread Library label for B -->
  <rect x="435" y="143" width="325" height="30" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="598" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Thread Library Scheduler (PCS)</text>

  <!-- Arrows from thread lib B to LWPs B -->
  <line x1="510" y1="173" x2="490" y2="200" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="490,200 485,189 496,193" fill="#d97706"/>

  <line x1="598" y1="173" x2="598" y2="200" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="598,200 593,189 603,189" fill="#d97706"/>

  <!-- LWPs in Process B -->
  <rect x="445" y="200" width="90" height="36" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="490" y="218" text-anchor="middle" font-size="10" fill="#14532d">LWP 4</text>
  <text x="490" y="230" text-anchor="middle" font-size="9"  fill="#166534">(Kernel Thread)</text>

  <rect x="553" y="200" width="90" height="36" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="598" y="218" text-anchor="middle" font-size="10" fill="#14532d">LWP 5</text>
  <text x="598" y="230" text-anchor="middle" font-size="9"  fill="#166534">(Kernel Thread)</text>

  <!-- ═══ KERNEL SPACE ═══ -->
  <rect x="20" y="320" width="780" height="160" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="30" y="342" font-size="12" font-weight="bold" fill="#5b21b6">Kernel Space</text>
  <text x="400" y="342" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="bold">← SCS: all kernel threads compete system-wide for CPU →</text>

  <!-- OS Scheduler label -->
  <rect x="200" y="355" width="420" height="30" rx="5" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="410" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#4c1d95">OS Kernel Scheduler (SCS)</text>

  <!-- Downward arrows from LWP boxes to kernel scheduler (box spans x=200–620) -->
  <line x1="110" y1="236" x2="230" y2="354" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="230,354 221,344 232,344" fill="#16a34a"/>

  <line x1="218" y1="236" x2="300" y2="354" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="300,354 293,344 303,344" fill="#16a34a"/>

  <line x1="326" y1="236" x2="390" y2="354" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="390,354 383,345 393,345" fill="#16a34a"/>

  <line x1="490" y1="236" x2="510" y2="354" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="510,354 503,344 513,344" fill="#16a34a"/>

  <line x1="598" y1="236" x2="590" y2="354" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="590,354 585,344 595,344" fill="#16a34a"/>

  <!-- CPU -->
  <rect x="330" y="400" width="160" height="50" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="410" y="421" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">CPU Core</text>
  <text x="410" y="438" text-anchor="middle" font-size="10" fill="#be185d">physical processor</text>

  <!-- Arrow from OS scheduler to CPU -->
  <line x1="410" y1="385" x2="410" y2="399" stroke="#7c3aed" stroke-width="2"/>
  <polygon points="410,399 405,390 415,390" fill="#7c3aed"/>
</svg>
