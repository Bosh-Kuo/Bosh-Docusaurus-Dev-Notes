<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340" font-family="monospace, sans-serif" font-size="13">

  <rect width="560" height="340" fill="#f8fafc" rx="8"/>

  <!-- ===== Software Threads (top row) ===== -->
  <text x="200" y="24" text-anchor="middle" fill="#475569" font-size="12" font-weight="bold">software threads</text>

  <rect x="40"  y="32" width="64" height="28" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="4"/>
  <text x="72"  y="51" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="12">SW T0</text>
  <rect x="114" y="32" width="64" height="28" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="4"/>
  <text x="146" y="51" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="12">SW T1</text>
  <rect x="188" y="32" width="64" height="28" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="4"/>
  <text x="220" y="51" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="12">SW T2</text>
  <rect x="262" y="32" width="64" height="28" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="4"/>
  <text x="294" y="51" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="12">SW T3</text>
  <rect x="336" y="32" width="64" height="28" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="4"/>
  <text x="368" y="51" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="12">SW T4</text>

  <!-- Level 1 label + brace -->
  <text x="448" y="46" fill="#7c3aed" font-size="12" font-weight="bold">level 1</text>
  <text x="440" y="60" fill="#7c3aed" font-size="10">(OS Scheduler)</text>
  <line x1="432" y1="32" x2="432" y2="148" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrows: SW threads → HW threads (fan-in) -->
  <line x1="72"  y1="60" x2="112" y2="154" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="146" y1="60" x2="150" y2="154" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="220" y1="60" x2="220" y2="154" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="294" y1="60" x2="284" y2="154" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="368" y1="60" x2="322" y2="154" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== Hardware Threads (middle row) ===== -->
  <text x="220" y="148" text-anchor="middle" fill="#475569" font-size="12" font-weight="bold">hardware threads (logical CPUs)</text>

  <rect x="96"  y="156" width="72" height="28" fill="#fde68a" stroke="#ca8a04" stroke-width="1.5" rx="4"/>
  <text x="132" y="175" text-anchor="middle" fill="#78350f" font-weight="bold" font-size="12">HW T0</text>
  <rect x="184" y="156" width="72" height="28" fill="#fde68a" stroke="#ca8a04" stroke-width="1.5" rx="4"/>
  <text x="220" y="175" text-anchor="middle" fill="#78350f" font-weight="bold" font-size="12">HW T1</text>
  <rect x="272" y="156" width="72" height="28" fill="#fde68a" stroke="#ca8a04" stroke-width="1.5" rx="4"/>
  <text x="308" y="175" text-anchor="middle" fill="#78350f" font-weight="bold" font-size="12">HW T2</text>

  <!-- Level 2 label + brace -->
  <text x="448" y="172" fill="#0369a1" font-size="12" font-weight="bold">level 2</text>
  <text x="432" y="186" fill="#0369a1" font-size="10">(Core Hardware)</text>
  <line x1="432" y1="156" x2="432" y2="260" stroke="#0369a1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrows: HW threads → processing core (fan-in) -->
  <line x1="132" y1="184" x2="185" y2="248" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="220" y1="184" x2="220" y2="248" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="308" y1="184" x2="255" y2="248" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== Processing Core (bottom) ===== -->
  <text x="220" y="244" text-anchor="middle" fill="#475569" font-size="12" font-weight="bold">processing core</text>
  <rect x="146" y="252" width="148" height="36" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="6"/>
  <text x="220" y="275" text-anchor="middle" fill="#15803d" font-weight="bold" font-size="14">core</text>

  <!-- ===== Bottom annotation ===== -->
  <rect x="40" y="306" width="360" height="28" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="220" y="319" text-anchor="middle" fill="#475569" font-size="11">Level 1: OS decides which SW thread runs on which HW thread</text>
  <text x="220" y="330" text-anchor="middle" fill="#475569" font-size="11">Level 2: core hardware decides which HW thread uses the core</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
