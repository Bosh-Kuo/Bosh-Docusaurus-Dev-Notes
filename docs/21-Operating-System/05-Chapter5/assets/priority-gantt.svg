<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 160" width="540" height="160"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <!-- Title -->
  <text x="270" y="18" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">
    Priority Scheduling (low number = high priority)    Avg Waiting = 8.2 ms
  </text>
  <text x="270" y="32" text-anchor="middle" fill="#64748b" font-size="11">
    P1(10, pri=3)  P2(1, pri=1)  P3(2, pri=4)  P4(1, pri=5)  P5(5, pri=2)  - all arrive at t=0
  </text>

  <!-- Scale: 1ms = 20px, start x=30 -->
  <!-- Order: P2(0-1), P5(1-6), P1(6-16), P3(16-18), P4(18-19) -->

  <!-- P2: 0-1 → x=30, w=20 -->
  <rect x="30" y="40" width="20" height="38" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="40" y="63" text-anchor="middle" fill="#15803d" font-weight="700" font-size="11">P2</text>

  <!-- P5: 1-6 → x=50, w=100 -->
  <rect x="50" y="40" width="100" height="38" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="100" y="63" text-anchor="middle" fill="#9d174d" font-weight="700" font-size="13">P5</text>

  <!-- P1: 6-16 → x=150, w=200 -->
  <rect x="150" y="40" width="200" height="38" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="63" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- P3: 16-18 → x=350, w=40 -->
  <rect x="350" y="40" width="40" height="38" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="370" y="63" text-anchor="middle" fill="#5b21b6" font-weight="700" font-size="12">P3</text>

  <!-- P4: 18-19 → x=390, w=20 -->
  <rect x="390" y="40" width="20" height="38" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="400" y="63" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">P4</text>

  <!-- Axis and ticks -->
  <line x1="24" y1="78" x2="425" y2="78" stroke="#94a3b8" stroke-width="1"/>
  <line x1="30" y1="74" x2="30" y2="83" stroke="#64748b" stroke-width="1.5"/>
  <text x="30" y="96" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <line x1="50" y1="74" x2="50" y2="83" stroke="#64748b" stroke-width="1.5"/>
  <text x="50" y="96" text-anchor="middle" fill="#64748b" font-size="11">1</text>
  <line x1="150" y1="74" x2="150" y2="83" stroke="#64748b" stroke-width="1.5"/>
  <text x="150" y="96" text-anchor="middle" fill="#64748b" font-size="11">6</text>
  <line x1="350" y1="74" x2="350" y2="83" stroke="#64748b" stroke-width="1.5"/>
  <text x="350" y="96" text-anchor="middle" fill="#64748b" font-size="11">16</text>
  <line x1="390" y1="74" x2="390" y2="83" stroke="#64748b" stroke-width="1.5"/>
  <text x="390" y="96" text-anchor="middle" fill="#64748b" font-size="11">18</text>
  <line x1="410" y1="74" x2="410" y2="83" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="96" text-anchor="middle" fill="#64748b" font-size="11">19</text>

  <!-- Priority annotations above blocks -->
  <text x="40" y="38" text-anchor="middle" fill="#15803d" font-size="9">pri=1</text>
  <text x="100" y="38" text-anchor="middle" fill="#9d174d" font-size="9">pri=2</text>
  <text x="250" y="38" text-anchor="middle" fill="#1e40af" font-size="9">pri=3</text>
  <text x="370" y="38" text-anchor="middle" fill="#5b21b6" font-size="9">pri=4</text>
  <text x="400" y="38" text-anchor="middle" fill="#92400e" font-size="9">pri=5</text>

  <!-- Waiting times -->
  <text x="30" y="112" fill="#64748b" font-size="11">Waiting:  P1=6ms  P2=0ms  P3=16ms  P4=18ms  P5=1ms    Avg = (6+0+16+18+1)/5 = 8.2 ms</text>

  <!-- Starvation warning -->
  <rect x="30" y="124" width="490" height="28" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="270" y="138" text-anchor="middle" fill="#b91c1c" font-size="11" font-weight="600">Starvation Risk</text>
  <text x="270" y="150" text-anchor="middle" fill="#b91c1c" font-size="11">
    Low-priority processes may wait indefinitely if high-priority work keeps arriving
  </text>
</svg>
