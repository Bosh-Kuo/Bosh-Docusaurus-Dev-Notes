<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 340" width="660" height="340"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- ========== Left: Actual Process Execution ========== -->
  <rect x="10" y="30" width="130" height="200" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="75" y="52" text-anchor="middle" fill="#374151" font-size="11" font-weight="700">actual process</text>
  <text x="75" y="67" text-anchor="middle" fill="#374151" font-size="11" font-weight="700">execution</text>

  <!-- CPU/IO event log -->
  <text x="22" y="90" fill="#64748b" font-size="10">CPU  10</text>
  <text x="22" y="104" fill="#64748b" font-size="10">I/O  213</text>
  <text x="22" y="118" fill="#64748b" font-size="10">CPU  12</text>
  <text x="22" y="132" fill="#64748b" font-size="10">I/O  112</text>
  <text x="22" y="146" fill="#64748b" font-size="10">CPU   2</text>
  <text x="22" y="160" fill="#64748b" font-size="10">I/O  147</text>
  <text x="22" y="174" fill="#64748b" font-size="10">CPU 173</text>
  <text x="22" y="188" fill="#64748b" font-size="10"> ...</text>
  <text x="75" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">(CPU / I/O burst log)</text>

  <!-- Arrow to trace tape -->
  <line x1="140" y1="130" x2="178" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ========== Trace Tape ========== -->
  <rect x="180" y="100" width="90" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  <text x="225" y="126" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">trace</text>
  <text x="225" y="142" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">tape</text>
  <!-- Tape stripes -->
  <line x1="180" y1="108" x2="270" y2="108" stroke="#fde68a" stroke-width="1"/>
  <line x1="180" y1="152" x2="270" y2="152" stroke="#fde68a" stroke-width="1"/>

  <!-- ========== Fan-out arrows to 3 simulators ========== -->
  <!-- Vertical spine -->
  <line x1="270" y1="130" x2="310" y2="130" stroke="#64748b" stroke-width="1.5"/>
  <line x1="310" y1="55"  x2="310" y2="215" stroke="#64748b" stroke-width="1.5"/>

  <!-- Arrow to FCFS sim -->
  <line x1="310" y1="55"  x2="348" y2="55"  stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <!-- Arrow to SJF sim -->
  <line x1="310" y1="130" x2="348" y2="130" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <!-- Arrow to RR sim -->
  <line x1="310" y1="215" x2="348" y2="215" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ========== Simulator boxes ========== -->
  <!-- FCFS -->
  <rect x="350" y="30" width="90" height="50" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="395" y="53" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">simulation</text>
  <text x="395" y="70" text-anchor="middle" fill="#1e40af" font-size="11">(FCFS)</text>

  <!-- SJF -->
  <rect x="350" y="105" width="90" height="50" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="395" y="128" text-anchor="middle" fill="#15803d" font-weight="700" font-size="12">simulation</text>
  <text x="395" y="145" text-anchor="middle" fill="#15803d" font-size="11">(SJF)</text>

  <!-- RR -->
  <rect x="350" y="190" width="90" height="50" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="395" y="213" text-anchor="middle" fill="#9a3412" font-weight="700" font-size="12">simulation</text>
  <text x="395" y="230" text-anchor="middle" fill="#9a3412" font-size="11">(RR, q=14)</text>

  <!-- ========== Arrows to statistics ========== -->
  <line x1="440" y1="55"  x2="478" y2="55"  stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="440" y1="130" x2="478" y2="130" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="440" y1="215" x2="478" y2="215" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ========== Statistics boxes ========== -->
  <!-- FCFS stats -->
  <rect x="480" y="20" width="165" height="70" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="562" y="40" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="700">performance statistics</text>
  <text x="562" y="54" text-anchor="middle" fill="#1e40af" font-size="10">for FCFS</text>
  <text x="562" y="68" text-anchor="middle" fill="#64748b" font-size="9">(avg wait, throughput, ...)</text>
  <text x="562" y="82" text-anchor="middle" fill="#64748b" font-size="9"> </text>

  <!-- SJF stats -->
  <rect x="480" y="95" width="165" height="70" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="562" y="115" text-anchor="middle" fill="#15803d" font-size="10" font-weight="700">performance statistics</text>
  <text x="562" y="129" text-anchor="middle" fill="#15803d" font-size="10">for SJF</text>
  <text x="562" y="143" text-anchor="middle" fill="#64748b" font-size="9">(avg wait, throughput, ...)</text>

  <!-- RR stats -->
  <rect x="480" y="180" width="165" height="70" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="562" y="200" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="700">performance statistics</text>
  <text x="562" y="214" text-anchor="middle" fill="#9a3412" font-size="10">for RR (q = 14)</text>
  <text x="562" y="228" text-anchor="middle" fill="#64748b" font-size="9">(avg wait, throughput, ...)</text>

  <!-- ========== Bottom note ========== -->
  <rect x="10" y="265" width="640" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="330" y="284" text-anchor="middle" fill="#374151" font-size="11" font-weight="700">Trace-Driven Simulation</text>
  <text x="330" y="300" text-anchor="middle" fill="#64748b" font-size="10">The trace tape captures the exact sequence of CPU/I/O bursts from a real system.</text>
  <text x="330" y="316" text-anchor="middle" fill="#64748b" font-size="10">Running multiple algorithms against the same trace enables fair, apples-to-apples comparison.</text>
</svg>
