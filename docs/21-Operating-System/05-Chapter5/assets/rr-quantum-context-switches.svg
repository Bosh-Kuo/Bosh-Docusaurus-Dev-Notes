<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 200" width="540" height="200"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <!-- Title -->
  <text x="270" y="18" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">
    Effect of Time Quantum on Context Switches  (process time = 10 units)
  </text>

  <!-- Column headers -->
  <text x="218" y="36" text-anchor="middle" fill="#64748b" font-size="11">quantum</text>
  <text x="330" y="36" text-anchor="middle" fill="#64748b" font-size="11">context switches</text>

  <!-- ===== Row 1: quantum = 12 (no context switch) ===== -->
  <text x="40" y="70" fill="#374151" font-size="12" font-weight="600">quantum = 12</text>

  <!-- Single block for process (done in &lt;1 quantum) -->
  <rect x="130" y="53" width="180" height="28" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="175" y="72" text-anchor="middle" fill="#1e40af" font-size="11">process (10 units)</text>
  <!-- time axis -->
  <line x1="130" y1="81" x2="312" y2="81" stroke="#94a3b8" stroke-width="1"/>
  <text x="130" y="94" text-anchor="middle" fill="#64748b" font-size="10">0</text>
  <text x="310" y="94" text-anchor="middle" fill="#64748b" font-size="10">10</text>

  <!-- Context switches count -->
  <text x="330" y="70" text-anchor="middle" fill="#16a34a" font-size="16" font-weight="700">0</text>

  <!-- ===== Row 2: quantum = 6 (1 context switch) ===== -->
  <text x="40" y="125" fill="#374151" font-size="12" font-weight="600">quantum = 6</text>

  <!-- Two blocks -->
  <rect x="130" y="108" width="108" height="28" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="184" y="127" text-anchor="middle" fill="#1e40af" font-size="11">0-6</text>
  <rect x="240" y="108" width="72" height="28" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="276" y="127" text-anchor="middle" fill="#1e40af" font-size="11">6-10</text>
  <!-- context switch marker -->
  <line x1="240" y1="108" x2="240" y2="136" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- time axis -->
  <line x1="130" y1="136" x2="312" y2="136" stroke="#94a3b8" stroke-width="1"/>
  <text x="130" y="149" text-anchor="middle" fill="#64748b" font-size="10">0</text>
  <text x="240" y="149" text-anchor="middle" fill="#64748b" font-size="10">6</text>
  <text x="310" y="149" text-anchor="middle" fill="#64748b" font-size="10">10</text>

  <!-- Context switches count -->
  <text x="330" y="126" text-anchor="middle" fill="#d97706" font-size="16" font-weight="700">1</text>

  <!-- ===== Row 3: quantum = 1 (9 context switches) ===== -->
  <text x="40" y="178" fill="#374151" font-size="12" font-weight="600">quantum = 1</text>

  <!-- Ten tiny blocks 0-1, 1-2, ... 9-10 -->
  <!-- Each block width = 18px, start x=130 -->
  <rect x="130" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="148" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="166" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="184" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="202" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="220" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="238" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="256" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="274" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <rect x="292" y="160" width="18" height="28" rx="1" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <!-- dashed lines for each context switch (at x=148,166,...,292) -->
  <line x1="148" y1="160" x2="148" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="166" y1="160" x2="166" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="184" y1="160" x2="184" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="202" y1="160" x2="202" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="220" y1="160" x2="220" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="238" y1="160" x2="238" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="256" y1="160" x2="256" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="274" y1="160" x2="274" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="292" y1="160" x2="292" y2="188" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- time axis -->
  <line x1="130" y1="188" x2="315" y2="188" stroke="#94a3b8" stroke-width="1"/>
  <text x="130" y="199" text-anchor="middle" fill="#64748b" font-size="10">0</text>
  <text x="310" y="199" text-anchor="middle" fill="#64748b" font-size="10">10</text>

  <!-- Context switches count -->
  <text x="330" y="180" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="700">9</text>

  <!-- Key insight -->
  <rect x="360" y="50" width="168" height="130" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="444" y="70" text-anchor="middle" fill="#92400e" font-size="11" font-weight="700">Key Insight</text>
  <text x="444" y="88" text-anchor="middle" fill="#92400e" font-size="10">Smaller quantum</text>
  <text x="444" y="102" text-anchor="middle" fill="#92400e" font-size="10">= better fairness</text>
  <text x="444" y="116" text-anchor="middle" fill="#92400e" font-size="10">but more overhead</text>
  <line x1="375" y1="126" x2="517" y2="126" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="444" y="141" text-anchor="middle" fill="#92400e" font-size="10">Rule of thumb:</text>
  <text x="444" y="155" text-anchor="middle" fill="#92400e" font-size="10">80% of CPU bursts</text>
  <text x="444" y="169" text-anchor="middle" fill="#92400e" font-size="10">shorter than quantum</text>
</svg>
