<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" width="420" height="580" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- dots top -->
  <text x="170" y="28" fill="#64748b" font-size="18" text-anchor="middle">•  •  •</text>

  <!-- CPU burst 1 -->
  <rect x="60" y="45" width="200" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="71" fill="#1e40af" text-anchor="middle" font-weight="600">load store</text>
  <text x="160" y="89" fill="#1e40af" text-anchor="middle">add store</text>
  <text x="160" y="107" fill="#1e40af" text-anchor="middle">read from file</text>
  <!-- label -->
  <text x="280" y="92" fill="#1d4ed8" font-size="12" font-weight="600">CPU burst</text>
  <line x1="265" y1="85" x2="275" y2="85" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="265" y1="85" x2="265" y2="125" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="265" y1="125" x2="275" y2="125" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Arrow -->
  <line x1="160" y1="125" x2="160" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- I/O burst 1 -->
  <rect x="60" y="150" width="200" height="40" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="160" y="176" fill="#15803d" text-anchor="middle" font-weight="600">wait for I/O</text>
  <!-- label -->
  <text x="280" y="176" fill="#15803d" font-size="12" font-weight="600">I/O burst</text>
