  <line x1="265" y1="465" x2="275" y2="465" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Arrow -->
  <line x1="160" y1="465" x2="160" y2="488" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- I/O burst 3 -->
  <rect x="60" y="490" width="200" height="40" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="160" y="516" fill="#15803d" text-anchor="middle" font-weight="600">wait for I/O</text>
  <!-- label -->
  <text x="280" y="516" fill="#15803d" font-size="12" font-weight="600">I/O burst</text>
  <line x1="265" y1="510" x2="275" y2="510" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="265" y1="510" x2="265" y2="530" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="265" y1="530" x2="275" y2="530" stroke="#16a34a" stroke-width="1.5"/>

  <!-- dots bottom -->
  <text x="170" y="558" fill="#64748b" font-size="18" text-anchor="middle">•  •  •</text>
