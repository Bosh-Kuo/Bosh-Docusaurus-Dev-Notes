  <line x1="265" y1="170" x2="265" y2="190" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="265" y1="190" x2="275" y2="190" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Arrow -->
  <line x1="160" y1="190" x2="160" y2="213" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

