<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160"
     font-family="'Segoe UI', Arial, sans-serif" font-size="12">

  <!-- Title -->
  <text x="280" y="18" text-anchor="middle" fill="#374151" font-size="13" font-weight="600">
    Round-Robin (quantum = 4 ms)    P1(24) P2(3) P3(3)    Avg Waiting = 5.66 ms
  </text>

  <!-- Scale: 1ms = 14px, start x=30 -->
  <!-- Timeline: P1(0-4), P2(4-7), P3(7-10), P1(10-14), P1(14-18), P1(18-22), P1(22-26), P1(26-30) -->

  <!-- P1: 0-4 → x=30, w=56 -->
  <rect x="30" y="26" width="56" height="40" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="58" y="50" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- P2: 4-7 → x=86, w=42 -->
  <rect x="86" y="26" width="42" height="40" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="107" y="50" text-anchor="middle" fill="#15803d" font-weight="700" font-size="13">P2</text>

  <!-- P3: 7-10 → x=128, w=42 -->
  <rect x="128" y="26" width="42" height="40" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="149" y="50" text-anchor="middle" fill="#5b21b6" font-weight="700" font-size="13">P3</text>

  <!-- P1: 10-14 → x=170, w=56 -->
  <rect x="170" y="26" width="56" height="40" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="198" y="50" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- P1: 14-18 → x=226, w=56 -->
  <rect x="226" y="26" width="56" height="40" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="254" y="50" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- P1: 18-22 → x=282, w=56 -->
  <rect x="282" y="26" width="56" height="40" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="310" y="50" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- P1: 22-26 → x=338, w=56 -->
  <rect x="338" y="26" width="56" height="40" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="366" y="50" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- P1: 26-30 → x=394, w=56 -->
  <rect x="394" y="26" width="56" height="40" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="422" y="50" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">P1</text>

  <!-- Quantum boundary markers (dashed vertical lines) -->
  <line x1="86" y1="26" x2="86" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="128" y1="26" x2="128" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="170" y1="26" x2="170" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="226" y1="26" x2="226" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="282" y1="26" x2="282" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="338" y1="26" x2="338" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="394" y1="26" x2="394" y2="66" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Axis and ticks -->
  <line x1="24" y1="66" x2="460" y2="66" stroke="#94a3b8" stroke-width="1"/>
  <!-- Tick marks at each segment boundary -->
  <line x1="30" y1="62" x2="30" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="30" y="84" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <line x1="86" y1="62" x2="86" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="86" y="84" text-anchor="middle" fill="#64748b" font-size="11">4</text>
  <line x1="128" y1="62" x2="128" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="128" y="84" text-anchor="middle" fill="#64748b" font-size="11">7</text>
  <line x1="170" y1="62" x2="170" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="170" y="84" text-anchor="middle" fill="#64748b" font-size="11">10</text>
  <line x1="226" y1="62" x2="226" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="226" y="84" text-anchor="middle" fill="#64748b" font-size="11">14</text>
  <line x1="282" y1="62" x2="282" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="282" y="84" text-anchor="middle" fill="#64748b" font-size="11">18</text>
  <line x1="338" y1="62" x2="338" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="338" y="84" text-anchor="middle" fill="#64748b" font-size="11">22</text>
  <line x1="394" y1="62" x2="394" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="394" y="84" text-anchor="middle" fill="#64748b" font-size="11">26</text>
  <line x1="450" y1="62" x2="450" y2="71" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="84" text-anchor="middle" fill="#64748b" font-size="11">30</text>

  <!-- Waiting time annotations -->
  <text x="30" y="103" fill="#64748b" font-size="11">
    Waiting:  P1 = 6 ms (10-4),  P2 = 4 ms (4-0),  P3 = 7 ms (7-0)
  </text>

  <!-- Legend note -->
  <rect x="30" y="116" width="500" height="34" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="280" y="131" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">
    Each process gets at most 4 ms per turn; P1 needs 6 turns (24 ms total) and loops until done
  </text>
  <text x="280" y="146" text-anchor="middle" fill="#92400e" font-size="11">
    P2 and P3 finish within one quantum and release the CPU voluntarily
  </text>
</svg>
