<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── LEFT: single-threaded process ── -->
  <!-- shared resources -->
  <rect x="30" y="20" width="66" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="63" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">code</text>

  <rect x="104" y="20" width="66" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="137" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">data</text>

  <rect x="178" y="20" width="66" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="211" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">files</text>

  <!-- per-thread resources (only one thread) -->
  <rect x="30" y="72" width="66" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="63" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">registers</text>

  <rect x="104" y="72" width="66" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="137" y="92" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#15803d">PC</text>

  <rect x="178" y="72" width="66" height="32" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="211" y="92" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#15803d">stack</text>

  <!-- thread execution arrow -->
  <line x1="137" y1="118" x2="137" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <!-- wavy decoration on arrow -->
  <path d="M130,130 Q137,140 144,130 Q151,120 158,130" fill="none" stroke="#374151" stroke-width="1.5"/>
  <path d="M130,150 Q137,160 144,150 Q151,140 158,150" fill="none" stroke="#374151" stroke-width="1.5"/>
  <path d="M130,170 Q137,180 144,170 Q151,160 158,170" fill="none" stroke="#374151" stroke-width="1.5"/>

  <!-- label -->
  <text x="137" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">thread</text>

  <!-- process border -->
  <rect x="18" y="8" width="240" height="246" rx="8" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="138" y="270" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">single-threaded process</text>

  <!-- ── DIVIDER ── -->
  <line x1="378" y1="10" x2="378" y2="280" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ── RIGHT: multithreaded process ── -->
  <!-- shared resources (span full width) -->
  <rect x="410" y="20" width="66" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="443" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">code</text>

  <rect x="484" y="20" width="66" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="517" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">data</text>

  <rect x="558" y="20" width="66" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="591" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">files</text>

  <!-- Thread 1 per-thread resources -->
  <rect x="410" y="72" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="440" y="90" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">registers</text>
  <rect x="410" y="106" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="440" y="124" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">stack</text>
  <rect x="410" y="140" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="440" y="158" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">PC</text>

  <!-- Thread 2 per-thread resources -->
  <rect x="484" y="72" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="514" y="90" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">registers</text>
  <rect x="484" y="106" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="514" y="124" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">stack</text>
  <rect x="484" y="140" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="514" y="158" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">PC</text>

  <!-- Thread 3 per-thread resources -->
  <rect x="558" y="72" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="588" y="90" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">registers</text>
  <rect x="558" y="106" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="588" y="124" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">stack</text>
  <rect x="558" y="140" width="60" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="588" y="158" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">PC</text>

  <!-- Three thread execution arrows -->
  <line x1="440" y1="174" x2="440" y2="216" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="514" y1="174" x2="514" y2="216" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="588" y1="174" x2="588" y2="216" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- thread labels -->
  <text x="440" y="230" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">thread</text>
  <text x="514" y="230" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">thread</text>
  <text x="588" y="230" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">thread</text>

  <!-- process border -->
  <rect x="396" y="8" width="248" height="246" rx="8" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="520" y="270" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#374151">multithreaded process</text>
</svg>
