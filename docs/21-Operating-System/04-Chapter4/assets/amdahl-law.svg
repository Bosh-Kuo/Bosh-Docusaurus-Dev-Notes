<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="380" fill="white"/>

  <!-- Title -->
  <text x="250" y="22" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#374151">Amdahl's Law</text>

  <!-- Chart area: x=60..460, y=40..300 -->
  <!-- Y axis -->
  <line x1="60" y1="40" x2="60" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- X axis -->
  <line x1="60" y1="300" x2="470" y2="300" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Y axis label -->
  <text x="15" y="175" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151" transform="rotate(-90,15,175)">Speedup</text>

  <!-- X axis label -->
  <text x="265" y="330" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151">Number of Processing Cores (N)</text>

  <!-- Grid + Y tick labels: 0,2,4,6,8,10,12,14,16 -->
  <!-- chart height = 260px for range 0-16; each unit = 16.25px -->
  <!-- chart width = 400px for range 0-16; each unit = 25px -->

  <!-- Y ticks -->
  <text x="52" y="304" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">0</text>
  <text x="52" y="271" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">2</text>
  <text x="52" y="239" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">4</text>
  <text x="52" y="206" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">6</text>
  <text x="52" y="173" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">8</text>
  <text x="52" y="141" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">10</text>
  <text x="52" y="108" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">12</text>
  <text x="52" y="75" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">14</text>
  <text x="52" y="43" font-family="sans-serif" font-size="10" text-anchor="end" fill="#6b7280">16</text>

  <!-- X ticks -->
  <text x="60" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">0</text>
  <text x="85" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">2</text>
  <text x="110" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">4</text>
  <text x="135" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">6</text>
  <text x="160" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">8</text>
  <text x="185" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">10</text>
  <text x="210" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">12</text>
  <text x="235" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">14</text>
  <text x="260" y="315" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">16</text>

  <!-- Grid lines (light) -->
  <line x1="60" y1="268" x2="460" y2="268" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="236" x2="460" y2="236" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="203" x2="460" y2="203" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="171" x2="460" y2="171" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="138" x2="460" y2="138" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="106" x2="460" y2="106" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="73" x2="460" y2="73" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="41" x2="460" y2="41" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Helper: x(N)=60+N*12.5, y(S)=300-S*16.25 -->
  <!-- N: 0,2,4,6,8,10,12,14,16 → x: 60,85,110,135,160,185,210,235,260 -->

  <!-- Ideal Speedup line: speedup = N, so S at N=16 would be 16 -->
  <!-- Points: (0,1),(2,2),(4,4),(6,6),(8,8),(10,10),(12,12),(14,14),(16,16) -->
  <!-- y(1)=283.75, y(2)=267.5, y(4)=235, y(6)=202.5, y(8)=170, y(10)=137.5, y(12)=105, y(14)=72.5, y(16)=40 -->
  <polyline points="60,283.75 85,267.5 110,235 135,202.5 160,170 185,137.5 210,105 235,72.5 260,40" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- S=0.05 (5% serial): speedup = 1/(0.05 + 0.95/N) -->
  <!-- N=1:1/(0.05+0.95)=1, N=2:1/(0.05+0.475)=1.905, N=4:1/(0.05+0.2375)=3.478, N=8:1/(0.05+0.11875)=5.926, N=16:1/(0.05+0.059375)=9.14 -->
  <!-- y: 1→283.75, 1.905→269.0, 3.478→243.5, 5.926→203.7, 9.14→151.5 -->
  <polyline points="60,283.75 85,269.0 110,243.5 135,225.0 160,208.6 185,196.0 210,186.5 235,179.5 260,151.5" fill="none" stroke="#16a34a" stroke-width="2"/>

  <!-- S=0.10 (10% serial): speedup = 1/(0.10 + 0.90/N) -->
  <!-- N=1:1.0, N=2:1/(0.1+0.45)=1.818, N=4:1/(0.1+0.225)=3.077, N=8:1/(0.1+0.1125)=4.706, N=16:1/(0.1+0.05625)=6.4 -->
  <polyline points="60,283.75 85,270.5 110,250.0 135,234.7 160,223.7 185,215.6 210,208.5 235,203.0 260,196.0" fill="none" stroke="#2563eb" stroke-width="2"/>

  <!-- S=0.50 (50% serial): speedup = 1/(0.50 + 0.50/N) -->
  <!-- N=1:1.0, N=2:1/(0.5+0.25)=1.333, N=4:1/(0.5+0.125)=1.6, N=8:1/(0.5+0.0625)=1.778, N=16:1/(0.5+0.03125)=1.882 -->
  <polyline points="60,283.75 85,278.1 110,273.9 135,271.1 160,270.6 185,268.8 210,268.4 235,267.9 260,269.4" fill="none" stroke="#dc2626" stroke-width="2"/>

  <!-- Legend -->
  <rect x="280" y="60" width="200" height="100" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <line x1="292" y1="80" x2="316" y2="80" stroke="#374151" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="324" y="84" font-family="sans-serif" font-size="11" fill="#374151">Ideal Speedup</text>

  <line x1="292" y1="100" x2="316" y2="100" stroke="#16a34a" stroke-width="2"/>
  <text x="324" y="104" font-family="sans-serif" font-size="11" fill="#374151">S = 0.05</text>

  <line x1="292" y1="120" x2="316" y2="120" stroke="#2563eb" stroke-width="2"/>
  <text x="324" y="124" font-family="sans-serif" font-size="11" fill="#374151">S = 0.10</text>

  <line x1="292" y1="140" x2="316" y2="140" stroke="#dc2626" stroke-width="2"/>
  <text x="324" y="144" font-family="sans-serif" font-size="11" fill="#374151">S = 0.50</text>

  <!-- Formula box -->
  <rect x="270" y="195" width="215" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="377" y="216" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#92400e">Amdahl's Law Formula</text>
  <text x="377" y="235" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">speedup ≤ 1 / (S + (1-S)/N)</text>
  <text x="377" y="254" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">S = serial fraction</text>
  <text x="377" y="270" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">N = number of cores</text>
  <text x="377" y="278" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">As N→∞, speedup → 1/S</text>
</svg>
