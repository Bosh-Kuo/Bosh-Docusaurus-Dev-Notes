<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" width="620" height="380">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── TOP: Data Parallelism ── -->
  <text x="20" y="22" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">Data Parallelism</text>
  <text x="20" y="38" font-family="sans-serif" font-size="11" fill="#6b7280">Same operation applied to different subsets of the same data</text>

  <!-- Large data array split into 4 -->
  <text x="310" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">data</text>
  <rect x="80"  y="65" width="115" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="137" y="84" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">data[0..N/4-1]</text>

  <rect x="200" y="65" width="115" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="257" y="84" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">data[N/4..N/2-1]</text>

  <rect x="320" y="65" width="115" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="377" y="84" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">data[N/2..3N/4-1]</text>

  <rect x="440" y="65" width="115" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="497" y="84" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">data[3N/4..N-1]</text>

  <!-- Arrows down to cores -->
  <line x1="137" y1="97" x2="137" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="257" y1="97" x2="257" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="377" y1="97" x2="377" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="497" y1="97" x2="497" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Core boxes (all run same operation) -->
  <rect x="90"  y="132" width="94" height="36" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="137" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">core 0</text>
  <text x="137" y="162" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">sum()</text>

  <rect x="210" y="132" width="94" height="36" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="257" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">core 1</text>
  <text x="257" y="162" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">sum()</text>

  <rect x="330" y="132" width="94" height="36" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="377" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">core 2</text>
  <text x="377" y="162" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">sum()</text>

  <rect x="450" y="132" width="94" height="36" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="497" y="148" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">core 3</text>
  <text x="497" y="162" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">sum()</text>

  <!-- ── DIVIDER ── -->
  <line x1="20" y1="196" x2="600" y2="196" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ── BOTTOM: Task Parallelism ── -->
  <text x="20" y="218" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">Task Parallelism</text>
  <text x="20" y="234" font-family="sans-serif" font-size="11" fill="#6b7280">Different operations distributed across cores, possibly on same or different data</text>

  <!-- Same data shared by all tasks -->
  <text x="310" y="254" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d4ed8">data</text>
  <rect x="80" y="258" width="460" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="310" y="278" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1d4ed8">shared data array (same data, different operations)</text>

  <!-- Arrows down to cores -->
  <line x1="137" y1="290" x2="137" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="257" y1="290" x2="257" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="377" y1="290" x2="377" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="497" y1="290" x2="497" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Core boxes (each runs different operation) -->
  <rect x="90"  y="324" width="94" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="137" y="340" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">core 0</text>
  <text x="137" y="354" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">avg()</text>

  <rect x="210" y="324" width="94" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="257" y="340" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">core 1</text>
  <text x="257" y="354" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">variance()</text>

  <rect x="330" y="324" width="94" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="377" y="340" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">core 2</text>
  <text x="377" y="354" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">min/max()</text>

  <rect x="450" y="324" width="94" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="497" y="340" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">core 3</text>
  <text x="497" y="354" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#92400e">sort()</text>
</svg>
