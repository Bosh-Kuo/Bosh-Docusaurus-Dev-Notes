<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 318" width="720" height="318">
  <defs>
    <marker id="arr-time" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- ===== SERIAL QUEUE section ===== -->
  <text x="360" y="28" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827" font-weight="700">Serial Queue</text>
  <text x="360" y="46" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#6b7280">Tasks are removed and executed one at a time; next starts only after current completes</text>

  <!-- Thread 1 row label -->
  <text x="55" y="82" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-weight="600">Thread 1</text>

  <!-- Task segments in Thread 1 (sequential) -->
  <rect x="110" y="60" width="190" height="34" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="205" y="82" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8" font-weight="600">Task 1</text>

  <rect x="302" y="60" width="155" height="34" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="379" y="82" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534" font-weight="600">Task 2</text>

  <rect x="459" y="60" width="135" height="34" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="526" y="82" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#92400e" font-weight="600">Task 3</text>

  <!-- Idle area (right of Task 3) -->
  <rect x="596" y="60" width="108" height="34" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="650" y="82" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#9ca3af">idle</text>

  <!-- Time arrow (serial) -->
  <line x1="110" y1="106" x2="704" y2="106" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arr-time)"/>
  <text x="710" y="110" font-size="10" font-family="sans-serif" fill="#9ca3af">Time</text>

  <!-- "complete before next" annotation -->
  <text x="302" y="120" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#6b7280">^ completes</text>
  <text x="459" y="120" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#6b7280">^ completes</text>

  <!-- Divider -->
  <line x1="20" y1="138" x2="700" y2="138" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== CONCURRENT QUEUE section ===== -->
  <text x="360" y="162" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827" font-weight="700">Concurrent Queue</text>
  <text x="360" y="180" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#6b7280">Multiple tasks removed simultaneously; each assigned to an available thread and executed in parallel</text>

  <!-- Thread 1 row -->
  <text x="55" y="213" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-weight="600">Thread 1</text>
  <rect x="110" y="195" width="190" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="205" y="215" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8" font-weight="600">Task 1</text>

  <!-- Thread 2 row -->
  <text x="55" y="248" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-weight="600">Thread 2</text>
  <rect x="110" y="230" width="155" height="30" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="187" y="250" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#166534" font-weight="600">Task 2</text>

  <!-- Thread 3 row -->
  <text x="55" y="283" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-weight="600">Thread 3</text>
  <rect x="110" y="265" width="135" height="30" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="177" y="285" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#92400e" font-weight="600">Task 3</text>

  <!-- Vertical start line (all tasks start at x=110 simultaneously) -->
  <line x1="110" y1="193" x2="110" y2="297" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="110" y="310" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#374151">all start</text>

  <!-- Time arrow (concurrent) -->
  <line x1="110" y1="300" x2="704" y2="300" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arr-time)"/>
  <text x="710" y="304" font-size="10" font-family="sans-serif" fill="#9ca3af">Time</text>
</svg>
