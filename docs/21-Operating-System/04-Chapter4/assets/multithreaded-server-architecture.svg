<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Client box -->
  <rect x="30" y="75" width="90" height="50" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="75" y="103" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#374151">client</text>

  <!-- Server box -->
  <rect x="255" y="75" width="90" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="300" y="103" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#1d4ed8">server</text>

  <!-- Thread box -->
  <rect x="500" y="35" width="110" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="555" y="65" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#15803d">thread</text>

  <!-- Arrow ①: client → server (request) -->
  <line x1="122" y1="100" x2="253" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="188" y="90" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#374151">(1) request</text>

  <!-- Arrow ②: server → thread (create new thread) -->
  <line x1="345" y1="88" x2="498" y2="62" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="432" y="63" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">(2) create new thread</text>
  <text x="432" y="76" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#15803d">to service the request</text>

  <!-- Arrow ③: server → loops back (resume listening) -->
  <!-- Curved arrow from bottom of server back up, indicating server keeps listening -->
  <path d="M300,127 C300,165 180,165 75,155 C60,154 50,145 50,130 C50,115 62,112 75,115" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="188" y="175" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#374151">(3) resume listening for additional</text>
  <text x="188" y="188" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#374151">client requests</text>
</svg>
