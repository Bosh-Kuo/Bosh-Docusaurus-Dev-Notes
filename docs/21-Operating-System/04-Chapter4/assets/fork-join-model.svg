<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" width="580" height="200">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Main thread (left) -->
  <rect x="20" y="80" width="110" height="40" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="75" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#166534" font-weight="600">main</text>
  <text x="75" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#166534" font-weight="600">thread</text>

  <!-- Task 1 (top) -->
  <rect x="235" y="18" width="110" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="43" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8" font-weight="600">task</text>

  <!-- Task 2 (bottom) -->
  <rect x="235" y="142" width="110" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="290" y="167" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8" font-weight="600">task</text>

  <!-- Main thread (right) -->
  <rect x="450" y="80" width="110" height="40" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="505" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#166534" font-weight="600">main</text>
  <text x="505" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#166534" font-weight="600">thread</text>

  <!-- Fork arrows: main_L → task1 (top) -->
  <line x1="130" y1="90" x2="233" y2="37" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Fork arrows: main_L → task2 (bottom) -->
  <line x1="130" y1="110" x2="233" y2="157" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Join arrows: task1 → main_R (top) -->
  <line x1="347" y1="37" x2="448" y2="90" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Join arrows: task2 → main_R (bottom) -->
  <line x1="347" y1="157" x2="448" y2="110" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Labels: fork (upper) -->
  <text x="178" y="51" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-style="italic">fork</text>
  <!-- Labels: fork (lower) -->
  <text x="178" y="148" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-style="italic">fork</text>

  <!-- Labels: join (upper) -->
  <text x="401" y="51" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-style="italic">join</text>
  <!-- Labels: join (lower) -->
  <text x="401" y="148" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#374151" font-style="italic">join</text>
</svg>
