<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── SECTION 1: Single-core Concurrency (Figure 4.3) ── -->
  <text x="10" y="18" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Single-core Concurrency</text>

  <!-- Row label -->
  <text x="10" y="52" font-family="sans-serif" font-size="11" fill="#6b7280">single core</text>

  <!-- Thread segments — interleaved T1 T2 T3 T4 T1 T2 T3 T4 T1 ... -->
  <!-- Colors: T1=#dcfce7, T2=#fef3c7, T3=#ddd6fe, T4=#fce7f3 -->
  <rect x="90" y="36" width="60" height="24" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">T₁</text>

  <rect x="150" y="36" width="60" height="24" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="180" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">T₂</text>

  <rect x="210" y="36" width="60" height="24" rx="2" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="240" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#5b21b6">T₃</text>

  <rect x="270" y="36" width="60" height="24" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="300" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#9d174d">T₄</text>

  <rect x="330" y="36" width="60" height="24" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">T₁</text>

  <rect x="390" y="36" width="60" height="24" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="420" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">T₂</text>

  <rect x="450" y="36" width="60" height="24" rx="2" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="480" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#5b21b6">T₃</text>

  <rect x="510" y="36" width="60" height="24" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="540" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#9d174d">T₄</text>

  <rect x="570" y="36" width="60" height="24" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="600" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">T₁</text>

  <!-- ellipsis -->
  <text x="642" y="52" font-family="sans-serif" font-size="14" fill="#6b7280">...</text>

  <!-- time axis -->
  <line x1="90" y1="74" x2="670" y2="74" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="680" y="78" font-family="sans-serif" font-size="11" fill="#374151">time</text>

  <!-- Caption -->
  <text x="380" y="95" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">Threads take turns on a single CPU — only one executes at any instant</text>

  <!-- ── DIVIDER ── -->
  <line x1="10" y1="112" x2="690" y2="112" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ── SECTION 2: Multi-core Parallelism (Figure 4.4) ── -->
  <text x="10" y="130" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">Multi-core Parallelism</text>

  <!-- Core 1 row -->
  <text x="10" y="162" font-family="sans-serif" font-size="11" fill="#6b7280">core 1</text>

  <rect x="90" y="146" width="60" height="24" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="162" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">T₁</text>

  <rect x="150" y="146" width="60" height="24" rx="2" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="180" y="162" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#5b21b6">T₃</text>

  <rect x="210" y="146" width="60" height="24" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="240" y="162" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">T₁</text>

  <rect x="270" y="146" width="60" height="24" rx="2" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="300" y="162" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#5b21b6">T₃</text>

  <rect x="330" y="146" width="60" height="24" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="162" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">T₁</text>

  <text x="402" y="162" font-family="sans-serif" font-size="14" fill="#6b7280">...</text>

  <!-- Core 2 row -->
  <text x="10" y="202" font-family="sans-serif" font-size="11" fill="#6b7280">core 2</text>

  <rect x="90" y="186" width="60" height="24" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="120" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">T₂</text>

  <rect x="150" y="186" width="60" height="24" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="180" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#9d174d">T₄</text>

  <rect x="210" y="186" width="60" height="24" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="240" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">T₂</text>

  <rect x="270" y="186" width="60" height="24" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="300" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#9d174d">T₄</text>

  <rect x="330" y="186" width="60" height="24" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="360" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">T₂</text>

  <text x="402" y="202" font-family="sans-serif" font-size="14" fill="#6b7280">...</text>

  <!-- time axis -->
  <line x1="90" y1="222" x2="670" y2="222" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="680" y="226" font-family="sans-serif" font-size="11" fill="#374151">time</text>

  <!-- Caption -->
  <text x="380" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">T₁ and T₂ execute simultaneously on different cores — true parallelism</text>
</svg>
