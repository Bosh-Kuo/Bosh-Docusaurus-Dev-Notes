<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 310" width="560" height="310">
  <defs>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#15803d"/>
    </marker>
  </defs>

  <!-- JS Layer zone -->
  <rect x="10" y="10" width="540" height="118" rx="8"
        fill="#dcfce7" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="22" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        fill="#15803d" font-weight="bold">JavaScript Layer</text>

  <!-- Main Thread box -->
  <rect x="28" y="34" width="504" height="82" rx="6"
        fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="280" y="59" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        font-weight="bold" text-anchor="middle" fill="#1e293b">Main Thread (V8 Engine)</text>
  <text x="280" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#475569">All JS code runs here  ·  one thread at a time</text>
  <!-- CPU Bound warning bar -->
  <rect x="100" y="84" width="360" height="20" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="280" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#b91c1c">✗  CPU Bound (for loops · pure JS math) — stays here, cannot be offloaded</text>

  <!-- Gap arrows: Main Thread ↔ Thread Pool (left pair) -->
  <line x1="148" y1="118" x2="148" y2="170" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="160" y1="170" x2="160" y2="118" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="10"  y="143" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#b45309">offload fs / crypto work</text>
  <text x="10"  y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#15803d">callback returned  ↑</text>

  <!-- Gap arrows: Main Thread ↔ OS I/O (right pair) -->
  <line x1="408" y1="118" x2="408" y2="170" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="420" y1="170" x2="420" y2="118" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="430" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1d4ed8">offload network I/O</text>
  <text x="430" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#15803d">I/O done  ↑</text>

  <!-- libuv Layer zone -->
  <rect x="10" y="172" width="540" height="128" rx="8"
        fill="#fef3c7" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="22" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        fill="#b45309" font-weight="bold">libuv Layer (C++ runtime)</text>

  <!-- Thread Pool box -->
  <rect x="28" y="196" width="238" height="90" rx="6"
        fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="147" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        font-weight="bold" text-anchor="middle" fill="#1e293b">Thread Pool</text>
  <text x="147" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#64748b">4 worker threads (default)</text>
  <text x="147" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#b45309">fs  ·  crypto  ·  zlib  ·  DNS</text>
  <text x="147" y="269" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#b45309">heavy C++ work needing real threads</text>

  <!-- OS I/O box -->
  <rect x="294" y="196" width="238" height="90" rx="6"
        fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="413" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        font-weight="bold" text-anchor="middle" fill="#1e293b">OS Non-blocking I/O</text>
  <text x="413" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#64748b">epoll (Linux)  ·  kqueue (macOS)</text>
  <text x="413" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#1d4ed8">TCP  ·  HTTP  ·  WebSocket</text>
  <text x="413" y="269" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1d4ed8">I/O waiting — no extra thread needed</text>
</svg>
