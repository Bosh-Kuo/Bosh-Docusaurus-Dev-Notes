<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" width="340" height="300">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- User space background -->
  <rect x="10" y="10" width="200" height="105" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="170" y="54" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">user</text>
  <text x="170" y="68" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">space</text>

  <!-- Kernel space background -->
  <rect x="10" y="185" width="200" height="105" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="170" y="232" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">kernel</text>
  <text x="170" y="246" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">space</text>

  <!-- User thread zigzag 1 (center x=70) -->
  <path d="M70,22 L82,36 L58,49 L82,62 L58,75 L70,88 L70,107" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- User thread zigzag 2 (center x=100) -->
  <path d="M100,22 L112,36 L88,49 L112,62 L88,75 L100,88 L100,107" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- LWP box (between user and kernel space) -->
  <rect x="45" y="118" width="120" height="58" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="105" y="141" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#5b21b6">LWP</text>
  <text x="105" y="158" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6d28d9">lightweight process</text>

  <!-- Kernel thread zigzag 1 (center x=70) -->
  <path d="M70,193 L82,207 L58,220 L82,233 L58,246 L70,259 L70,278" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Kernel thread zigzag 2 (center x=100) -->
  <path d="M100,193 L112,207 L88,220 L112,233 L88,246 L100,259 L100,278" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Connection: user threads bottom → LWP top -->
  <line x1="70" y1="107" x2="80" y2="118" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="100" y1="107" x2="100" y2="118" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Connection: LWP bottom → kernel threads top -->
  <line x1="80" y1="176" x2="70" y2="193" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="100" y1="176" x2="100" y2="193" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Right-side labels -->
  <text x="238" y="66" font-family="sans-serif" font-size="12" fill="#15803d">user thread</text>
  <text x="238" y="150" font-family="sans-serif" font-size="12" fill="#5b21b6">LWP</text>
  <text x="238" y="238" font-family="sans-serif" font-size="12" fill="#92400e">kernel thread</text>

  <!-- Annotation arrows (pointing left into each zone) -->
  <line x1="235" y1="66" x2="204" y2="66" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="235" y1="150" x2="163" y2="150" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="235" y1="238" x2="204" y2="238" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
</svg>
