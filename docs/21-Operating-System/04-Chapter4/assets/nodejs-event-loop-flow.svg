<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <marker id="arr-flow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Step boxes -->

  <!-- Box 1: JS async call -->
  <rect x="12" y="20" width="88" height="64" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="56" y="46" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#15803d">①</text>
  <text x="56" y="62" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">JS 呼叫</text>
  <text x="56" y="76" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">async API</text>
  <line x1="100" y1="52" x2="122" y2="52" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-flow)"/>

  <!-- Box 2: libuv handles -->
  <rect x="124" y="20" width="88" height="64" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="168" y="46" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#d97706">②</text>
  <text x="168" y="62" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">libuv 接手</text>
  <text x="168" y="76" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">背景執行</text>
  <line x1="212" y1="52" x2="234" y2="52" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-flow)"/>
  <!-- Note below box 2 -->
  <text x="168" y="98" font-family="sans-serif" font-size="8.5" text-anchor="middle" fill="#92400e">主執行緒</text>
  <text x="168" y="110" font-family="sans-serif" font-size="8.5" text-anchor="middle" fill="#92400e">繼續往下跑</text>

  <!-- Box 3: callback queued -->
  <rect x="236" y="20" width="88" height="64" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="280" y="46" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#7c3aed">③</text>
  <text x="280" y="62" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">完成</text>
  <text x="280" y="76" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">Callback 入佇列</text>
  <line x1="324" y1="52" x2="346" y2="52" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-flow)"/>

  <!-- Box 4: Event Loop polls -->
  <rect x="348" y="20" width="88" height="64" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="392" y="46" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#db2777">④</text>
  <text x="392" y="62" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">Event Loop</text>
  <text x="392" y="76" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">持續巡邏佇列</text>
  <line x1="436" y1="52" x2="458" y2="52" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-flow)"/>

  <!-- Box 5: execute callback -->
  <rect x="460" y="20" width="88" height="64" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="504" y="46" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#15803d">⑤</text>
  <text x="504" y="62" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">主執行緒空閒</text>
  <text x="504" y="76" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#374151">執行 Callback</text>

  <!-- Bottom legend -->
  <rect x="10" y="124" width="258" height="64" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="18" y="143" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">Non-blocking I/O（OS 層）</text>
  <text x="18" y="159" font-family="sans-serif" font-size="9" fill="#374151">步驟②：OS 不阻塞程式，讓主執行緒先去做別的事</text>
  <text x="18" y="175" font-family="sans-serif" font-size="9" fill="#374151">解決「怎麼不等待」的問題</text>

  <rect x="292" y="124" width="258" height="64" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="300" y="143" font-family="sans-serif" font-size="10" font-weight="bold" fill="#9d174d">Event Loop（libuv 層）</text>
  <text x="300" y="159" font-family="sans-serif" font-size="9" fill="#374151">步驟④⑤：追蹤背景工作，完成後喚回主執行緒</text>
  <text x="300" y="175" font-family="sans-serif" font-size="9" fill="#374151">解決「誰來追蹤、誰來喚回」的問題</text>
</svg>
