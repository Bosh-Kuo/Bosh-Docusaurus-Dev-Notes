<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <defs>
    <marker id="arr-flow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Box 1: JS async call -->
  <rect x="12" y="20" width="88" height="64" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="56" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16"
        font-weight="bold" text-anchor="middle" fill="#15803d">①</text>
  <text x="56" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">JS calls</text>
  <text x="56" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">async API</text>
  <line x1="100" y1="52" x2="122" y2="52" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-flow)"/>

  <!-- Box 2: libuv handles -->
  <rect x="124" y="20" width="88" height="64" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="168" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16"
        font-weight="bold" text-anchor="middle" fill="#d97706">②</text>
  <text x="168" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">libuv handles</text>
  <text x="168" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">in background</text>
  <line x1="212" y1="52" x2="234" y2="52" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-flow)"/>
  <!-- Note below: Main Thread keeps running -->
  <text x="168" y="99"  font-family="system-ui, -apple-system, sans-serif" font-size="8.5"
        text-anchor="middle" fill="#b45309">Main Thread</text>
  <text x="168" y="111" font-family="system-ui, -apple-system, sans-serif" font-size="8.5"
        text-anchor="middle" fill="#b45309">keeps running</text>

  <!-- Box 3: callback queued -->
  <rect x="236" y="20" width="88" height="64" rx="6" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="280" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16"
        font-weight="bold" text-anchor="middle" fill="#6d28d9">③</text>
  <text x="280" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">done →</text>
  <text x="280" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">callback queued</text>
  <line x1="324" y1="52" x2="346" y2="52" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-flow)"/>

  <!-- Box 4: Event Loop polls -->
  <rect x="348" y="20" width="88" height="64" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="392" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16"
        font-weight="bold" text-anchor="middle" fill="#7c3aed">④</text>
  <text x="392" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">Event Loop</text>
  <text x="392" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">polls queue</text>
  <line x1="436" y1="52" x2="458" y2="52" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-flow)"/>

  <!-- Box 5: execute callback -->
  <rect x="460" y="20" width="88" height="64" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="504" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16"
        font-weight="bold" text-anchor="middle" fill="#15803d">⑤</text>
  <text x="504" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">Main Thread free</text>
  <text x="504" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#1e293b">execute callback</text>

  <!-- Bottom legend -->
  <rect x="10" y="124" width="258" height="64" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="18" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        font-weight="bold" fill="#1d4ed8">Non-blocking I/O (OS level)</text>
  <text x="18" y="159" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        fill="#1e293b">Step ②: OS does not block the program</text>
  <text x="18" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        fill="#475569">solves "how not to wait"</text>

  <rect x="292" y="124" width="258" height="64" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="300" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        font-weight="bold" fill="#7c3aed">Event Loop (libuv level)</text>
  <text x="300" y="159" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        fill="#1e293b">Steps ④⑤: tracks background work, wakes Main Thread</text>
  <text x="300" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        fill="#475569">solves "who tracks and wakes"</text>
</svg>
