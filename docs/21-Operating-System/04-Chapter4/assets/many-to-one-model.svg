<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <!-- User space background -->
  <rect x="10" y="10" width="400" height="130" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="330" y="34" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">user</text>
  <text x="330" y="48" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#15803d">space</text>

  <!-- Kernel space background -->
  <rect x="10" y="150" width="400" height="110" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="330" y="195" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">kernel</text>
  <text x="330" y="209" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">space</text>

  <!-- User threads (5) -->
  <text x="155" y="26" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#15803d">user threads</text>

  <path d="M60,40  L70,52  L50,64  L70,76  L50,88  L60,100 L60,120" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100,40 L110,52 L90,64  L110,76 L90,88  L100,100 L100,120" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M140,40 L150,52 L130,64 L150,76 L130,88 L140,100 L140,120" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M180,40 L190,52 L170,64 L190,76 L170,88 L180,100 L180,120" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M220,40 L230,52 L210,64 L230,76 L210,88 L220,100 L220,120" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Single kernel thread (ONE) -->
  <path d="M140,160 L150,173 L130,186 L150,199 L130,212 L140,225 L140,240" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <text x="140" y="268" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#92400e">kernel threads</text>

  <!-- Many-to-one mapping: all user threads converge to ONE kernel thread -->
  <line x1="60"  y1="122" x2="140" y2="158" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="100" y1="122" x2="140" y2="158" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="140" y1="122" x2="140" y2="158" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="180" y1="122" x2="140" y2="158" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="220" y1="122" x2="140" y2="158" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Label -->
  <text x="210" y="140" font-family="sans-serif" font-size="11" fill="#dc2626">many → one</text>
</svg>
