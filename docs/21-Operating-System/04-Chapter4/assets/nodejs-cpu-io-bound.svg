<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300">
  <defs>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Title bar -->
  <rect x="10" y="10" width="540" height="34" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="280" y="32" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">判斷原則：這個工作是在「算」還是在「等」？</text>

  <!-- CPU Bound panel -->
  <rect x="10" y="56" width="262" height="234" rx="8" fill="#fff1f2" stroke="#ef4444" stroke-width="2"/>
  <text x="141" y="80" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#dc2626">CPU Bound（計算型）</text>

  <rect x="26" y="90" width="230" height="56" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="141" y="108" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#7f1d1d">for(;;)  · 排序演算法  · 矩陣運算</text>
  <text x="141" y="124" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#7f1d1d">影像轉檔  · 大型數值計算</text>
  <text x="141" y="138" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#991b1b">CPU 需要持續滿載運算</text>

  <line x1="141" y1="150" x2="141" y2="170" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <rect x="26" y="174" width="230" height="44" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="141" y="193" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#7f1d1d">主執行緒被完全佔用</text>
  <text x="141" y="209" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#991b1b">無法外包給執行緒池</text>

  <line x1="141" y1="222" x2="141" y2="242" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <rect x="26" y="246" width="230" height="36" rx="4" fill="#fca5a5" stroke="#ef4444" stroke-width="1"/>
  <text x="141" y="261" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#7f1d1d">伺服器卡死，無法回應其他請求</text>
  <text x="141" y="276" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#991b1b">→ 需要 Worker Threads 才能解決</text>

  <!-- I/O Bound panel -->
  <rect x="288" y="56" width="262" height="234" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="419" y="80" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#16a34a">I/O Bound（等待型）</text>

  <rect x="304" y="90" width="230" height="56" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="419" y="108" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#14532d">fs.readFile()  · 資料庫查詢  · HTTP</text>
  <text x="419" y="124" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#14532d">DNS 解析  · WebSocket  · 網路請求</text>
  <text x="419" y="138" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#166534">CPU 大部分時間在「等」硬體回應</text>

  <line x1="419" y1="150" x2="419" y2="170" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="304" y="174" width="230" height="44" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="419" y="193" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#14532d">外包給 libuv（Thread Pool 或 OS I/O）</text>
  <text x="419" y="209" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#166534">主執行緒立即繼續往下執行</text>

  <line x1="419" y1="222" x2="419" y2="242" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="304" y="246" width="230" height="36" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="419" y="261" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#14532d">持續接受新請求，撐起高並發</text>
  <text x="419" y="276" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#166534">→ Node.js 最核心的優勢所在</text>
</svg>
