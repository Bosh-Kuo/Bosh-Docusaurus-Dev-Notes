<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Title bar -->
  <rect x="10" y="10" width="540" height="34" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="280" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="12"
        font-weight="bold" text-anchor="middle" fill="#1e293b">Is this task computing (CPU) or waiting (I/O)?</text>

  <!-- ── CPU Bound panel ── -->
  <rect x="10" y="56" width="262" height="234" rx="8" fill="#fff1f2" stroke="#ef4444" stroke-width="2"/>
  <text x="141" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        font-weight="bold" text-anchor="middle" fill="#dc2626">CPU Bound (Compute-heavy)</text>

  <rect x="26" y="90" width="230" height="56" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="141" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#7f1d1d">for(;;)  ·  sorting  ·  matrix ops</text>
  <text x="141" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#7f1d1d">image encoding  ·  heavy math</text>
  <text x="141" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#991b1b">CPU stays busy the whole time</text>

  <line x1="141" y1="150" x2="141" y2="170" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <rect x="26" y="174" width="230" height="44" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="141" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        font-weight="bold" text-anchor="middle" fill="#7f1d1d">Main Thread fully occupied</text>
  <text x="141" y="209" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#991b1b">cannot be offloaded to Thread Pool</text>

  <line x1="141" y1="222" x2="141" y2="242" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <rect x="26" y="246" width="230" height="36" rx="4" fill="#fca5a5" stroke="#ef4444" stroke-width="1"/>
  <text x="141" y="261" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#7f1d1d">server stalls — no other request served</text>
  <text x="141" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#991b1b">Worker Threads required to unblock</text>

  <!-- ── I/O Bound panel ── -->
  <rect x="288" y="56" width="262" height="234" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="419" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="13"
        font-weight="bold" text-anchor="middle" fill="#15803d">I/O Bound (Wait-heavy)</text>

  <rect x="304" y="90" width="230" height="56" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="419" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#14532d">fs.readFile()  ·  DB query  ·  HTTP</text>
  <text x="419" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#14532d">DNS  ·  WebSocket  ·  network calls</text>
  <text x="419" y="139" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#166534">CPU mostly waits for hardware / OS</text>

  <line x1="419" y1="150" x2="419" y2="170" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="304" y="174" width="230" height="44" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="419" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        font-weight="bold" text-anchor="middle" fill="#14532d">offloaded to libuv (Thread Pool or OS I/O)</text>
  <text x="419" y="209" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#166534">Main Thread continues immediately</text>

  <line x1="419" y1="222" x2="419" y2="242" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="304" y="246" width="230" height="36" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="419" y="261" font-family="system-ui, -apple-system, sans-serif" font-size="10"
        text-anchor="middle" fill="#14532d">keeps accepting new requests</text>
  <text x="419" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="9"
        text-anchor="middle" fill="#166534">Node.js high-concurrency advantage</text>
</svg>
