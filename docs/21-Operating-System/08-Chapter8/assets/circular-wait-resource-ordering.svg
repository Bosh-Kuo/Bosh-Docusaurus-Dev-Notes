<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 168" width="680" height="168" font-family="ui-monospace, 'Courier New', monospace">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="168" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="340" y="23" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Total Resource Ordering — Circular Wait Prevention</text>

  <!-- R1 box -->
  <rect x="48" y="38" width="110" height="52" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="103" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">R1</text>
  <text x="103" y="79" text-anchor="middle" font-size="12" fill="#3b82f6">F(R1) = 1</text>

  <!-- arrow R1 to R2 -->
  <line x1="160" y1="64" x2="186" y2="64" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R2 box -->
  <rect x="190" y="38" width="110" height="52" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="245" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">R2</text>
  <text x="245" y="79" text-anchor="middle" font-size="12" fill="#3b82f6">F(R2) = 3</text>

  <!-- arrow R2 to R3 -->
  <line x1="302" y1="64" x2="328" y2="64" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R3 box -->
  <rect x="332" y="38" width="110" height="52" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="387" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">R3</text>
  <text x="387" y="79" text-anchor="middle" font-size="12" fill="#3b82f6">F(R3) = 5</text>

  <!-- arrow R3 to R4 -->
  <line x1="444" y1="64" x2="470" y2="64" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- R4 box -->
  <rect x="474" y="38" width="110" height="52" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="529" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">R4</text>
  <text x="529" y="79" text-anchor="middle" font-size="12" fill="#3b82f6">F(R4) = 7</text>

  <!-- ellipsis after R4 -->
  <text x="608" y="69" text-anchor="start" font-size="18" fill="#94a3b8">…</text>

  <!-- Divider -->
  <line x1="30" y1="104" x2="650" y2="104" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Allowed direction label -->
  <text x="340" y="123" text-anchor="middle" font-size="12" fill="#15803d" font-weight="bold">
    Allowed: threads request resources only in increasing F order  →
  </text>

  <!-- Forbidden backward arrow (right to left) -->
  <line x1="600" y1="148" x2="56" y2="148" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-r)"/>
  <text x="340" y="165" text-anchor="middle" font-size="11" fill="#b91c1c">
    Backward requests (decreasing F) are forbidden — circular wait would require F(R0) &lt; … &lt; F(Rn) &lt; F(R0), a contradiction
  </text>
</svg>
