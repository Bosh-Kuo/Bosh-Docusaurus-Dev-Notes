<svg xmlns="http://www.w3.org/2000/svg" width="580" height="410" viewBox="0 0 580 410">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="asgn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Resource: R1 (1 instance) -->
  <rect x="50" y="24" width="80" height="55" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="90" y="39" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#78350f">R1</text>
  <circle cx="90" cy="58" r="7" fill="#92400e"/>

  <!-- Resource: R3 (1 instance) -->
  <rect x="450" y="24" width="80" height="55" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="490" y="39" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#78350f">R3</text>
  <circle cx="490" cy="58" r="7" fill="#92400e"/>

  <!-- Thread: T1 -->
  <circle cx="105" cy="200" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="205" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">T1</text>

  <!-- Thread: T2 -->
  <circle cx="290" cy="200" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="290" y="205" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">T2</text>

  <!-- Thread: T3 -->
  <circle cx="475" cy="200" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="475" y="205" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">T3</text>

  <!-- Resource: R2 (2 instances) -->
  <rect x="148" y="316" width="124" height="62" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="210" y="331" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#78350f">R2</text>
  <circle cx="197" cy="354" r="7" fill="#92400e"/>
  <circle cx="223" cy="354" r="7" fill="#92400e"/>

  <!-- Resource: R4 (3 instances, no edges) -->
  <rect x="390" y="316" width="124" height="62" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="452" y="331" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#78350f">R4</text>
  <circle cx="432" cy="354" r="7" fill="#92400e"/>
  <circle cx="452" cy="354" r="7" fill="#92400e"/>
  <circle cx="472" cy="354" r="7" fill="#92400e"/>

  <!-- Request: T1 -> R1 -->
  <line x1="86" y1="161" x2="82" y2="79" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#req)"/>

  <!-- Assignment: R1 -> T2 -->
  <line x1="128" y1="55" x2="250" y2="182" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Request: T2 -> R3 -->
  <line x1="327" y1="176" x2="450" y2="73" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#req)"/>

  <!-- Assignment: R3 -> T3 -->
  <line x1="490" y1="79" x2="478" y2="160" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Assignment: R2 -> T1 (one instance) -->
  <line x1="168" y1="316" x2="112" y2="238" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Assignment: R2 -> T2 (another instance) -->
  <line x1="252" y1="316" x2="278" y2="240" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- NEW: Request: T3 -> R2 (creates deadlock) -->
  <line x1="449" y1="234" x2="268" y2="316" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#req)"/>

  <!-- Deadlock label -->
  <text x="388" y="285" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#dc2626" font-style="italic">new edge</text>

  <!-- Legend -->
  <line x1="30" y1="398" x2="62" y2="398" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>
  <text x="70" y="402" font-size="11.5" font-family="sans-serif" fill="#374151">Assignment edge (R→T)</text>
  <line x1="260" y1="398" x2="292" y2="398" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#req)"/>
  <text x="300" y="402" font-size="11.5" font-family="sans-serif" fill="#374151">Request edge (T→R)</text>
</svg>
