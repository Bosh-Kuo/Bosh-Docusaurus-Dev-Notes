<svg xmlns="http://www.w3.org/2000/svg" width="500" height="410" viewBox="0 0 500 410">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="asgn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Resource: R1 (2 instances) -->
  <rect x="38" y="24" width="116" height="60" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="96" y="40" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#78350f">R1</text>
  <circle cx="83" cy="59" r="7" fill="#92400e"/>
  <circle cx="109" cy="59" r="7" fill="#92400e"/>

  <!-- Resource: R2 (2 instances) -->
  <rect x="170" y="308" width="116" height="60" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="228" y="324" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="bold" fill="#78350f">R2</text>
  <circle cx="215" cy="343" r="7" fill="#92400e"/>
  <circle cx="241" cy="343" r="7" fill="#92400e"/>

  <!-- Thread: T1 -->
  <circle cx="96" cy="210" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="96" y="215" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">T1</text>

  <!-- Thread: T2 (not waiting — can complete) -->
  <circle cx="385" cy="88" r="42" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="385" y="85" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#14532d">T2</text>
  <text x="385" y="102" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#166534">(not waiting)</text>

  <!-- Thread: T3 -->
  <circle cx="385" cy="210" r="42" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="385" y="215" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#1e3a8a">T3</text>

  <!-- Thread: T4 (not waiting — can complete) -->
  <circle cx="385" cy="332" r="42" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="385" y="329" text-anchor="middle" font-size="15" font-family="sans-serif" font-weight="bold" fill="#14532d">T4</text>
  <text x="385" y="346" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#166534">(not waiting)</text>

  <!-- Request: T1 -> R1 (part of cycle) -->
  <line x1="96" y1="168" x2="96" y2="84" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#req)"/>

  <!-- Assignment: R1 -> T3 (part of cycle) -->
  <line x1="154" y1="68" x2="344" y2="194" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Assignment: R1 -> T2 (breaks potential full deadlock) -->
  <line x1="150" y1="42" x2="343" y2="72" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Request: T3 -> R2 (part of cycle) -->
  <line x1="359" y1="247" x2="274" y2="308" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#req)"/>

  <!-- Assignment: R2 -> T1 (part of cycle) -->
  <line x1="180" y1="322" x2="124" y2="248" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Assignment: R2 -> T4 (T4 not waiting, can release to break cycle) -->
  <line x1="286" y1="342" x2="343" y2="340" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>

  <!-- Legend -->
  <line x1="28" y1="398" x2="60" y2="398" stroke="#16a34a" stroke-width="2.2" marker-end="url(#asgn)"/>
  <text x="68" y="402" font-size="11" font-family="sans-serif" fill="#374151">Assignment (R→T)</text>
  <line x1="228" y1="398" x2="260" y2="398" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#req)"/>
  <text x="268" y="402" font-size="11" font-family="sans-serif" fill="#374151">Request (T→R)</text>
</svg>
