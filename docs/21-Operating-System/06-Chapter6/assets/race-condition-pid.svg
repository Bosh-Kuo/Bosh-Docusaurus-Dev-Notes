<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <rect x="30" y="14" width="140" height="36" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="100" y="37" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">P&#x2080;</text>

  <rect x="400" y="14" width="140" height="36" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="470" y="37" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">P&#x2081;</text>

  <!-- Timeline vertical lines -->
  <line x1="100" y1="50" x2="100" y2="390" stroke="#d1fae5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="470" y1="50" x2="470" y2="390" stroke="#bfdbfe" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Time axis label -->
  <text x="12" y="200" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" transform="rotate(-90,12,200)">time</text>
  <line x1="22" y1="60" x2="22" y2="380" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- P0: pid_t child = fork(); -->
  <rect x="30" y="58" width="140" height="36" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="100" y="75" font-family="monospace" font-size="10" fill="#166534" text-anchor="middle">pid_t child = fork();</text>
  <text x="100" y="87" font-family="sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">calls fork()</text>

  <!-- P1: pid_t child = fork(); -->
  <rect x="400" y="58" width="140" height="36" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="470" y="75" font-family="monospace" font-size="10" fill="#1e40af" text-anchor="middle">pid_t child = fork();</text>
  <text x="470" y="87" font-family="sans-serif" font-size="9" fill="#2563eb" text-anchor="middle">calls fork()</text>

  <!-- kernel: next_available_pid = 2615 -->
  <rect x="185" y="138" width="190" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="280" y="155" font-family="monospace" font-size="10" fill="#92400e" text-anchor="middle">next_available_pid</text>
  <text x="280" y="168" font-family="monospace" font-size="10" fill="#92400e" text-anchor="middle">= 2615</text>

  <!-- Arrows from P0 and P1 to kernel -->
  <line x1="140" y1="94" x2="200" y2="138" stroke="#374151" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="152" y="112" font-family="sans-serif" font-size="9" fill="#374151" text-anchor="middle">request</text>
  <text x="152" y="122" font-family="sans-serif" font-size="9" fill="#374151" text-anchor="middle">pid</text>

  <line x1="430" y1="94" x2="370" y2="138" stroke="#374151" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="420" y="112" font-family="sans-serif" font-size="9" fill="#374151" text-anchor="middle">request</text>
  <text x="420" y="122" font-family="sans-serif" font-size="9" fill="#374151" text-anchor="middle">pid</text>

  <!-- Return arrows: both get 2615 -->
  <line x1="200" y1="174" x2="140" y2="218" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="155" y="196" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626" text-anchor="middle">return 2615</text>

  <line x1="365" y1="174" x2="420" y2="218" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="413" y="196" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626" text-anchor="middle">return 2615</text>

  <!-- P0: child = 2615 -->
  <rect x="30" y="218" width="140" height="36" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="100" y="235" font-family="monospace" font-size="10" fill="#991b1b" text-anchor="middle">child = 2615</text>
  <text x="100" y="248" font-family="sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">assigned!</text>

  <!-- P1: child = 2615 -->
  <rect x="400" y="218" width="140" height="36" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="470" y="235" font-family="monospace" font-size="10" fill="#991b1b" text-anchor="middle">child = 2615</text>
  <text x="470" y="248" font-family="sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">assigned!</text>

  <!-- Warning annotation -->
  <rect x="140" y="280" width="280" height="52" rx="6" fill="#fff1f2" stroke="#dc2626" stroke-width="2"/>
  <text x="280" y="300" font-family="sans-serif" font-size="11" font-weight="bold" fill="#dc2626" text-anchor="middle">Race Condition!</text>
  <text x="280" y="316" font-family="sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">Two separate processes assigned</text>
  <text x="280" y="328" font-family="sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">the same PID (2615)</text>

  <!-- lines to warning -->
  <line x1="100" y1="254" x2="180" y2="280" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="470" y1="254" x2="380" y2="280" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- "emit" label at bottom of kernel box -->
  <text x="280" y="356" font-family="sans-serif" font-size="9" fill="#d97706" text-anchor="middle">← kernel did not increment next_available_pid →</text>
  <text x="280" y="368" font-family="sans-serif" font-size="9" fill="#d97706" text-anchor="middle">between the two reads</text>

</svg>
