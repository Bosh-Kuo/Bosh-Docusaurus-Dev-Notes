<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="420" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="340" y="26" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">ResourceAllocator Monitor — Conditional Wait</text>

  <!-- Monitor box -->
  <rect x="220" y="42" width="300" height="290" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="370" y="64" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">monitor ResourceAllocator</text>

  <!-- Variables inside monitor -->
  <rect x="240" y="74" width="260" height="44" rx="6" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="370" y="92" font-family="monospace" font-size="10" fill="#1e40af" text-anchor="middle">boolean busy = false</text>
  <text x="370" y="108" font-family="monospace" font-size="10" fill="#1e40af" text-anchor="middle">condition x</text>

  <!-- acquire() function -->
  <rect x="240" y="130" width="260" height="72" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="250" y="148" font-family="monospace" font-size="10" font-weight="bold" fill="#166534">acquire(int time) {</text>
  <text x="258" y="164" font-family="monospace" font-size="10" fill="#374151">  if (busy)</text>
  <text x="258" y="178" font-family="monospace" font-size="10" fill="#be185d">    x.wait(time);  // priority = time</text>
  <text x="258" y="192" font-family="monospace" font-size="10" fill="#374151">  busy = true;</text>
  <text x="250" y="206" font-family="monospace" font-size="10" font-weight="bold" fill="#166534">}</text>

  <!-- release() function -->
  <rect x="240" y="216" width="260" height="58" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.2"/>
  <text x="250" y="234" font-family="monospace" font-size="10" font-weight="bold" fill="#be185d">release() {</text>
  <text x="258" y="250" font-family="monospace" font-size="10" fill="#374151">  busy = false;</text>
  <text x="258" y="266" font-family="monospace" font-size="10" fill="#1e40af">  x.signal();</text>
  <text x="250" y="282" font-family="monospace" font-size="10" font-weight="bold" fill="#be185d">}</text>

  <!-- ===== LEFT: Competing Processes ===== -->
  <text x="100" y="60" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">Competing Processes</text>

  <!-- Process boxes -->
  <rect x="24" y="72" width="140" height="44" rx="6" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5"/>
  <text x="94" y="91" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">Process A</text>
  <text x="94" y="107" font-family="monospace" font-size="9" fill="#374151" text-anchor="middle">R.acquire(3)</text>

  <rect x="24" y="130" width="140" height="44" rx="6" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5"/>
  <text x="94" y="149" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">Process B</text>
  <text x="94" y="165" font-family="monospace" font-size="9" fill="#374151" text-anchor="middle">R.acquire(7)</text>

  <rect x="24" y="188" width="140" height="44" rx="6" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5"/>
  <text x="94" y="207" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151" text-anchor="middle">Process C</text>
  <text x="94" y="223" font-family="monospace" font-size="9" fill="#374151" text-anchor="middle">R.acquire(5)</text>

  <!-- Arrows from processes to monitor -->
  <line x1="164" y1="94" x2="218" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="164" y1="152" x2="218" y2="185" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="164" y1="210" x2="218" y2="210" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== RIGHT: Conditional Wait Queue ===== -->
  <text x="576" y="60" font-family="sans-serif" font-size="10" font-weight="bold" fill="#be185d" text-anchor="middle">x condition queue</text>
  <text x="576" y="74" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">(sorted by priority number)</text>

  <!-- Sorted queue visualization -->
  <rect x="530" y="84" width="56" height="34" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="558" y="100" font-family="sans-serif" font-size="9" font-weight="bold" fill="#be185d" text-anchor="middle">A</text>
  <text x="558" y="113" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">pri=3</text>

  <rect x="530" y="126" width="56" height="34" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="558" y="142" font-family="sans-serif" font-size="9" font-weight="bold" fill="#be185d" text-anchor="middle">C</text>
  <text x="558" y="155" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">pri=5</text>

  <rect x="530" y="168" width="56" height="34" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="558" y="184" font-family="sans-serif" font-size="9" font-weight="bold" fill="#be185d" text-anchor="middle">B</text>
  <text x="558" y="197" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">pri=7</text>

  <!-- Sort indicator -->
  <text x="558" y="228" font-family="sans-serif" font-size="9" fill="#5b21b6" text-anchor="middle">↑ smallest priority</text>
  <text x="558" y="240" font-family="sans-serif" font-size="9" fill="#5b21b6" text-anchor="middle">resumed first</text>

  <!-- Arrow from monitor to queue -->
  <line x1="522" y1="175" x2="528" y2="145" stroke="#db2777" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-blue)"/>

  <!-- Bottom: usage sequence -->
  <rect x="20" y="340" width="640" height="64" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="340" y="358" font-family="sans-serif" font-size="9" font-weight="bold" fill="#5b21b6" text-anchor="middle">Required Usage Sequence for Each Process</text>
  <text x="340" y="374" font-family="monospace" font-size="10" fill="#374151" text-anchor="middle">R.acquire(t);  →  access the resource;  →  R.release();</text>
  <text x="340" y="394" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">t = maximum time the process plans to use the resource (used as priority number)</text>

</svg>
