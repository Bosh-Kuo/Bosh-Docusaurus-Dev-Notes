<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 530" width="700" height="530">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-sm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <!-- Clip to top-cap (shared data + condition queues, down to y=205) -->
    <clipPath id="topCapCV">
      <rect x="0" y="0" width="700" height="205"/>
    </clipPath>
    <!-- Clip to bottom-cap (initialization code, from y=415) -->
    <clipPath id="btmCapCV">
      <rect x="0" y="415" width="700" height="115"/>
    </clipPath>
  </defs>

  <!-- Canvas background -->
  <rect x="0" y="0" width="700" height="530" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Oval: cx=310 cy=278 rx=163 ry=220  (top y=58, bottom y=498) -->

  <!-- 1. White oval base -->
  <ellipse cx="310" cy="278" rx="163" ry="220" fill="white" stroke="none"/>

  <!-- 2. Blue top cap — clipped to y < 205 -->
  <ellipse cx="310" cy="278" rx="163" ry="220" fill="#bfdbfe" stroke="none" clip-path="url(#topCapCV)"/>

  <!-- 3. Blue bottom cap — clipped to y > 415 -->
  <ellipse cx="310" cy="278" rx="163" ry="220" fill="#bfdbfe" stroke="none" clip-path="url(#btmCapCV)"/>

  <!-- 4. Oval outline -->
  <ellipse cx="310" cy="278" rx="163" ry="220" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- Separator at y=205 -->
  <!-- half-width = 163*sqrt(1-((205-278)/220)^2) = 163*sqrt(1-(73/220)^2) ≈ 163*0.944 ≈ 154 -->
  <!-- x: 156 to 464 -->
  <line x1="156" y1="205" x2="464" y2="205" stroke="#374151" stroke-width="1.5"/>

  <!-- Separator at y=415 -->
  <!-- half-width = 163*sqrt(1-((415-278)/220)^2) = 163*sqrt(1-(137/220)^2) ≈ 163*0.779 ≈ 127 -->
  <!-- x: 183 to 437 -->
  <line x1="183" y1="415" x2="437" y2="415" stroke="#374151" stroke-width="1.5"/>

  <!-- "shared data" label in top blue cap -->
  <text x="310" y="87" font-family="sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">shared data</text>

  <!-- ===== Condition variable queues inside blue cap ===== -->

  <!-- x condition queue (y ~120–140) -->
  <text x="176" y="135" font-family="monospace" font-size="11" fill="#374151">x</text>
  <line x1="186" y1="130" x2="196" y2="130" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <rect x="197" y="119" width="21" height="21" rx="2" fill="#dbeafe" stroke="#374151" stroke-width="1.2"/>
  <line x1="218" y1="129" x2="226" y2="129" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <rect x="227" y="119" width="21" height="21" rx="2" fill="#dbeafe" stroke="#374151" stroke-width="1.2"/>
  <line x1="248" y1="129" x2="256" y2="129" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <rect x="257" y="119" width="21" height="21" rx="2" fill="#dbeafe" stroke="#374151" stroke-width="1.2"/>
  <!-- terminator -->
  <line x1="278" y1="129" x2="287" y2="129" stroke="#374151" stroke-width="1.2"/>
  <line x1="287" y1="123" x2="287" y2="135" stroke="#374151" stroke-width="2"/>

  <!-- y condition queue (y ~148–168) -->
  <text x="176" y="163" font-family="monospace" font-size="11" fill="#374151">y</text>
  <line x1="186" y1="158" x2="196" y2="158" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <rect x="197" y="147" width="21" height="21" rx="2" fill="#dbeafe" stroke="#374151" stroke-width="1.2"/>
  <line x1="218" y1="157" x2="226" y2="157" stroke="#374151" stroke-width="1.2" marker-end="url(#arr-sm)"/>
  <rect x="227" y="147" width="21" height="21" rx="2" fill="#dbeafe" stroke="#374151" stroke-width="1.2"/>
  <!-- terminator -->
  <line x1="248" y1="157" x2="257" y2="157" stroke="#374151" stroke-width="1.2"/>
  <line x1="257" y1="151" x2="257" y2="163" stroke="#374151" stroke-width="2"/>

  <!-- ===== "queues associated with x, y conditions" label on the left ===== -->
  <!-- Left-pointing curly brace: spans y=119 to y=168, rightward at x=148–170 -->
  <path d="M 170,119 Q 160,119 160,129 L 160,135 Q 160,143 150,143 Q 160,143 160,151 L 160,158 Q 160,168 170,168"
        stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="8" y="134" font-family="sans-serif" font-size="9" fill="#374151">queues associated with</text>
  <text x="8" y="149" font-family="sans-serif" font-size="9" fill="#374151">x, y conditions</text>

  <!-- ===== Three operation columns (y=222 to y=355, height=133) ===== -->
  <rect x="183" y="222" width="46" height="133" rx="2" fill="#d1d5db" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="253" y="222" width="46" height="133" rx="2" fill="#d1d5db" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="323" y="296" font-family="sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">···</text>
  <rect x="343" y="222" width="46" height="133" rx="2" fill="#d1d5db" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Curly brace below columns (columns end at y=355; brace y=360 to y=370) -->
  <path d="M 183,360 Q 183,371 194,371 L 274,371 Q 285,371 285,381 Q 285,371 296,371 L 378,371 Q 389,371 389,360"
        stroke="#374151" stroke-width="1.5" fill="none"/>

  <!-- "operations" label (y=395, which is < separator at y=415) -->
  <text x="285" y="398" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">operations</text>

  <!-- "initialization code" label in bottom blue cap -->
  <text x="310" y="447" font-family="sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">initialization</text>
  <text x="310" y="467" font-family="sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">code</text>

  <!-- ===== Entry queue (top-right, diagonal) ===== -->
  <!-- At y=152: half-width = 163*sqrt(1-((152-278)/220)^2) = 163*sqrt(1-(126/220)^2) = 163*sqrt(0.672) ≈ 134 -->
  <!-- Contact x = 310+134 = 444 -->
  <circle cx="444" cy="152" r="4" fill="#374151"/>

  <!-- Arrow: contact → Box 1 -->
  <line x1="444" y1="152" x2="472" y2="128" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 1 (lightest blue) -->
  <rect x="471" y="115" width="27" height="27" rx="2" fill="#bfdbfe" stroke="#374151" stroke-width="1.5"/>

  <!-- Arrow: Box 1 → Box 2 -->
  <line x1="498" y1="127" x2="523" y2="103" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2 -->
  <rect x="522" y="90" width="27" height="27" rx="2" fill="#93c5fd" stroke="#374151" stroke-width="1.5"/>

  <!-- Arrow: Box 2 → Box 3 -->
  <line x1="549" y1="102" x2="573" y2="78" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3 (darkest gray) -->
  <rect x="572" y="65" width="27" height="27" rx="2" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Terminator -->
  <line x1="599" y1="77" x2="615" y2="66" stroke="#374151" stroke-width="1.5"/>
  <line x1="612" y1="60" x2="619" y2="72" stroke="#374151" stroke-width="2.5"/>

  <!-- "entry queue" label -->
  <text x="567" y="55" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">entry queue</text>

</svg>
