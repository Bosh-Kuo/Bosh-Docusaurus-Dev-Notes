<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 690 180" width="690" height="180">
  <defs>
    <marker id="ew-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="ew-sm" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/>
    </marker>
    <marker id="ew-sm-r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#db2777"/>
    </marker>
  </defs>

  <!-- acquire lock label + arrow (far left) -->
  <text x="6" y="72" font-family="sans-serif" font-size="11" fill="#374151">acquire lock</text>
  <line x1="6" y1="84" x2="78" y2="84" stroke="#374151" stroke-width="2" marker-end="url(#ew-arr)"/>

  <!-- entry set container -->
  <rect x="84" y="38" width="212" height="100" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="190" y="158" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">entry set</text>

  <!-- 4 thread boxes in entry set -->
  <rect x="94"  y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="142" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="190" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="238" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- arrows between entry set boxes at y=79 -->
  <line x1="132" y1="79" x2="142" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#ew-sm)"/>
  <line x1="180" y1="79" x2="190" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#ew-sm)"/>
  <line x1="228" y1="79" x2="238" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#ew-sm)"/>

  <!-- arrow from entry set to lock box -->
  <line x1="296" y1="88" x2="328" y2="88" stroke="#374151" stroke-width="2" marker-end="url(#ew-arr)"/>

  <!-- object / lock / owner box (center) -->
  <rect x="332" y="28" width="104" height="124" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="384" y="64" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">object</text>
  <text x="384" y="83" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">lock</text>
  <line x1="344" y1="94" x2="424" y2="94" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="384" y="118" font-family="sans-serif" font-size="12" fill="#78350f" text-anchor="middle" font-style="italic">owner</text>

  <!-- "wait" label + arrow from lock to wait set -->
  <text x="473" y="54" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">wait</text>
  <line x1="436" y1="64" x2="502" y2="64" stroke="#374151" stroke-width="2" marker-end="url(#ew-arr)"/>

  <!-- wait set container -->
  <rect x="508" y="38" width="172" height="100" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
  <text x="594" y="158" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">wait set</text>

  <!-- 3 thread boxes in wait set (pink-tinted to distinguish from entry set) -->
  <rect x="518" y="60" width="38" height="38" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="566" y="60" width="38" height="38" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="614" y="60" width="38" height="38" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>

  <!-- arrows between wait set boxes at y=79 -->
  <line x1="556" y1="79" x2="566" y2="79" stroke="#db2777" stroke-width="1.3" marker-end="url(#ew-sm-r)"/>
  <line x1="604" y1="79" x2="614" y2="79" stroke="#db2777" stroke-width="1.3" marker-end="url(#ew-sm-r)"/>
</svg>
