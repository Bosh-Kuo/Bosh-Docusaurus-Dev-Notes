<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 180" width="510" height="180">
  <defs>
    <marker id="es-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="es-sm" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- acquire lock label + arrow -->
  <text x="6" y="72" font-family="sans-serif" font-size="11" fill="#374151">acquire lock</text>
  <line x1="6" y1="84" x2="78" y2="84" stroke="#374151" stroke-width="2" marker-end="url(#es-arr)"/>

  <!-- entry set container -->
  <rect x="84" y="38" width="270" height="100" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="219" y="158" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">entry set</text>

  <!-- 5 thread boxes (38x38, 10px gap) — queued left-to-right toward lock -->
  <rect x="94"  y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="142" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="190" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="238" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="286" y="60" width="38" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- small arrows between thread boxes at y=79 (center) -->
  <line x1="132" y1="79" x2="142" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#es-sm)"/>
  <line x1="180" y1="79" x2="190" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#es-sm)"/>
  <line x1="228" y1="79" x2="238" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#es-sm)"/>
  <line x1="276" y1="79" x2="286" y2="79" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#es-sm)"/>

  <!-- arrow from entry set to lock box -->
  <line x1="354" y1="88" x2="394" y2="88" stroke="#374151" stroke-width="2" marker-end="url(#es-arr)"/>

  <!-- object / lock / owner box -->
  <rect x="398" y="30" width="100" height="116" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="448" y="66" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">object</text>
  <text x="448" y="84" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">lock</text>
  <line x1="410" y1="95" x2="486" y2="95" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="448" y="118" font-family="sans-serif" font-size="12" fill="#78350f" text-anchor="middle" font-style="italic">owner</text>
</svg>
