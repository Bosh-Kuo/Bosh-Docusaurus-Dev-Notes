<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 282" width="640" height="282">

  <!-- Title -->
  <text x="320" y="22" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Linux Kernel Synchronization Mechanisms</text>

  <!-- atomic_t box -->
  <rect x="16" y="36" width="190" height="142" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="111" y="57" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">atomic_t</text>
  <line x1="24" y1="66" x2="198" y2="66" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="111" y="84" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Single integer variable updates</text>
  <text x="111" y="100" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">No locking overhead</text>
  <text x="111" y="118" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">atomic_set / atomic_add</text>
  <text x="111" y="132" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">atomic_sub / atomic_inc</text>
  <text x="111" y="146" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">atomic_read</text>
  <text x="111" y="163" font-family="sans-serif" font-size="10" font-style="italic" fill="#166534" text-anchor="middle">lightest tool</text>

  <!-- mutex lock box -->
  <rect x="226" y="36" width="190" height="142" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="321" y="57" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle">mutex lock</text>
  <line x1="234" y1="66" x2="408" y2="66" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="321" y="84" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Longer critical sections</text>
  <text x="321" y="100" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Task sleeps on contention</text>
  <text x="321" y="118" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">mutex_lock()</text>
  <text x="321" y="132" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">mutex_unlock()</text>
  <text x="321" y="146" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">woken by owner on unlock</text>
  <text x="321" y="163" font-family="sans-serif" font-size="10" font-style="italic" fill="#1d4ed8" text-anchor="middle">blocking / sleep-based</text>

  <!-- spinlock / semaphore box -->
  <rect x="436" y="36" width="190" height="142" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="531" y="57" font-family="sans-serif" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">spinlock / semaphore</text>
  <line x1="444" y1="66" x2="618" y2="66" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="531" y="84" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Short durations → spinlock</text>
  <text x="531" y="100" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Longer durations → semaphore</text>
  <text x="531" y="118" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">SMP: spinlock is fundamental lock</text>
  <text x="531" y="132" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Both are nonrecursive</text>
  <text x="531" y="146" font-family="sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">reader-writer variants available</text>
  <text x="531" y="163" font-family="sans-serif" font-size="10" font-style="italic" fill="#92400e" text-anchor="middle">busy-wait (spin) or sleep</text>

  <!-- Single vs Multi Processor comparison -->
  <rect x="16" y="196" width="608" height="70" rx="8" fill="#f8fafc" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="320" y="215" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151" text-anchor="middle">Spinlock on Single vs Multiple Processors</text>

  <rect x="30" y="223" width="278" height="32" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="169" y="237" font-family="sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Single Processor</text>
  <text x="169" y="249" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Disable / Enable kernel preemption</text>

  <rect x="336" y="223" width="278" height="32" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="475" y="237" font-family="sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Multiple Processors (SMP)</text>
  <text x="475" y="249" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">Acquire / Release spinlock</text>
</svg>
