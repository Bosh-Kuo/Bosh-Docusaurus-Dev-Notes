<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 315" width="500" height="315">
  <!-- Outer processor chip -->
  <rect x="15" y="10" width="470" height="250" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="250" y="32" text-anchor="middle" font-size="13" fill="#15803d" font-family="sans-serif" font-weight="bold">processor&#x2080;</text>

  <!-- CPU core0 (left half) -->
  <rect x="30" y="42" width="205" height="160" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="132" y="64" text-anchor="middle" font-size="12" fill="#15803d" font-family="sans-serif" font-weight="bold">CPU core&#x2080;</text>

  <!-- registers0 -->
  <rect x="50" y="76" width="165" height="34" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="132" y="98" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif">registers</text>

  <!-- L1 cache0 -->
  <rect x="50" y="123" width="165" height="34" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="132" y="145" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">L1 cache</text>

  <!-- CPU core1 (right half) -->
  <rect x="265" y="42" width="205" height="160" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="367" y="64" text-anchor="middle" font-size="12" fill="#15803d" font-family="sans-serif" font-weight="bold">CPU core&#x2081;</text>

  <!-- registers1 -->
  <rect x="285" y="76" width="165" height="34" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="367" y="98" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif">registers</text>

  <!-- L1 cache1 -->
  <rect x="285" y="123" width="165" height="34" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="367" y="145" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">L1 cache</text>

  <!-- L2 cache (shared, inside processor chip) -->
  <rect x="30" y="218" width="440" height="34" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="250" y="240" text-anchor="middle" font-size="12" fill="#5b21b6" font-family="sans-serif" font-weight="bold">L2 cache (shared)</text>

  <!-- Line from processor chip to main memory -->
  <line x1="250" y1="260" x2="250" y2="278" stroke="#374151" stroke-width="1.5"/>

  <!-- Main memory -->
  <rect x="175" y="278" width="150" height="32" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="299" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif" font-weight="bold">main memory</text>
</svg>
