<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 100" width="580" height="100">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Node 1: [prev|data|next] -->
  <rect x="52" y="32" width="28" height="34" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="80" y="32" width="64" height="34" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="144" y="32" width="28" height="34" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="66" cy="49" r="5" fill="#9ca3af"/>
  <text x="112" y="54" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1d4ed8">data</text>
  <circle cx="158" cy="49" r="5" fill="#2563eb"/>

  <!-- Node 2 -->
  <rect x="212" y="32" width="28" height="34" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="240" y="32" width="64" height="34" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="304" y="32" width="28" height="34" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="226" cy="49" r="5" fill="#2563eb"/>
  <text x="272" y="54" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1d4ed8">data</text>
  <circle cx="318" cy="49" r="5" fill="#2563eb"/>

  <!-- Node 3 -->
  <rect x="372" y="32" width="28" height="34" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="400" y="32" width="64" height="34" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="464" y="32" width="28" height="34" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="386" cy="49" r="5" fill="#2563eb"/>
  <text x="432" y="54" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1d4ed8">data</text>
  <circle cx="478" cy="49" r="5" fill="#9ca3af"/>

  <!-- null labels -->
  <text x="8" y="53" text-anchor="start" font-size="13" font-family="sans-serif" fill="#374151">null</text>
  <text x="496" y="53" text-anchor="start" font-size="13" font-family="sans-serif" fill="#374151">null</text>

  <!-- Forward arrows (below midline): Node1.next -> Node2, Node2.next -> Node3 -->
  <line x1="172" y1="58" x2="210" y2="58" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="332" y1="58" x2="370" y2="58" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backward arrows (above midline): Node2.prev -> Node1, Node3.prev -> Node2 -->
  <line x1="212" y1="40" x2="174" y2="40" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="372" y1="40" x2="334" y2="40" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- null left: Node1.prev -> null -->
  <line x1="52" y1="49" x2="32" y2="49" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- null right: Node3.next -> null -->
  <line x1="492" y1="49" x2="512" y2="49" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
