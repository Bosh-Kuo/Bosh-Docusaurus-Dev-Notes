<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" width="520" height="370">
  <!-- Title -->
  <text x="260" y="22" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">Storage Device Hierarchy</text>

  <!-- Left label: Speed -->
  <text x="16" y="55" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Fast</text>
  <line x1="16" y1="62" x2="16" y2="300" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="12,302 20,302 16,312" fill="#9ca3af"/>
  <text x="16" y="326" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Slow</text>
  <text x="16" y="200" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" transform="rotate(-90,16,200)">Speed</text>

  <!-- Right label: Capacity -->
  <text x="504" y="55" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Small</text>
  <line x1="504" y1="62" x2="504" y2="300" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="500,302 508,302 504,312" fill="#9ca3af"/>
  <text x="504" y="326" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Large</text>
  <text x="504" y="200" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" transform="rotate(90,504,200)">Capacity</text>

  <!-- Level 1: Registers (narrowest) -->
  <polygon points="210,38 310,38 322,62 198,62" fill="#1e40af"/>
  <text x="260" y="54" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Registers</text>

  <!-- Level 2: Cache -->
  <polygon points="195,64 325,64 340,88 180,88" fill="#1d4ed8"/>
  <text x="260" y="80" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Cache</text>

  <!-- Level 3: Main Memory -->
  <polygon points="175,90 345,90 365,114 155,114" fill="#2563eb"/>
  <text x="260" y="106" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Main Memory (DRAM)</text>

  <!-- Volatile / Nonvolatile divider -->
  <line x1="100" y1="124" x2="420" y2="124" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="120" y="135" font-family="sans-serif" font-size="10" fill="#16a34a" font-weight="bold">Volatile ↑</text>
  <text x="310" y="135" font-family="sans-serif" font-size="10" fill="#dc2626" font-weight="bold">↓ Nonvolatile</text>

  <!-- Level 4: NVM -->
  <polygon points="148,140 372,140 395,164 125,164" fill="#16a34a"/>
  <text x="260" y="156" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">NVM  (SSD / Flash Memory)</text>

  <!-- Level 5: HDD -->
  <polygon points="120,166 400,166 425,190 95,190" fill="#15803d"/>
  <text x="260" y="182" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Hard-Disk Drives (HDD)</text>

  <!-- Level 6: Optical -->
  <polygon points="90,192 430,192 458,216 62,216" fill="#ca8a04"/>
  <text x="260" y="208" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Optical Disk</text>

  <!-- Level 7: Tape (widest) -->
  <polygon points="58,218 462,218 490,242 30,242" fill="#b45309"/>
  <text x="260" y="234" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Magnetic Tape</text>

  <!-- Legend -->
  <rect x="60" y="268" width="14" height="14" fill="#2563eb" rx="2"/>
  <text x="80" y="280" font-family="sans-serif" font-size="11" fill="#374151">Volatile → Primary Storage</text>

  <rect x="60" y="290" width="14" height="14" fill="#16a34a" rx="2"/>
  <text x="80" y="302" font-family="sans-serif" font-size="11" fill="#374151">Nonvolatile → Secondary / Tertiary Storage</text>

  <!-- Annotations: Primary / Secondary / Tertiary -->
  <text x="462" y="90" font-family="sans-serif" font-size="9" fill="#374151">Primary</text>
  <text x="462" y="101" font-family="sans-serif" font-size="9" fill="#374151">Storage</text>
  <line x1="457" y1="38" x2="457" y2="114" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="462" y="160" font-family="sans-serif" font-size="9" fill="#374151">Secondary</text>
  <text x="462" y="171" font-family="sans-serif" font-size="9" fill="#374151">Storage</text>
  <line x1="457" y1="140" x2="457" y2="190" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="462" y="213" font-family="sans-serif" font-size="9" fill="#374151">Tertiary</text>
  <text x="462" y="224" font-family="sans-serif" font-size="9" fill="#374151">Storage</text>
  <line x1="457" y1="192" x2="457" y2="242" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
