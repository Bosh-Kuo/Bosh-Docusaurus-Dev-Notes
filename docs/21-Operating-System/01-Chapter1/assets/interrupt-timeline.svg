<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 20 640 175" width="640" height="175">
  <!-- Row labels -->
  <text x="46" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151" text-anchor="middle">CPU</text>
  <text x="46" y="140" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151" text-anchor="middle">I/O</text>
  <text x="46" y="152" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">device</text>

  <!-- Time axis -->
  <defs>
    <marker id="t-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <line x1="72" y1="175" x2="625" y2="175" stroke="#374151" stroke-width="1.5" marker-end="url(#t-arr)"/>
  <text x="630" y="179" font-family="sans-serif" font-size="11" fill="#374151">time</text>

  <!-- === CPU ROW === -->
  <!-- Segment 1: user program (before I/O request) x=72-215 -->
  <rect x="72" y="55" width="143" height="35" rx="3" fill="#d1d5db" stroke="#6b7280" stroke-width="1"/>
  <text x="143" y="76" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">user program</text>

  <!-- Segment 2: I/O transfer (CPU sends data to device driver) x=215-280 -->
  <rect x="215" y="55" width="65" height="35" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="247" y="69" font-family="sans-serif" font-size="9" fill="#92400e" text-anchor="middle">I/O</text>
  <text x="247" y="80" font-family="sans-serif" font-size="9" fill="#92400e" text-anchor="middle">transfer</text>

  <!-- Segment 3: user program (while I/O device operates) x=280-430 -->
  <rect x="280" y="55" width="150" height="35" rx="3" fill="#d1d5db" stroke="#6b7280" stroke-width="1"/>
  <text x="355" y="76" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">user program</text>

  <!-- Segment 4: ISR (interrupt service routine) x=430-545 -->
  <rect x="430" y="55" width="115" height="35" rx="3" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="487" y="70" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8" text-anchor="middle">I/O interrupt</text>
  <text x="487" y="83" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8" text-anchor="middle">processing</text>

  <!-- Segment 5: user program resumes x=545-610 -->
  <rect x="545" y="55" width="65" height="35" rx="3" fill="#d1d5db" stroke="#6b7280" stroke-width="1"/>
  <text x="577" y="76" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">user prog.</text>

  <!-- === I/O DEVICE ROW === -->
  <!-- idle: x=72-280 -->
  <rect x="72" y="120" width="208" height="30" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="176" y="139" font-family="sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">idle</text>

  <!-- transferring: x=280-430 -->
  <rect x="280" y="120" width="150" height="30" rx="3" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="355" y="139" font-family="sans-serif" font-size="11" fill="#6d28d9" text-anchor="middle">transferring</text>

  <!-- idle: x=430-610 -->
  <rect x="430" y="120" width="180" height="30" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="520" y="139" font-family="sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">idle</text>

  <!-- === Vertical event lines === -->
  <!-- Event 1: I/O request (x=215) -->
  <line x1="215" y1="37" x2="215" y2="168" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="215" y="32" font-family="sans-serif" font-size="9" fill="#d97706" text-anchor="middle">I/O request</text>

  <!-- Event 2: I/O device starts (x=280) -->
  <line x1="280" y1="37" x2="280" y2="168" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="280" y="32" font-family="sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">I/O starts</text>

  <!-- Event 3: interrupt generated (x=430) -->
  <line x1="430" y1="37" x2="430" y2="168" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="430" y="32" font-family="sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">interrupt</text>

  <!-- Event 4: ISR returns (x=545) -->
  <line x1="545" y1="37" x2="545" y2="168" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="545" y="32" font-family="sans-serif" font-size="9" fill="#2563eb" text-anchor="middle">return</text>

  <!-- Interrupt signal arrow (from I/O device up to CPU at x=430) -->
  <line x1="430" y1="120" x2="430" y2="92" stroke="#dc2626" stroke-width="1.5"/>
</svg>
