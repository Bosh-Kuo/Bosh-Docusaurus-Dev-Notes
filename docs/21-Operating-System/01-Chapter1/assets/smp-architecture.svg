<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <!-- Processor 0 box -->
  <rect x="25" y="15" width="200" height="195" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="125" y="38" text-anchor="middle" font-size="13" fill="#15803d" font-family="sans-serif" font-weight="bold">processor&#x2080;</text>

  <!-- CPU0 -->
  <rect x="45" y="50" width="160" height="38" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="125" y="74" text-anchor="middle" font-size="13" fill="#15803d" font-family="sans-serif" font-weight="bold">CPU&#x2080;</text>

  <!-- registers0 -->
  <rect x="45" y="101" width="160" height="36" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="125" y="124" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif">registers</text>

  <!-- cache0 -->
  <rect x="45" y="150" width="160" height="36" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="125" y="173" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">cache</text>

  <!-- Processor 1 box -->
  <rect x="295" y="15" width="200" height="195" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="395" y="38" text-anchor="middle" font-size="13" fill="#15803d" font-family="sans-serif" font-weight="bold">processor&#x2081;</text>

  <!-- CPU1 -->
  <rect x="315" y="50" width="160" height="38" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="395" y="74" text-anchor="middle" font-size="13" fill="#15803d" font-family="sans-serif" font-weight="bold">CPU&#x2081;</text>

  <!-- registers1 -->
  <rect x="315" y="101" width="160" height="36" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="395" y="124" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif">registers</text>

  <!-- cache1 -->
  <rect x="315" y="150" width="160" height="36" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="395" y="173" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">cache</text>

  <!-- Lines from processors down to bus -->
  <line x1="125" y1="210" x2="125" y2="240" stroke="#374151" stroke-width="1.5"/>
  <line x1="395" y1="210" x2="395" y2="240" stroke="#374151" stroke-width="1.5"/>

  <!-- System bus bar -->
  <rect x="25" y="240" width="470" height="16" rx="3" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="260" y="252" text-anchor="middle" font-size="10" fill="#374151" font-family="sans-serif">system bus</text>

  <!-- Line from bus to main memory -->
  <line x1="260" y1="256" x2="260" y2="265" stroke="#374151" stroke-width="1.5"/>

  <!-- Main memory -->
  <rect x="185" y="265" width="150" height="32" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="260" y="286" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif" font-weight="bold">main memory</text>
</svg>
