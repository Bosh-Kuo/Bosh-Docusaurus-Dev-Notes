<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 210" width="660" height="210">
  <defs>
    <!-- Standard auto-orient arrowhead (right-pointing base, rotates with line) -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-trap" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arr-ret" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- User mode background -->
  <rect x="10" y="5" width="640" height="82" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- user process executing box -->
  <rect x="25" y="20" width="148" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="99" y="44" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="sans-serif">user process executing</text>

  <!-- Arrow: user process executing -> calls system call -->
  <line x1="173" y1="40" x2="212" y2="40" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- calls system call box -->
  <rect x="214" y="20" width="130" height="40" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="279" y="44" text-anchor="middle" font-size="11" fill="#92400e" font-family="sans-serif">calls system call</text>

  <!-- Arrow: calls system call -> return from system call -->
  <line x1="344" y1="40" x2="385" y2="40" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- return from system call box -->
  <rect x="387" y="20" width="155" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="464" y="36" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="sans-serif">return from</text>
  <text x="464" y="50" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="sans-serif">system call</text>

  <!-- user mode label -->
  <text x="554" y="30" font-size="10" fill="#1d4ed8" font-family="sans-serif" font-weight="bold">user mode</text>
  <text x="554" y="44" font-size="10" fill="#374151" font-family="sans-serif">(mode bit = 1)</text>

  <!-- Dividing line -->
  <line x1="10" y1="95" x2="650" y2="95" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Kernel mode background -->
  <rect x="10" y="100" width="640" height="105" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>

  <!-- execute system call box -->
  <rect x="214" y="118" width="130" height="40" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="279" y="142" text-anchor="middle" font-size="11" fill="#15803d" font-family="sans-serif">execute system call</text>

  <!-- kernel mode label -->
  <text x="554" y="138" font-size="10" fill="#15803d" font-family="sans-serif" font-weight="bold">kernel mode</text>
  <text x="554" y="152" font-size="10" fill="#374151" font-family="sans-serif">(mode bit = 0)</text>

  <!-- Trap arrow: straight DOWN from "calls system call" bottom to "execute system call" top -->
  <line x1="279" y1="60" x2="279" y2="115" stroke="#d97706" stroke-width="2" marker-end="url(#arr-trap)"/>

  <!-- trap labels (left of trap arrow) -->
  <text x="244" y="84" font-size="10" fill="#92400e" font-family="sans-serif" font-weight="bold">trap</text>
  <text x="228" y="97" font-size="9" fill="#92400e" font-family="sans-serif">mode bit = 0</text>

  <!-- Return arrow: diagonal UP-RIGHT from "execute system call" top-right corner
       to "return from system call" bottom-center -->
  <line x1="344" y1="118" x2="464" y2="63" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-ret)"/>

  <!-- return labels (right of return arrow) -->
  <text x="400" y="84" font-size="10" fill="#1d4ed8" font-family="sans-serif" font-weight="bold">return</text>
  <text x="395" y="97" font-size="9" fill="#1d4ed8" font-family="sans-serif">mode bit = 1</text>
</svg>
