<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 195" width="420" height="195">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- hash_function(key) label -->
  <rect x="20" y="10" width="180" height="34" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="110" y="32" text-anchor="middle" font-size="13" font-family="monospace" fill="#374151">hash_function(key)</text>

  <!-- Arrow from hash_function down to array -->
  <line x1="110" y1="44" x2="110" y2="73" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Hash table array (cells: 0, 1, ..., [highlighted], ..., n) -->
  <!-- Cell 0 -->
  <rect x="20" y="75" width="52" height="34" rx="2" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="46" y="97" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">0</text>
  <!-- Cell 1 -->
  <rect x="72" y="75" width="52" height="34" rx="2" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="98" y="97" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">1</text>
  <!-- Dots -->
  <text x="148" y="97" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#9ca3af">···</text>
  <!-- Highlighted cell (hash result) -->
  <rect x="172" y="75" width="52" height="34" rx="2" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
  <!-- Dots -->
  <text x="248" y="97" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#9ca3af">···</text>
  <!-- Cell n -->
  <rect x="272" y="75" width="52" height="34" rx="2" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="298" y="97" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#374151">n</text>

  <!-- "hash map" label on right -->
  <text x="340" y="97" text-anchor="start" font-size="13" font-family="sans-serif" fill="#374151">hash map</text>

  <!-- Arrow from highlighted cell down to value -->
  <line x1="198" y1="109" x2="198" y2="145" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- value box -->
  <rect x="150" y="147" width="96" height="34" rx="4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="198" y="169" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#5b21b6">value</text>
</svg>
