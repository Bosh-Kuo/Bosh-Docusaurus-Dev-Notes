<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 230" width="500" height="230">
  <!-- Computer 0 (left) -->
  <rect x="25" y="20" width="100" height="55" rx="4" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="75" y="52" text-anchor="middle" font-size="12" fill="#374151" font-family="sans-serif">computer</text>

  <!-- Interconnect line 0-1 -->
  <line x1="125" y1="47" x2="200" y2="47" stroke="#374151" stroke-width="2"/>
  <text x="162" y="40" text-anchor="middle" font-size="9" fill="#374151" font-family="sans-serif">interconnect</text>

  <!-- Computer 1 (middle) -->
  <rect x="200" y="20" width="100" height="55" rx="4" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="250" y="52" text-anchor="middle" font-size="12" fill="#374151" font-family="sans-serif">computer</text>

  <!-- Interconnect line 1-2 -->
  <line x1="300" y1="47" x2="375" y2="47" stroke="#374151" stroke-width="2"/>
  <text x="337" y="40" text-anchor="middle" font-size="9" fill="#374151" font-family="sans-serif">interconnect</text>

  <!-- Computer 2 (right) -->
  <rect x="375" y="20" width="100" height="55" rx="4" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="425" y="52" text-anchor="middle" font-size="12" fill="#374151" font-family="sans-serif">computer</text>

  <!-- Vertical lines down from each computer -->
  <line x1="75" y1="75" x2="75" y2="155" stroke="#374151" stroke-width="1.5"/>
  <line x1="250" y1="75" x2="250" y2="155" stroke="#374151" stroke-width="1.5"/>
  <line x1="425" y1="75" x2="425" y2="155" stroke="#374151" stroke-width="1.5"/>

  <!-- Horizontal connecting line at bottom of vertical lines -->
  <line x1="75" y1="155" x2="425" y2="155" stroke="#374151" stroke-width="1.5"/>

  <!-- Line from horizontal to storage-area network -->
  <line x1="250" y1="155" x2="250" y2="168" stroke="#374151" stroke-width="1.5"/>

  <!-- Storage-area network box -->
  <rect x="145" y="168" width="210" height="52" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="250" y="189" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">storage-area</text>
  <text x="250" y="207" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">network</text>
</svg>
