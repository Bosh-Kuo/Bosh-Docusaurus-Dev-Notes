<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 275" width="320" height="275">

  <!-- K5 edges: all 10 pairs of 5 nodes -->
  <!-- Node positions (ellipse centers):
       0: (160, 28)  - top
       1: (272, 108) - upper right
       2: (228, 240) - lower right
       3: (92,  240) - lower left
       4: (48,  108) - upper left  -->

  <!-- Edges (drawn first, behind nodes) -->
  <line x1="160" y1="28" x2="272" y2="108" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="160" y1="28" x2="228" y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="160" y1="28" x2="92"  y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="160" y1="28" x2="48"  y2="108" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="272" y1="108" x2="228" y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="272" y1="108" x2="92"  y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="272" y1="108" x2="48"  y2="108" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="228" y1="240" x2="92"  y2="240" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="228" y1="240" x2="48"  y2="108" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="92"  y1="240" x2="48"  y2="108" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Node 0: top -->
  <ellipse cx="160" cy="28" rx="52" ry="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="33" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8">client</text>

  <!-- Node 1: upper right -->
  <ellipse cx="272" cy="108" rx="44" ry="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="272" y="113" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8">client</text>

  <!-- Node 2: lower right -->
  <ellipse cx="228" cy="240" rx="44" ry="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="228" y="245" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8">client</text>

  <!-- Node 3: lower left -->
  <ellipse cx="92" cy="240" rx="44" ry="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="92" y="245" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8">client</text>

  <!-- Node 4: upper left -->
  <ellipse cx="48" cy="108" rx="44" ry="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="48" y="113" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1d4ed8">client</text>
</svg>
