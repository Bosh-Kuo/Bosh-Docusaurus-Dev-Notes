<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 150" width="680" height="150">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- magnetic disk -->
  <rect x="20" y="30" width="120" height="60" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="80" y="65" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#9d174d">A</text>
  <text x="80" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">magnetic disk</text>

  <!-- arrow 1 -->
  <line x1="142" y1="60" x2="178" y2="60" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- main memory -->
  <rect x="180" y="30" width="120" height="60" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="65" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1d4ed8">A</text>
  <text x="240" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">main memory</text>

  <!-- arrow 2 -->
  <line x1="302" y1="60" x2="338" y2="60" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- cache -->
  <rect x="340" y="30" width="120" height="60" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="400" y="65" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#5b21b6">A</text>
  <text x="400" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">cache</text>

  <!-- arrow 3 -->
  <line x1="462" y1="60" x2="498" y2="60" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- hardware register -->
  <rect x="500" y="30" width="160" height="60" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="580" y="65" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#14532d">A</text>
  <text x="580" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">hardware register</text>
</svg>
