<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 330" width="260" height="330">
  <!-- max label -->
  <text x="42" y="22" text-anchor="end" font-size="11" fill="#374151" font-family="sans-serif">max</text>

  <!-- Operating system segment (top / high addresses) -->
  <rect x="50" y="15" width="140" height="58" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="48" text-anchor="middle" font-size="11" fill="#5b21b6" font-family="sans-serif">operating system</text>

  <!-- Process 1 -->
  <rect x="50" y="73" width="140" height="55" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="105" text-anchor="middle" font-size="12" fill="#15803d" font-family="sans-serif">process 1</text>

  <!-- Process 2 -->
  <rect x="50" y="128" width="140" height="55" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="120" y="160" text-anchor="middle" font-size="12" fill="#1d4ed8" font-family="sans-serif">process 2</text>

  <!-- Process 3 -->
  <rect x="50" y="183" width="140" height="55" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="120" y="215" text-anchor="middle" font-size="12" fill="#92400e" font-family="sans-serif">process 3</text>

  <!-- Process 4 -->
  <rect x="50" y="238" width="140" height="55" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="120" y="270" text-anchor="middle" font-size="12" fill="#be185d" font-family="sans-serif">process 4</text>

  <!-- Bottom empty space (free / low addresses) -->
  <rect x="50" y="293" width="140" height="22" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>

  <!-- 0 label -->
  <text x="42" y="312" text-anchor="end" font-size="11" fill="#374151" font-family="sans-serif">0</text>

  <!-- Outer border line -->
  <rect x="50" y="15" width="140" height="300" fill="none" stroke="#6b7280" stroke-width="1.5"/>
</svg>
