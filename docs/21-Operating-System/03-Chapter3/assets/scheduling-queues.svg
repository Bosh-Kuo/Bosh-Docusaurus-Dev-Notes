<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 730 300" width="730" height="300">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== READY QUEUE ===== -->
  <text x="8" y="54" font-family="sans-serif" font-size="12" fill="#374151">ready</text>
  <text x="8" y="69" font-family="sans-serif" font-size="12" fill="#374151">queue</text>

  <!-- Queue header: split into head (top, blue) and tail (bottom, gray) -->
  <rect x="58" y="26" width="76" height="30" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="96" y="46" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">head</text>
  <rect x="58" y="56" width="76" height="30" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="96" y="76" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">tail</text>

  <!-- PCB label: "queue header" / "PCB 7" / "PCB 2" -->
  <text x="96" y="17" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">queue header</text>
  <text x="266" y="17" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">PCB 7</text>
  <text x="444" y="17" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">PCB 2</text>

  <!-- PCB 7 -->
  <rect x="198" y="22" width="136" height="22" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="198" y="44" width="136" height="46" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="266" y="37" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">registers</text>
  <text x="266" y="72" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">. . .</text>

  <!-- PCB 2 -->
  <rect x="376" y="22" width="136" height="22" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="376" y="44" width="136" height="46" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="444" y="37" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">registers</text>
  <text x="444" y="72" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">. . .</text>

  <!-- head → PCB7 (straight) -->
  <line x1="134" y1="36" x2="194" y2="36" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PCB7 → PCB2 (straight) -->
  <line x1="334" y1="36" x2="372" y2="36" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PCB2 → null -->
  <line x1="512" y1="36" x2="548" y2="36" stroke="#374151" stroke-width="1.5"/>
  <line x1="547" y1="28" x2="547" y2="44" stroke="#374151" stroke-width="2"/>

  <!-- tail → PCB2 (curve below) -->
  <path d="M 134 71 C 300 110, 340 110, 444 90" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ===== WAIT QUEUE ===== -->
  <text x="8" y="192" font-family="sans-serif" font-size="12" fill="#374151">wait</text>
  <text x="8" y="207" font-family="sans-serif" font-size="12" fill="#374151">queue</text>

  <!-- Queue header -->
  <rect x="58" y="164" width="76" height="30" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="96" y="184" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">head</text>
  <rect x="58" y="194" width="76" height="30" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="96" y="214" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">tail</text>

  <!-- PCB labels for wait queue -->
  <text x="252" y="155" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">PCB 3</text>
  <text x="422" y="155" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">PCB 14</text>
  <text x="592" y="155" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">PCB 6</text>

  <!-- PCB 3 -->
  <rect x="184" y="160" width="136" height="22" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="184" y="182" width="136" height="46" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="252" y="175" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">registers</text>
  <text x="252" y="210" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">. . .</text>

  <!-- PCB 14 -->
  <rect x="354" y="160" width="136" height="22" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="354" y="182" width="136" height="46" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="422" y="175" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">registers</text>
  <text x="422" y="210" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">. . .</text>

  <!-- PCB 6 -->
  <rect x="524" y="160" width="136" height="22" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="524" y="182" width="136" height="46" rx="2" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="592" y="175" font-family="sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">registers</text>
  <text x="592" y="210" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">. . .</text>

  <!-- head → PCB3 (diagonal upward from head which is at y=179 center, PCB3 top at y=160) -->
  <line x1="134" y1="174" x2="180" y2="171" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PCB3 → PCB14 -->
  <line x1="320" y1="171" x2="350" y2="171" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PCB14 → PCB6 -->
  <line x1="490" y1="171" x2="520" y2="171" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PCB6 → null -->
  <line x1="660" y1="171" x2="698" y2="171" stroke="#374151" stroke-width="1.5"/>
  <line x1="697" y1="163" x2="697" y2="179" stroke="#374151" stroke-width="2"/>

  <!-- tail → PCB6 (curve below) -->
  <path d="M 134 209 C 380 255, 500 255, 592 228" stroke="#374151" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
</svg>
