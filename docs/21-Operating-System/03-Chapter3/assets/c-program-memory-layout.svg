<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Left-side address labels -->
  <text x="38" y="58" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">high</text>
  <text x="38" y="72" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">memory</text>
  <text x="38" y="358" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">low</text>
  <text x="38" y="372" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">memory</text>

  <!-- Memory column outer border -->
  <rect x="65" y="20" width="130" height="360" rx="0" fill="#ffffff" stroke="#374151" stroke-width="1.8"/>

  <!-- Row 1: argc, argv -->
  <rect x="65" y="20" width="130" height="45" fill="#fce7f3" stroke="none"/>
  <line x1="65" y1="65" x2="195" y2="65" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="47" font-family="sans-serif" font-size="12" fill="#9d174d" text-anchor="middle">argc, argv</text>

  <!-- Row 2: stack -->
  <rect x="65" y="65" width="130" height="65" fill="#fce7f3" stroke="none"/>
  <line x1="65" y1="130" x2="195" y2="130" stroke="#374151" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="130" y="88" font-family="sans-serif" font-size="12" fill="#9d174d" text-anchor="middle">stack</text>
  <!-- Stack down arrow -->
  <line x1="130" y1="100" x2="130" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 3: (free space — between stack and heap, no label) -->
  <!-- heap up arrow inside free space -->
  <line x1="130" y1="175" x2="130" y2="148" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 4: heap -->
  <rect x="65" y="180" width="130" height="50" fill="#dcfce7" stroke="none"/>
  <line x1="65" y1="180" x2="195" y2="180" stroke="#374151" stroke-width="1.2" stroke-dasharray="5 3"/>
  <line x1="65" y1="230" x2="195" y2="230" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="209" font-family="sans-serif" font-size="12" fill="#166534" text-anchor="middle">heap</text>

  <!-- Row 5: uninitialized data -->
  <rect x="65" y="230" width="130" height="45" fill="#fef3c7" stroke="none"/>
  <line x1="65" y1="275" x2="195" y2="275" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="249" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">uninitialized</text>
  <text x="130" y="263" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">data</text>

  <!-- Row 6: initialized data -->
  <rect x="65" y="275" width="130" height="45" fill="#fef3c7" stroke="none"/>
  <line x1="65" y1="320" x2="195" y2="320" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="294" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">initialized</text>
  <text x="130" y="308" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">data</text>

  <!-- Row 7: text -->
  <rect x="65" y="320" width="130" height="60" fill="#dbeafe" stroke="none"/>
  <text x="130" y="356" font-family="sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle">text</text>

  <!-- Re-draw outer border on top -->
  <rect x="65" y="20" width="130" height="360" rx="0" fill="none" stroke="#374151" stroke-width="1.8"/>

  <!-- Right-side code annotations -->
  <!-- argc/argv annotation -->
  <line x1="195" y1="42" x2="240" y2="42" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="245" y="38" font-family="monospace" font-size="10" fill="#374151">int main(int argc,</text>
  <text x="245" y="50" font-family="monospace" font-size="10" fill="#374151">     char *argv[])</text>

  <!-- stack / local vars annotation -->
  <line x1="195" y1="95" x2="240" y2="95" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="245" y="92" font-family="monospace" font-size="10" fill="#374151">int *values;</text>
  <text x="245" y="104" font-family="monospace" font-size="10" fill="#374151">int i;</text>

  <!-- heap annotation -->
  <line x1="195" y1="205" x2="240" y2="205" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="245" y="202" font-family="monospace" font-size="10" fill="#16a34a">values = malloc(...);</text>

  <!-- uninitialized data annotation -->
  <line x1="195" y1="252" x2="240" y2="252" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="245" y="249" font-family="monospace" font-size="10" fill="#92400e">int x;</text>

  <!-- initialized data annotation -->
  <line x1="195" y1="297" x2="240" y2="297" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="245" y="294" font-family="monospace" font-size="10" fill="#92400e">int y = 15;</text>
</svg>
