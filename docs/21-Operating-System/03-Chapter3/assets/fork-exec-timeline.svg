<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Row labels -->
  <text x="18" y="95" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8">parent</text>
  <text x="22" y="175" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534">child</text>

  <!-- Parent timeline: solid from start to wait(), dashed (blocked) from wait() to resume -->
  <line x1="80" y1="90" x2="310" y2="90" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <!-- Dashed blocked segment -->
  <line x1="310" y1="90" x2="570" y2="90" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Resume segment -->
  <line x1="570" y1="90" x2="750" y2="90" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Child timeline: from fork point to exit() -->
  <line x1="200" y1="170" x2="540" y2="170" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arr-green)"/>

  <!-- Vertical dashed: fork() creates child -->
  <line x1="200" y1="90" x2="200" y2="170" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Diagonal dashed: child exit() triggers parent resume -->
  <line x1="540" y1="170" x2="570" y2="90" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Event circles on parent -->
  <!-- fork() -->
  <circle cx="200" cy="90" r="7" fill="#2563eb" stroke="white" stroke-width="2"/>
  <!-- wait() -->
  <circle cx="310" cy="90" r="7" fill="#2563eb" stroke="white" stroke-width="2"/>
  <!-- resumes -->
  <circle cx="570" cy="90" r="7" fill="#2563eb" stroke="white" stroke-width="2"/>

  <!-- Event circles on child -->
  <!-- exec() -->
  <circle cx="370" cy="170" r="7" fill="#16a34a" stroke="white" stroke-width="2"/>
  <!-- exit() -->
  <circle cx="540" cy="170" r="7" fill="#16a34a" stroke="white" stroke-width="2"/>

  <!-- Labels above parent line -->
  <text x="200" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">fork()</text>
  <text x="200" y="82" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">(pid &gt; 0)</text>
  <text x="310" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">wait()</text>
  <text x="440" y="72" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b7280" font-style="italic">blocked</text>
  <text x="570" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8">resumes</text>

  <!-- Labels below child line -->
  <text x="200" y="192" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">(pid = 0)</text>
  <text x="370" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534">exec()</text>
  <text x="540" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534">exit()</text>

  <!-- "fork() triggers child creation" annotation -->
  <text x="230" y="132" font-family="sans-serif" font-size="10" fill="#94a3b8" font-style="italic">child created</text>

  <!-- "child exit wakes parent" annotation -->
  <text x="548" y="138" font-family="sans-serif" font-size="10" fill="#94a3b8" font-style="italic">wakes parent</text>
</svg>
