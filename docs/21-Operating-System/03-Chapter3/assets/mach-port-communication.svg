<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 295" width="720" height="295">
  <defs>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-l" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- ===== Client Task (T1) ===== -->
  <rect x="10" y="20" width="215" height="255" rx="6" fill="#f0f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="117" y="44" font-family="sans-serif" font-size="13" fill="#1d4ed8" text-anchor="middle" font-weight="700">Client Task (T1)</text>

  <!-- Port P1 box inside T1 -->
  <rect x="25" y="55" width="185" height="100" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="117" y="77" font-family="sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="600">Port P1</text>
  <text x="117" y="96" font-family="sans-serif" font-size="10.5" fill="#1d4ed8" text-anchor="middle">RECEIVE right (owner)</text>
  <!-- Small message stack icon -->
  <rect x="55" y="107" width="24" height="12" rx="2" fill="#93c5fd" stroke="#2563eb" stroke-width="0.8"/>
  <rect x="55" y="121" width="24" height="12" rx="2" fill="#93c5fd" stroke="#2563eb" stroke-width="0.8"/>
  <text x="85" y="118" font-family="sans-serif" font-size="9.5" fill="#1e40af">message queue</text>
  <text x="85" y="130" font-family="sans-serif" font-size="9.5" fill="#6b7280">(replies arrive here)</text>

  <!-- SEND right note for T1 -->
  <rect x="25" y="170" width="185" height="50" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="117" y="190" font-family="sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">holds SEND right for P2</text>
  <text x="117" y="207" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">(obtained via Bootstrap Server)</text>

  <!-- Key action label -->
  <text x="117" y="250" font-family="sans-serif" font-size="10.5" fill="#2563eb" text-anchor="middle" font-style="italic">① sends msg to P2</text>
  <text x="117" y="265" font-family="sans-serif" font-size="10.5" fill="#2563eb" text-anchor="middle" font-style="italic">④ reads reply from P1</text>

  <!-- ===== Server Task (T2) ===== -->
  <rect x="495" y="20" width="215" height="255" rx="6" fill="#f0fff4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="602" y="44" font-family="sans-serif" font-size="13" fill="#15803d" text-anchor="middle" font-weight="700">Server Task (T2)</text>

  <!-- Port P2 box inside T2 -->
  <rect x="510" y="55" width="185" height="100" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="602" y="77" font-family="sans-serif" font-size="13" fill="#15803d" text-anchor="middle" font-weight="600">Port P2</text>
  <text x="602" y="96" font-family="sans-serif" font-size="10.5" fill="#16a34a" text-anchor="middle">RECEIVE right (owner)</text>
  <!-- Small message stack icon -->
  <rect x="540" y="107" width="24" height="12" rx="2" fill="#86efac" stroke="#16a34a" stroke-width="0.8"/>
  <rect x="540" y="121" width="24" height="12" rx="2" fill="#f0fff4" stroke="#16a34a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="570" y="118" font-family="sans-serif" font-size="9.5" fill="#15803d">message queue</text>
  <text x="570" y="130" font-family="sans-serif" font-size="9.5" fill="#6b7280">(requests arrive here)</text>

  <!-- SEND right note for T2 -->
  <rect x="510" y="170" width="185" height="50" rx="4" fill="#f0fff4" stroke="#86efac" stroke-width="1"/>
  <text x="602" y="190" font-family="sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">holds SEND right for P1</text>
  <text x="602" y="207" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">(granted by T1 in message header)</text>

  <!-- Key action label -->
  <text x="602" y="250" font-family="sans-serif" font-size="10.5" fill="#16a34a" text-anchor="middle" font-style="italic">② reads request from P2</text>
  <text x="602" y="265" font-family="sans-serif" font-size="10.5" fill="#16a34a" text-anchor="middle" font-style="italic">③ sends reply to P1</text>

  <!-- ===== Arrow 1: Client → Server (request) ===== -->
  <!-- Label above arrow -->
  <text x="360" y="85" font-family="sans-serif" font-size="10.5" fill="#2563eb" text-anchor="middle" font-weight="600">① request</text>
  <text x="360" y="99" font-family="'Courier New', monospace" font-size="9.5" fill="#374151" text-anchor="middle">msgh_remote = P2</text>
  <text x="360" y="112" font-family="'Courier New', monospace" font-size="9.5" fill="#374151" text-anchor="middle">msgh_local  = P1  ← return addr</text>
  <!-- Arrow line -->
  <line x1="225" y1="120" x2="493" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- ===== Arrow 2: Server → Client (reply) ===== -->
  <!-- Label above arrow -->
  <text x="360" y="155" font-family="sans-serif" font-size="10.5" fill="#16a34a" text-anchor="middle" font-weight="600">③ reply</text>
  <text x="360" y="169" font-family="'Courier New', monospace" font-size="9.5" fill="#374151" text-anchor="middle">msgh_remote = P1</text>
  <!-- Arrow line -->
  <line x1="493" y1="180" x2="227" y2="180" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-l)"/>

  <!-- Kernel label (bottom center) -->
  <rect x="290" y="220" width="140" height="24" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="360" y="236" font-family="sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">Mach Kernel</text>
  <!-- Dashed line from kernel to both arrows -->
  <line x1="310" y1="220" x2="310" y2="180" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="410" y1="220" x2="410" y2="120" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
