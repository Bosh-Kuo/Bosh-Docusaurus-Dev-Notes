<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Connecting lines (drawn before nodes so nodes appear on top) -->
  <!-- systemd → logind -->
  <line x1="380" y1="84" x2="135" y2="150" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- systemd → python -->
  <line x1="380" y1="84" x2="380" y2="150" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- systemd → sshd(3028) -->
  <line x1="380" y1="84" x2="615" y2="150" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- logind → bash -->
  <line x1="135" y1="194" x2="110" y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- sshd(3028) → sshd(3610) -->
  <line x1="615" y1="194" x2="615" y2="255" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- bash → ps -->
  <line x1="110" y1="299" x2="60" y2="350" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- bash → vim -->
  <line x1="110" y1="299" x2="185" y2="350" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- sshd(3610) → tcsh -->
  <line x1="615" y1="299" x2="615" y2="350" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Level 0: systemd -->
  <rect x="305" y="40" width="150" height="44" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="380" y="58" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">systemd</text>
  <text x="380" y="76" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d4ed8">pid = 1</text>

  <!-- Level 1 -->
  <!-- logind -->
  <rect x="60" y="150" width="150" height="44" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="135" y="168" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">logind</text>
  <text x="135" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e">pid = 8415</text>

  <!-- python -->
  <rect x="305" y="150" width="150" height="44" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="380" y="168" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">python</text>
  <text x="380" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e">pid = 2808</text>

  <!-- sshd (3028) -->
  <rect x="540" y="150" width="150" height="44" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="615" y="168" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#92400e">sshd</text>
  <text x="615" y="186" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e">pid = 3028</text>

  <!-- Level 2 -->
  <!-- bash -->
  <rect x="35" y="255" width="150" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="110" y="273" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534">bash</text>
  <text x="110" y="291" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">pid = 8416</text>

  <!-- sshd (3610) -->
  <rect x="540" y="255" width="150" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="615" y="273" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534">sshd</text>
  <text x="615" y="291" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#166534">pid = 3610</text>

  <!-- Level 3 -->
  <!-- ps -->
  <rect x="5" y="350" width="110" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="60" y="368" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5b21b6">ps</text>
  <text x="60" y="386" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b21b6">pid = 9298</text>

  <!-- vim -->
  <rect x="130" y="350" width="110" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="185" y="368" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5b21b6">vim</text>
  <text x="185" y="386" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b21b6">pid = 9204</text>

  <!-- tcsh -->
  <rect x="560" y="350" width="110" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="615" y="368" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5b21b6">tcsh</text>
  <text x="615" y="386" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b21b6">pid = 4005</text>
</svg>
