<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 305" width="260" height="305">
  <!-- Outer PCB box -->
  <rect x="55" y="10" width="150" height="285" rx="0" fill="#ffffff" stroke="#374151" stroke-width="1.8"/>

  <!-- Row 1: process state -->
  <line x1="55" y1="42" x2="205" y2="42" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="30" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">process state</text>

  <!-- Row 2: process number -->
  <line x1="55" y1="74" x2="205" y2="74" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="62" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">process number</text>

  <!-- Row 3: program counter -->
  <line x1="55" y1="106" x2="205" y2="106" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="94" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">program counter</text>

  <!-- Row 4: registers (taller, light blue fill) -->
  <rect x="55" y="106" width="150" height="64" fill="#dbeafe" stroke="none"/>
  <line x1="55" y1="170" x2="205" y2="170" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="141" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">registers</text>

  <!-- Row 5: memory limits -->
  <line x1="55" y1="202" x2="205" y2="202" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="190" font-family="sans-serif" font-size="12" fill="#374151" text-anchor="middle">memory limits</text>

  <!-- Row 6: list of open files -->
  <line x1="55" y1="234" x2="205" y2="234" stroke="#374151" stroke-width="1.2"/>
  <text x="130" y="222" font-family="sans-serif" font-size="11" fill="#374151" text-anchor="middle">list of open files</text>

  <!-- Row 7: dots (taller, light blue fill) -->
  <rect x="55" y="234" width="150" height="61" fill="#dbeafe" stroke="none"/>
  <text x="130" y="268" font-family="sans-serif" font-size="18" fill="#374151" text-anchor="middle">• • •</text>

  <!-- Re-draw outer border on top to clean up fills bleeding through -->
  <rect x="55" y="10" width="150" height="285" rx="0" fill="none" stroke="#374151" stroke-width="1.8"/>
</svg>
