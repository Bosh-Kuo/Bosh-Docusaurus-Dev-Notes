<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 230" width="800" height="230">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ===== Left panel: Direct Communication ===== -->
  <rect x="8" y="8" width="376" height="214" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="196" y="34" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#1e293b">(a) Direct Communication</text>

  <!-- Process P -->
  <rect x="28" y="82" width="114" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="85" y="109" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#1e40af">Process P</text>

  <!-- Process Q -->
  <rect x="244" y="82" width="114" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="301" y="109" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#1e40af">Process Q</text>

  <!-- Arrow P -> Q: send(Q, msg) -->
  <line x1="142" y1="97" x2="242" y2="97" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="192" y="91" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#374151">send(Q, msg)</text>

  <!-- Arrow Q -> P direction for receive: shows Q must name P -->
  <line x1="244" y1="115" x2="144" y2="115" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="194" y="134" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#374151">receive(P, msg)</text>

  <!-- Note -->
  <text x="196" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Both sides must explicitly name each other.</text>
  <text x="196" y="184" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Hard-coded IDs reduce modularity.</text>

  <!-- ===== Right panel: Indirect Communication ===== -->
  <rect x="416" y="8" width="376" height="214" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="604" y="34" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#1e293b">(b) Indirect Communication</text>

  <!-- Process P -->
  <rect x="428" y="82" width="96" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="476" y="109" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#1e40af">Process P</text>

  <!-- Mailbox A -->
  <rect x="556" y="82" width="96" height="44" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="604" y="102" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#5b21b6">Mailbox A</text>
  <text x="604" y="118" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed">(port)</text>

  <!-- Process Q -->
  <rect x="684" y="82" width="96" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="732" y="109" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#1e40af">Process Q</text>

  <!-- Arrow P -> Mailbox: send(A, msg) -->
  <line x1="524" y1="97" x2="554" y2="97" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="539" y="91" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#374151">send(A, msg)</text>

  <!-- Arrow Mailbox -> Q: receive(A, msg) -->
  <line x1="652" y1="115" x2="682" y2="115" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="667" y="134" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#374151">receive(A, msg)</text>

  <!-- Note -->
  <text x="604" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Both name the mailbox, not each other.</text>
  <text x="604" y="184" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Link exists only if mailbox is shared.</text>
</svg>
