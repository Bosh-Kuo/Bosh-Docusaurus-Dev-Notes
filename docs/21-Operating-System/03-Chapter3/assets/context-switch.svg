<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" width="620" height="470">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== COLUMN HEADERS ===== -->
  <rect x="20" y="10" width="130" height="36" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="85" y="33" font-family="sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">process P&#x2080;</text>

  <rect x="230" y="10" width="160" height="36" rx="4" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="310" y="33" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">operating system</text>

  <rect x="470" y="10" width="130" height="36" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="535" y="33" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">process P&#x2081;</text>

  <!-- ===== VERTICAL TIMELINE LINES ===== -->
  <!-- P0 timeline -->
  <line x1="85" y1="46" x2="85" y2="460" stroke="#d1fae5" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- OS timeline -->
  <line x1="310" y1="46" x2="310" y2="460" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- P1 timeline -->
  <line x1="535" y1="46" x2="535" y2="460" stroke="#bfdbfe" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ===== P0: EXECUTING (phase 1) ===== -->
  <rect x="30" y="56" width="110" height="60" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="85" y="91" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">executing</text>

  <!-- ===== TRIGGER: interrupt or system call ===== -->
  <!-- Arrow P0 → OS -->
  <line x1="140" y1="86" x2="228" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="96" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">interrupt or</text>
  <text x="185" y="108" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">system call</text>

  <!-- ===== OS: save state into PCB0 ===== -->
  <rect x="230" y="116" width="160" height="38" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="310" y="133" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">save state into PCB&#x2080;</text>
  <text x="310" y="147" font-family="sans-serif" font-size="10" fill="#92400e" text-anchor="middle">(PC, registers, ...)</text>

  <!-- OS dots -->
  <text x="310" y="178" font-family="sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">&#x22EE;</text>

  <!-- ===== OS: reload state from PCB1 ===== -->
  <rect x="230" y="188" width="160" height="38" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="310" y="205" font-family="sans-serif" font-size="11" fill="#9d174d" text-anchor="middle">reload state from PCB&#x2081;</text>
  <text x="310" y="219" font-family="sans-serif" font-size="10" fill="#9d174d" text-anchor="middle">(restore P&#x2081; context)</text>

  <!-- ===== P0: IDLE (phase 1) ===== -->
  <rect x="30" y="116" width="110" height="130" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="85" y="185" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">idle</text>

  <!-- Arrow OS → P1 (reload) -->
  <line x1="390" y1="207" x2="468" y2="246" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== P1: EXECUTING ===== -->
  <rect x="470" y="246" width="110" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="525" y="291" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">executing</text>

  <!-- ===== P1: IDLE (top) ===== -->
  <rect x="470" y="56" width="110" height="190" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="525" y="155" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">idle</text>

  <!-- ===== TRIGGER 2: interrupt or system call from P1 ===== -->
  <line x1="470" y1="286" x2="392" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="435" y="296" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">interrupt or</text>
  <text x="435" y="308" font-family="sans-serif" font-size="10" fill="#374151" text-anchor="middle">system call</text>

  <!-- ===== OS: save state into PCB1 ===== -->
  <rect x="230" y="318" width="160" height="38" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="310" y="335" font-family="sans-serif" font-size="11" fill="#92400e" text-anchor="middle">save state into PCB&#x2081;</text>
  <text x="310" y="349" font-family="sans-serif" font-size="10" fill="#92400e" text-anchor="middle">(PC, registers, ...)</text>

  <!-- OS dots -->
  <text x="310" y="378" font-family="sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">&#x22EE;</text>

  <!-- ===== OS: reload state from PCB0 ===== -->
  <rect x="230" y="388" width="160" height="38" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="310" y="405" font-family="sans-serif" font-size="11" fill="#166534" text-anchor="middle">reload state from PCB&#x2080;</text>
  <text x="310" y="419" font-family="sans-serif" font-size="10" fill="#166534" text-anchor="middle">(restore P&#x2080; context)</text>

  <!-- ===== P1: IDLE (bottom) ===== -->
  <rect x="470" y="326" width="110" height="130" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="525" y="395" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">idle</text>

  <!-- Arrow OS → P0 (reload) -->
  <line x1="230" y1="407" x2="142" y2="440" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== P0: EXECUTING (phase 2) ===== -->
  <rect x="30" y="438" width="110" height="22" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="85" y="453" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">executing</text>

  <!-- ===== P0: IDLE (phase 1 continued - covers middle section) ===== -->
  <!-- Already drawn above from y=116 to y=246 -->
  <rect x="30" y="246" width="110" height="192" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="85" y="345" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">idle</text>
</svg>
