<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">反向代理：外部只看見 Nginx，內部服務被保護起來</text>

  <rect x="50" y="162" width="150" height="94" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="200" font-size="15" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Client</text>
  <text x="125" y="223" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Browser / App</text>

  <rect x="346" y="132" width="228" height="154" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="382" y="158" width="156" height="50" rx="10" fill="#3b82f6"/>
  <text x="460" y="189" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx</text>
  <text x="460" y="232" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">public endpoint</text>
  <text x="460" y="253" font-size="11" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">proxy_pass → upstream</text>

  <rect x="706" y="82" width="154" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="783" y="111" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">API Server</text>
  <text x="783" y="131" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">10.0.0.12:8080</text>
  <rect x="706" y="180" width="154" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="783" y="209" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Web App</text>
  <text x="783" y="229" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">10.0.0.21:3000</text>
  <rect x="706" y="278" width="154" height="70" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="783" y="307" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Admin</text>
  <text x="783" y="327" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">10.0.0.31:4000</text>

  <line x1="200" y1="209" x2="334" y2="209" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="267" y="194" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">https://example.com</text>
  <line x1="574" y1="178" x2="694" y2="118" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <line x1="574" y1="214" x2="694" y2="214" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <line x1="574" y1="250" x2="694" y2="310" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>

  <rect x="80" y="374" width="760" height="46" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="403" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Client 不需要知道內部 IP、port 與服務拓樸，只需要連到 Nginx 這個公開入口</text>
</svg>
