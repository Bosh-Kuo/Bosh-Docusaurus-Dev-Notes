<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="920" height="470" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">HTTP Cache：命中時不必每次打到後端</text>

  <rect x="50" y="188" width="140" height="76" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="218" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Client</text>
  <text x="120" y="239" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">GET /article</text>

  <rect x="330" y="158" width="220" height="136" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="365" y="184" width="150" height="44" rx="10" fill="#3b82f6"/>
  <text x="440" y="212" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx Cache</text>
  <text x="440" y="252" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">cache key = URI + headers</text>

  <rect x="694" y="178" width="160" height="96" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="774" y="217" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Upstream App</text>
  <text x="774" y="239" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">generate response</text>

  <line x1="190" y1="226" x2="318" y2="226" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <path d="M440 294 C410 348 282 346 190 254" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="315" y="356" font-size="12" fill="#16a34a" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">HIT：直接回應</text>
  <path d="M550 208 C606 150 650 150 694 198" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6" marker-end="url(#arrowRed)"/>
  <path d="M694 248 C640 312 594 310 550 260" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6" marker-end="url(#arrowRed)"/>
  <text x="623" y="136" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MISS：轉到後端</text>

  <rect x="84" y="392" width="752" height="42" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="418" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">快取適合公開且可重複使用的內容；含使用者狀態的 response 必須謹慎設計 cache key</text>
</svg>
