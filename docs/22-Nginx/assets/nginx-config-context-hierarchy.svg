<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Nginx 設定檔 Context 層級</title>
  <desc id="desc">展示 nginx.conf 中 main、events、http、server、location 的巢狀關係。</desc>
  <defs>
    <style>
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      .title {
        font-size: 17px;
        font-weight: 700;
        fill: #1e293b;
      }
      .label {
        font-size: 14px;
        font-weight: 700;
        fill: #1e293b;
      }
      .badge {
        font-size: 13px;
        font-weight: 700;
        fill: #ffffff;
      }
      .small {
        font-size: 12px;
        fill: #475569;
      }
      .code {
        font-size: 12px;
        fill: #1e293b;
      }
    </style>
  </defs>

  <rect x="1" y="1" width="918" height="428" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="460" y="36" text-anchor="middle" class="title">nginx.conf 的 Context 層級</text>

  <rect x="60" y="66" width="800" height="322" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="84" y="88" width="124" height="30" rx="8" fill="#64748b"/>
  <text x="146" y="108" text-anchor="middle" class="badge">main</text>
  <text x="228" y="108" class="small">worker_processes, error_log, pid</text>

  <rect x="100" y="145" width="270" height="92" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <rect x="120" y="165" width="90" height="28" rx="8" fill="#64748b"/>
  <text x="165" y="184" text-anchor="middle" class="badge">events</text>
  <text x="230" y="184" class="small">connection settings</text>
  <text x="124" y="216" class="code">worker_connections 1024;</text>

  <rect x="100" y="260" width="720" height="96" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="120" y="282" width="82" height="28" rx="8" fill="#3b82f6"/>
  <text x="161" y="301" text-anchor="middle" class="badge">http</text>
  <text x="222" y="301" class="small">HTTP / HTTPS settings</text>

  <rect x="405" y="282" width="350" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <rect x="425" y="294" width="86" height="28" rx="8" fill="#16a34a"/>
  <text x="468" y="313" text-anchor="middle" class="badge">server</text>

  <rect x="598" y="290" width="136" height="36" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="616" y="298" width="100" height="20" rx="6" fill="#d97706"/>
  <text x="666" y="313" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">location</text>

  <text x="146" y="373" text-anchor="middle" class="small">process</text>
  <text x="235" y="373" text-anchor="middle" class="small">connection</text>
  <text x="462" y="373" text-anchor="middle" class="small">HTTP scope</text>
  <text x="680" y="373" text-anchor="middle" class="small">request path</text>
</svg>
