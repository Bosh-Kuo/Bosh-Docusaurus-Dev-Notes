<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">同一個 Domain 下掛載多個應用</text>

  <rect x="50" y="178" width="140" height="78" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="211" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Client</text>
  <text x="120" y="232" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">example.com/*</text>

  <rect x="300" y="122" width="230" height="190" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="322" y="146" width="186" height="42" rx="8" fill="#3b82f6"/>
  <text x="415" y="173" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx server block</text>
  <text x="415" y="214" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">server_name example.com</text>
  <text x="415" y="242" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">location matching</text>
  <text x="415" y="266" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/ · /api/ · /admin/ · /docs/</text>

  <rect x="670" y="70" width="170" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="755" y="94" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Frontend</text>
  <text x="755" y="113" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/ → :3000</text>
  <rect x="670" y="162" width="170" height="58" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="755" y="186" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">API Server</text>
  <text x="755" y="205" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/api/ → :8080</text>
  <rect x="670" y="254" width="170" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="755" y="278" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Admin</text>
  <text x="755" y="297" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/admin/ → :4000</text>
  <rect x="670" y="346" width="170" height="58" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="755" y="370" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Docs</text>
  <text x="755" y="389" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/docs/ → :5000</text>

  <line x1="190" y1="217" x2="288" y2="217" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="530" y1="174" x2="658" y2="99" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="530" y1="207" x2="658" y2="191" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="530" y1="243" x2="658" y2="283" stroke="#d97706" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="530" y1="276" x2="658" y2="375" stroke="#64748b" stroke-width="2" marker-end="url(#arrowBlue)"/>
</svg>
