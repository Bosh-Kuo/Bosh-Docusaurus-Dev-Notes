<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Nginx Request 處理流程</title>
  <desc id="desc">展示瀏覽器請求從 DNS、IP、port 到 Nginx server block、location block，再到 static file、proxy pass、redirect 或 error 的處理流程。</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#3b82f6"/>
    </marker>
    <style>
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      .title {
        font-size: 17px;
        font-weight: 700;
        fill: #1e293b;
      }
      .label {
        font-size: 14px;
        font-weight: 700;
        fill: #1e293b;
      }
      .small {
        font-size: 12px;
        fill: #475569;
      }
      .flow-arrow {
        stroke-dasharray: 10 8;
        animation: flowDash 1.15s linear infinite;
      }
      @keyframes flowDash {
        from { stroke-dashoffset: 18; }
        to { stroke-dashoffset: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .flow-arrow {
          animation: none;
        }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="498" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="500" y="36" text-anchor="middle" class="title">Request 進入 Nginx 的處理流程</text>

  <rect x="48" y="86" width="130" height="76" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="113" y="117" text-anchor="middle" class="label">Browser</text>
  <text x="113" y="140" text-anchor="middle" class="small">URL</text>

  <path class="flow-arrow" d="M178 124 C206 124 218 124 246 124" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="254" y="86" width="130" height="76" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="319" y="117" text-anchor="middle" class="label">DNS / IP</text>
  <text x="319" y="140" text-anchor="middle" class="small">resolve</text>

  <path class="flow-arrow" d="M384 124 C412 124 424 124 452 124" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="460" y="86" width="130" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="525" y="117" text-anchor="middle" class="label">Port</text>
  <text x="525" y="140" text-anchor="middle" class="small">80 / 443</text>

  <path class="flow-arrow" d="M590 124 C618 124 630 124 658 124" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="666" y="86" width="150" height="76" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="741" y="117" text-anchor="middle" class="label">Nginx</text>
  <text x="741" y="140" text-anchor="middle" class="small">entry</text>

  <path class="flow-arrow" d="M741 162 C741 190 741 202 741 230" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="604" y="238" width="274" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="741" y="269" text-anchor="middle" class="label">Server Block</text>
  <text x="741" y="292" text-anchor="middle" class="small">listen + server_name</text>

  <path class="flow-arrow" d="M604 276 C544 276 524 276 464 276" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="202" y="238" width="254" height="76" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="329" y="269" text-anchor="middle" class="label">Location Block</text>
  <text x="329" y="292" text-anchor="middle" class="small">URI path</text>

  <path class="flow-arrow" d="M329 314 L329 348" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>

  <rect x="84" y="382" width="150" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="159" y="411" text-anchor="middle" class="label">Static</text>
  <text x="159" y="433" text-anchor="middle" class="small">root / index</text>

  <rect x="274" y="382" width="150" height="68" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="349" y="411" text-anchor="middle" class="label">Proxy</text>
  <text x="349" y="433" text-anchor="middle" class="small">proxy_pass</text>

  <rect x="464" y="382" width="150" height="68" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="539" y="411" text-anchor="middle" class="label">Redirect</text>
  <text x="539" y="433" text-anchor="middle" class="small">301 / 302</text>

  <rect x="654" y="382" width="150" height="68" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="729" y="411" text-anchor="middle" class="label">Error</text>
  <text x="729" y="433" text-anchor="middle" class="small">404 / 500</text>

  <path class="flow-arrow" d="M329 348 C258 348 186 352 159 382" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path class="flow-arrow" d="M329 348 C344 356 349 366 349 382" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path class="flow-arrow" d="M329 348 C416 348 514 352 539 382" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path class="flow-arrow" d="M329 348 C518 348 700 352 729 382" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
</svg>
