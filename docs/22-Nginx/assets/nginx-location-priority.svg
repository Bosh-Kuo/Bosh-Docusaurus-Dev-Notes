<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Nginx Location 優先順序</title>
  <desc id="desc">展示 Nginx 選擇 location 的順序：exact、最長 prefix、^~、regex、fallback prefix。</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#3b82f6"/>
    </marker>
    <style>
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
      .title {
        font-size: 17px;
        font-weight: 700;
        fill: #1e293b;
      }
      .label {
        font-size: 14px;
        font-weight: 700;
        fill: #1e293b;
      }
      .small {
        font-size: 12px;
        fill: #475569;
      }
      .code {
        font-size: 12px;
        fill: #1e293b;
      }
      .num {
        font-size: 13px;
        font-weight: 700;
        fill: #ffffff;
      }
      .flow-arrow {
        stroke-dasharray: 10 8;
        animation: flowDash 1.2s linear infinite;
      }
      @keyframes flowDash {
        from { stroke-dashoffset: 18; }
        to { stroke-dashoffset: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .flow-arrow {
          animation: none;
        }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="918" height="558" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="460" y="36" text-anchor="middle" class="title">Location 優先順序</text>

  <rect x="70" y="82" width="180" height="76" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="112" text-anchor="middle" class="label">URI</text>
  <text x="160" y="136" text-anchor="middle" class="code">/images/logo.png</text>

  <path class="flow-arrow" d="M250 120 C282 120 300 120 332 120" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="340" y="82" width="220" height="76" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <circle cx="368" cy="120" r="14" fill="#ef4444"/>
  <text x="368" y="125" text-anchor="middle" class="num">1</text>
  <text x="450" y="112" text-anchor="middle" class="label">Exact</text>
  <text x="450" y="136" text-anchor="middle" class="code">location = /</text>

  <path class="flow-arrow" d="M560 120 C592 120 610 120 642 120" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="650" y="82" width="190" height="76" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="745" y="112" text-anchor="middle" class="label">命中結束</text>
  <text x="745" y="136" text-anchor="middle" class="small">直接使用</text>

  <rect x="150" y="230" width="250" height="84" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <circle cx="178" cy="262" r="14" fill="#d97706"/>
  <text x="178" y="267" text-anchor="middle" class="num">2</text>
  <text x="275" y="256" text-anchor="middle" class="label">Longest Prefix</text>
  <text x="275" y="282" text-anchor="middle" class="code">/images/</text>

  <path class="flow-arrow" d="M400 272 C434 272 456 272 490 272" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="498" y="230" width="250" height="84" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="526" cy="262" r="14" fill="#7c3aed"/>
  <text x="526" y="267" text-anchor="middle" class="num">3</text>
  <text x="623" y="256" text-anchor="middle" class="label">^~ Prefix</text>
  <text x="623" y="282" text-anchor="middle" class="code">skip regex?</text>

  <rect x="150" y="395" width="250" height="84" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="178" cy="427" r="14" fill="#3b82f6"/>
  <text x="178" y="432" text-anchor="middle" class="num">4</text>
  <text x="275" y="421" text-anchor="middle" class="label">Regex</text>
  <text x="275" y="447" text-anchor="middle" class="code">~* \.png$</text>

  <path class="flow-arrow" d="M400 437 C434 437 456 437 490 437" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="498" y="395" width="250" height="84" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <circle cx="526" cy="427" r="14" fill="#64748b"/>
  <text x="526" y="432" text-anchor="middle" class="num">5</text>
  <text x="623" y="421" text-anchor="middle" class="label">Stored Prefix</text>
  <text x="623" y="447" text-anchor="middle" class="small">fallback</text>

  <path class="flow-arrow" d="M623 314 C623 358 318 358 275 395" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
</svg>
