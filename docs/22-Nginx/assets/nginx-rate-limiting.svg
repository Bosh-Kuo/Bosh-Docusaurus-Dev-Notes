<svg viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Rate Limiting：在後端被打爆前先節流</text>

  <rect x="62" y="88" width="190" height="244" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="157" y="120" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Requests from IP</text>
  <g fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif">
    <circle cx="110" cy="160" r="8"/><circle cx="140" cy="160" r="8"/><circle cx="170" cy="160" r="8"/><circle cx="200" cy="160" r="8"/>
    <circle cx="110" cy="200" r="8"/><circle cx="140" cy="200" r="8"/><circle cx="170" cy="200" r="8"/><circle cx="200" cy="200" r="8"/>
    <circle cx="110" cy="240" r="8"/><circle cx="140" cy="240" r="8"/><circle cx="170" cy="240" r="8"/><circle cx="200" cy="240" r="8"/>
    <text x="157" y="294" font-size="11" fill="#475569" text-anchor="middle">burst traffic</text>
  </g>

  <rect x="374" y="144" width="172" height="132" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="404" y="170" width="112" height="42" rx="10" fill="#ef4444"/>
  <text x="460" y="196" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx</text>
  <text x="460" y="235" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">limit_req</text>
  <text x="460" y="254" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">10 req / second</text>

  <rect x="698" y="102" width="160" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="778" y="131" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Allowed</text>
  <text x="778" y="151" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">forward to app</text>

  <rect x="698" y="248" width="160" height="70" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="778" y="277" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Rejected</text>
  <text x="778" y="297" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">429 Too Many Requests</text>

  <line x1="252" y1="210" x2="362" y2="210" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <line x1="546" y1="190" x2="686" y2="137" stroke="#16a34a" stroke-width="2.8" marker-end="url(#arrowGreen)"/>
  <line x1="546" y1="234" x2="686" y2="283" stroke="#ef4444" stroke-width="2.8" marker-end="url(#arrowRed)"/>
</svg>
