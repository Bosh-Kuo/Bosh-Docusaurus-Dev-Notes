<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="920" height="470" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Web Server 在請求鏈路中的位置</text>

  <rect x="34" y="160" width="140" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="104" y="194" font-size="15" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Client</text>
  <text x="104" y="216" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Browser / App</text>

  <rect x="270" y="86" width="230" height="238" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="292" y="112" width="186" height="48" rx="8" fill="#3b82f6"/>
  <text x="385" y="141" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Web Server</text>
  <text x="385" y="184" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">HTTP 邊界處理</text>
  <rect x="300" y="204" width="78" height="34" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="339" y="225" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">靜態檔案</text>
  <rect x="392" y="204" width="78" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="431" y="225" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">TLS / 壓縮</text>
  <rect x="300" y="252" width="78" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="339" y="273" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">反向代理</text>
  <rect x="392" y="252" width="78" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="431" y="273" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">快取 / 限流</text>

  <rect x="612" y="74" width="150" height="70" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="687" y="103" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Static Files</text>
  <text x="687" y="124" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">HTML · CSS · JS · Images</text>

  <rect x="612" y="180" width="150" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="687" y="209" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">App Server</text>
  <text x="687" y="230" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Node.js · Java · Go</text>

  <rect x="612" y="286" width="150" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="687" y="315" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Internal Services</text>
  <text x="687" y="336" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">DB · API · Auth</text>

  <line x1="174" y1="205" x2="258" y2="205" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="216" y="190" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">HTTP / HTTPS</text>
  <line x1="500" y1="150" x2="600" y2="112" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="500" y1="215" x2="600" y2="215" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <line x1="500" y1="282" x2="600" y2="318" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="552" y="98" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">直接回檔案</text>
  <text x="552" y="202" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">轉交商業邏輯</text>
  <text x="552" y="342" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">內部依賴</text>

  <rect x="46" y="392" width="828" height="42" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="418" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Web Server 的重點不是商業邏輯，而是把 HTTP 入口的共通問題先處理乾淨</text>
</svg>
