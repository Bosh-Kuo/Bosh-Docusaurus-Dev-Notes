<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="920" height="470" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Canary Release：少量流量先導到新版本觀察</text>

  <rect x="62" y="174" width="150" height="92" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="137" y="211" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Users</text>
  <text x="137" y="233" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">production traffic</text>

  <rect x="354" y="150" width="212" height="140" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="392" y="176" width="136" height="44" rx="10" fill="#3b82f6"/>
  <text x="460" y="204" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx</text>
  <text x="460" y="244" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">weighted split</text>
  <text x="460" y="265" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">90% stable / 10% canary</text>

  <rect x="692" y="102" width="166" height="82" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="135" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Stable v1</text>
  <text x="775" y="157" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">90% traffic</text>

  <rect x="692" y="258" width="166" height="82" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="291" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Canary v2</text>
  <text x="775" y="313" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">10% traffic</text>

  <line x1="212" y1="220" x2="342" y2="220" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="566" y1="190" x2="680" y2="143" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="566" y1="250" x2="680" y2="299" stroke="#d97706" stroke-width="2.4" marker-end="url(#arrowAmber)"/>

  <rect x="188" y="386" width="544" height="42" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="412" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">灰度發布必須搭配監控與 rollback，否則只是把風險分散出去</text>
</svg>
