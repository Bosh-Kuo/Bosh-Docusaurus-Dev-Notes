<svg viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">靜態檔案伺服器：Nginx 直接回傳前端 build 產物</text>

  <rect x="54" y="164" width="150" height="90" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="129" y="200" font-size="15" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Browser</text>
  <text x="129" y="222" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">GET /app.js</text>

  <rect x="330" y="126" width="220" height="166" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="366" y="152" width="148" height="48" rx="10" fill="#3b82f6"/>
  <text x="440" y="182" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx</text>
  <text x="440" y="225" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">root /var/www/site</text>
  <text x="440" y="248" font-size="11" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">不進入後端應用程式</text>

  <rect x="688" y="88" width="172" height="246" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="774" y="119" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Static Files</text>
  <rect x="718" y="146" width="112" height="32" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="774" y="167" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">index.html</text>
  <rect x="718" y="193" width="112" height="32" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="774" y="214" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">style.css</text>
  <rect x="718" y="240" width="112" height="32" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="774" y="261" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">app.js</text>
  <rect x="718" y="287" width="112" height="32" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="774" y="308" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">logo.svg</text>

  <line x1="204" y1="209" x2="318" y2="209" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="209" x2="676" y2="209" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <path d="M330 270 C250 330 140 324 104 258" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6" marker-end="url(#arrowBlue)"/>
  <text x="210" y="332" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">直接回傳檔案 response</text>
</svg>
