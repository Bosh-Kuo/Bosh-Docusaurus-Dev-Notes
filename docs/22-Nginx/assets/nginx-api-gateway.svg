<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="920" height="470" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">API Gateway：在入口層統一路徑與共通規則</text>

  <rect x="50" y="190" width="140" height="76" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="220" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Client</text>
  <text x="120" y="241" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/api/*</text>

  <rect x="314" y="124" width="250" height="206" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="348" y="150" width="182" height="44" rx="10" fill="#3b82f6"/>
  <text x="439" y="178" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx Gateway</text>
  <rect x="342" y="216" width="84" height="36" rx="7" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="384" y="238" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Routing</text>
  <rect x="452" y="216" width="84" height="36" rx="7" fill="#dcfce7" stroke="#16a34a"/>
  <text x="494" y="238" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Headers</text>
  <rect x="342" y="266" width="84" height="36" rx="7" fill="#fef3c7" stroke="#d97706"/>
  <text x="384" y="288" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Body Limit</text>
  <rect x="452" y="266" width="84" height="36" rx="7" fill="#fee2e2" stroke="#ef4444"/>
  <text x="494" y="288" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Auth Gate</text>

  <rect x="704" y="78" width="160" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="784" y="103" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">User API</text>
  <text x="784" y="122" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/api/users</text>
  <rect x="704" y="184" width="160" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="784" y="209" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Order API</text>
  <text x="784" y="228" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/api/orders</text>
  <rect x="704" y="290" width="160" height="60" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="784" y="315" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Payment API</text>
  <text x="784" y="334" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">/api/payments</text>

  <line x1="190" y1="228" x2="302" y2="228" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="564" y1="172" x2="692" y2="108" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <line x1="564" y1="228" x2="692" y2="214" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <line x1="564" y1="284" x2="692" y2="320" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
</svg>
