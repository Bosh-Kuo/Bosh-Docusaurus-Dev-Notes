<svg viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Compression：壓縮文字資源，減少傳輸量</text>

  <rect x="76" y="150" width="180" height="112" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="166" y="181" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Original Response</text>
  <rect x="113" y="204" width="106" height="30" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="166" y="224" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">120 KB JSON</text>

  <rect x="370" y="132" width="180" height="148" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="402" y="158" width="116" height="42" rx="10" fill="#3b82f6"/>
  <text x="460" y="184" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx</text>
  <text x="460" y="225" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">gzip / brotli</text>
  <text x="460" y="246" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Content-Encoding</text>

  <rect x="664" y="150" width="180" height="112" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="754" y="181" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Compressed</text>
  <rect x="701" y="204" width="106" height="30" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="754" y="224" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">28 KB gzip</text>

  <line x1="256" y1="206" x2="358" y2="206" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="206" x2="652" y2="206" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <rect x="144" y="334" width="632" height="42" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="360" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">適合 HTML、CSS、JavaScript、JSON；圖片與影片通常已經壓縮過</text>
</svg>
