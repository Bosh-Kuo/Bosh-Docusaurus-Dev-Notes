<svg viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="460" y="34" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">CORS：Nginx 在邊界層統一回覆允許規則</text>

  <rect x="48" y="140" width="178" height="92" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="137" y="176" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Frontend Origin</text>
  <text x="137" y="199" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">https://app.example.com</text>

  <rect x="370" y="120" width="180" height="132" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="400" y="146" width="120" height="42" rx="10" fill="#3b82f6"/>
  <text x="460" y="172" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Nginx</text>
  <text x="460" y="213" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">adds CORS headers</text>

  <rect x="696" y="140" width="178" height="92" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="785" y="176" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">API Service</text>
  <text x="785" y="199" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">https://api.example.com</text>

  <line x1="226" y1="174" x2="358" y2="174" stroke="#3b82f6" stroke-width="2.8" marker-end="url(#arrowBlue)"/>
  <text x="292" y="156" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">OPTIONS preflight</text>
  <line x1="550" y1="186" x2="684" y2="186" stroke="#16a34a" stroke-width="2.8" marker-end="url(#arrowGreen)"/>
  <text x="617" y="168" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">allowed request</text>

  <rect x="226" y="304" width="468" height="68" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="329" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Access-Control-Allow-Origin: https://app.example.com</text>
  <text x="460" y="350" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Access-Control-Allow-Methods: GET, POST, OPTIONS</text>
</svg>
