<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">shadcn/ui 常見 data-* 結構</title>
  <desc id="desc">用 compound component 與浮動元件示意 data-slot、data-state、data-side 與 data-sidebar 的不同用途。</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="918" height="498" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="460" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="bold" fill="#1e293b">shadcn/ui 把 data-* 當作 DOM 結構與狀態的語意標記</text>

  <rect x="55" y="78" width="380" height="360" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="245" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Compound Component</text>

  <rect x="95" y="135" width="300" height="52" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="245" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">data-slot="card"</text>

  <line x1="245" y1="187" x2="245" y2="216" stroke="#94a3b8" stroke-width="2"/>
  <line x1="160" y1="216" x2="330" y2="216" stroke="#94a3b8" stroke-width="2"/>
  <line x1="160" y1="216" x2="160" y2="238" stroke="#94a3b8" stroke-width="2"/>
  <line x1="330" y1="216" x2="330" y2="238" stroke="#94a3b8" stroke-width="2"/>

  <rect x="90" y="238" width="140" height="52" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">data-slot</text>
  <text x="160" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">card-header</text>

  <rect x="260" y="238" width="140" height="52" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="330" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">data-slot</text>
  <text x="330" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">card-content</text>

  <rect x="110" y="330" width="270" height="58" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="245" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">data-state="open"</text>
  <text x="245" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">父層狀態可連動子層 icon 或 content</text>

  <rect x="485" y="78" width="380" height="360" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="675" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Floating UI / Sidebar</text>

  <rect x="555" y="140" width="150" height="58" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="630" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Trigger</text>
  <text x="630" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">data-state</text>

  <rect x="710" y="230" width="130" height="72" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="775" y="256" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Content</text>
  <text x="775" y="276" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">data-side="right"</text>

  <path d="M700 180 C750 190 774 205 775 230" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="535" y="315" width="270" height="64" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">data-sidebar / data-inset</text>
  <text x="670" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">複雜佈局中的角色、模式與內縮狀態</text>

  <rect x="245" y="452" width="430" height="30" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="460" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">data-* 讓 DOM 從「一堆 div」變成可以被閱讀與選取的結構</text>
</svg>
