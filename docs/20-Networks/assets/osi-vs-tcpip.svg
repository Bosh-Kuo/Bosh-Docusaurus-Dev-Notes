<svg viewBox="0 0 720 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="550" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="28" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">OSI 七層模型 vs TCP/IP 五層模型</text>

  <!-- Column Headers -->
  <text x="155" y="55" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">OSI 參考模型（7 層）</text>
  <text x="155" y="70" font-size="11" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">理論基礎，學術標準</text>

  <text x="560" y="55" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">TCP/IP 模型（5 層）</text>
  <text x="560" y="70" font-size="11" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">實際應用，網際網路標準</text>

  <!-- ===== OSI Layers (Left Column) ===== -->
  <!-- L7 Application -->
  <rect x="30" y="84" width="245" height="54" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="75" y="107" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, -apple-system, sans-serif">L7</text>
  <text x="98" y="107" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">應用層 Application</text>
  <text x="98" y="124" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">HTTP · DNS · SMTP · FTP · SSH</text>

  <!-- L6 Presentation -->
  <rect x="30" y="140" width="245" height="54" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="75" y="163" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, -apple-system, sans-serif">L6</text>
  <text x="98" y="163" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">表達層 Presentation</text>
  <text x="98" y="180" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">翻譯 · 加密 · 壓縮</text>

  <!-- L5 Session -->
  <rect x="30" y="196" width="245" height="54" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="75" y="219" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, -apple-system, sans-serif">L5</text>
  <text x="98" y="219" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">會話層 Session</text>
  <text x="98" y="236" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">連線管理 · 斷點續傳</text>

  <!-- L4 Transport -->
  <rect x="30" y="258" width="245" height="54" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="4"/>
  <text x="75" y="281" font-size="12" font-weight="bold" fill="#6d28d9" font-family="system-ui, -apple-system, sans-serif">L4</text>
  <text x="98" y="281" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">傳輸層 Transport</text>
  <text x="98" y="298" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">TCP · UDP · Port</text>

  <!-- L3 Network -->
  <rect x="30" y="320" width="245" height="54" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="4"/>
  <text x="75" y="343" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, -apple-system, sans-serif">L3</text>
  <text x="98" y="343" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">網路層 Network</text>
  <text x="98" y="360" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">IP · Router · ICMP</text>

  <!-- L2 Data Link -->
  <rect x="30" y="382" width="245" height="54" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="75" y="405" font-size="12" font-weight="bold" fill="#b45309" font-family="system-ui, -apple-system, sans-serif">L2</text>
  <text x="98" y="405" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">資料連結層 Data Link</text>
  <text x="98" y="422" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">MAC · Switch · Ethernet · ARP</text>

  <!-- L1 Physical -->
  <rect x="30" y="444" width="245" height="54" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" rx="4"/>
  <text x="75" y="467" font-size="12" font-weight="bold" fill="#475569" font-family="system-ui, -apple-system, sans-serif">L1</text>
  <text x="98" y="467" font-size="13" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">實體層 Physical</text>
  <text x="98" y="484" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">網路線 · 光纖 · 無線電波</text>

  <!-- ===== MAPPING LINES (Middle) ===== -->
  <!-- L7+L6+L5 → Application bracket -->
  <line x1="275" y1="111" x2="310" y2="111" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="275" y1="167" x2="295" y2="167" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="275" y1="223" x2="310" y2="223" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Bracket vertical -->
  <line x1="310" y1="111" x2="310" y2="223" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Center horizontal to TCP/IP box -->
  <line x1="310" y1="167" x2="440" y2="167" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="434,162 446,167 434,172" fill="#3b82f6"/>

  <!-- L4 → Transport -->
  <line x1="275" y1="285" x2="440" y2="285" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="434,280 446,285 434,290" fill="#7c3aed"/>

  <!-- L3 → Internet -->
  <line x1="275" y1="347" x2="440" y2="347" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="434,342 446,347 434,352" fill="#16a34a"/>

  <!-- L2+L1 → Network Access bracket -->
  <line x1="275" y1="409" x2="310" y2="409" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="275" y1="471" x2="310" y2="471" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="310" y1="409" x2="310" y2="471" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="310" y1="440" x2="440" y2="440" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="434,435 446,440 434,445" fill="#94a3b8"/>

  <!-- ===== TCP/IP Layers (Right Column) ===== -->
  <!-- Application (combines L5+L6+L7) -->
  <rect x="445" y="84" width="245" height="166" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="567" y="142" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">應用層</text>
  <text x="567" y="160" font-size="13" font-weight="bold" fill="#1d4ed8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Application</text>
  <text x="567" y="180" font-size="10" fill="#1d4ed8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">（整合 L5 · L6 · L7）</text>
  <text x="567" y="196" font-size="10" fill="#3b82f6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">HTTP · DNS · SMTP · SSH</text>
  <text x="567" y="210" font-size="10" fill="#3b82f6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">TLS · Session 管理</text>
  <text x="567" y="224" font-size="10" fill="#3b82f6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">翻譯 · 加密 · 壓縮</text>

  <!-- Transport -->
  <rect x="445" y="258" width="245" height="54" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="4"/>
  <text x="567" y="281" font-size="14" font-weight="bold" fill="#6d28d9" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">傳輸層 Transport</text>
  <text x="567" y="298" font-size="10" fill="#7c3aed" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">TCP · UDP · Port</text>

  <!-- Internet / Network -->
  <rect x="445" y="320" width="245" height="54" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="567" y="343" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">網際網路層 Internet</text>
  <text x="567" y="360" font-size="10" fill="#16a34a" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">IP · Router · ICMP</text>

  <!-- Network Access (combines L1+L2) -->
  <rect x="445" y="382" width="245" height="116" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" rx="4"/>
  <text x="567" y="427" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">網路存取層</text>
  <text x="567" y="445" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Network Access</text>
  <text x="567" y="464" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">（整合 L1 · L2）</text>
  <text x="567" y="480" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MAC · Ethernet · 光纖 · 無線電波</text>

  <!-- Bottom note -->
  <rect x="30" y="512" width="660" height="30" fill="#fefce8" stroke="#eab308" stroke-width="1" rx="4"/>
  <text x="360" y="531" font-size="11" fill="#713f12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">TCP/IP 模型是今日實際網際網路的運作基礎；OSI 模型是學習、分析與排錯時的「通用語言」</text>
</svg>
