<svg viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="860" height="300" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">IPv6 地址格式（128 位元）</text>

  <!-- Full address label -->
  <text x="430" y="52" text-anchor="middle" font-size="13" fill="#475569">完整格式：</text>
  <rect x="120" y="58" width="620" height="28" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="4"/>
  <text x="430" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b" letter-spacing="1">2001:0db8:0000:0000:0000:0000:0000:0001</text>

  <!-- 8 group boxes -->
  <!-- Group 1: 2001 - blue (global routing prefix) -->
  <rect x="22" y="100" width="90" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="67" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">2001</text>
  <text x="67" y="148" text-anchor="middle" font-size="9" fill="#3b82f6">全球路由前綴</text>

  <!-- Colon -->
  <text x="118" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 2: 0db8 - blue (subnet ID) -->
  <rect x="124" y="100" width="90" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="169" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">0db8</text>
  <text x="169" y="148" text-anchor="middle" font-size="9" fill="#3b82f6">子網路 ID</text>

  <!-- Colon -->
  <text x="220" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 3: 0000 - gray -->
  <rect x="226" y="100" width="90" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
  <text x="271" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#94a3b8">0000</text>
  <text x="271" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">全零區段</text>

  <!-- Colon -->
  <text x="322" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 4: 0000 - gray -->
  <rect x="328" y="100" width="90" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
  <text x="373" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#94a3b8">0000</text>
  <text x="373" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">全零區段</text>

  <!-- Colon -->
  <text x="424" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 5: 0000 - gray -->
  <rect x="430" y="100" width="90" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
  <text x="475" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#94a3b8">0000</text>
  <text x="475" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">全零區段</text>

  <!-- Colon -->
  <text x="526" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 6: 0000 - gray -->
  <rect x="532" y="100" width="90" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
  <text x="577" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#94a3b8">0000</text>
  <text x="577" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">全零區段</text>

  <!-- Colon -->
  <text x="628" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 7: 0000 - gray -->
  <rect x="634" y="100" width="90" height="60" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" rx="6"/>
  <text x="679" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#94a3b8">0000</text>
  <text x="679" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">全零區段</text>

  <!-- Colon -->
  <text x="730" y="135" text-anchor="middle" font-size="20" font-weight="bold" fill="#94a3b8">:</text>

  <!-- Group 8: 0001 - green (interface ID) -->
  <rect x="736" y="100" width="100" height="60" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="6"/>
  <text x="786" y="127" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">0001</text>
  <text x="786" y="148" text-anchor="middle" font-size="9" fill="#16a34a">介面 ID</text>

  <!-- Abbreviation steps -->
  <!-- Step 1 -->
  <rect x="22" y="178" width="816" height="36" fill="#fff7ed" stroke="#d97706" stroke-width="1" rx="4"/>
  <text x="22" y="196" dx="10" font-size="11" font-weight="bold" fill="#d97706">規則一：省略每組前導零</text>
  <text x="230" y="196" font-size="11" fill="#475569">  0db8 → db8，0000 → 0</text>
  <text x="22" y="208" dx="10" font-size="12" font-weight="bold" fill="#1e293b">→  2001:db8:0:0:0:0:0:1</text>

  <!-- Arrow between steps -->
  <text x="430" y="224" text-anchor="middle" font-size="14" fill="#94a3b8">↓</text>

  <!-- Step 2 -->
  <rect x="22" y="228" width="816" height="36" fill="#fff7ed" stroke="#d97706" stroke-width="1" rx="4"/>
  <text x="22" y="246" dx="10" font-size="11" font-weight="bold" fill="#d97706">規則二：以 :: 代替連續全零組（只能用一次）</text>
  <text x="22" y="258" dx="10" font-size="12" font-weight="bold" fill="#1e293b">→  2001:db8::1</text>

  <!-- Final result -->
  <rect x="220" y="272" width="420" height="22" fill="#16a34a" rx="6"/>
  <text x="430" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">最終縮寫：2001:db8::1</text>

  <!-- Bottom note -->
  <text x="430" y="312" text-anchor="middle" font-size="11" fill="#475569">128 位元 = 8 × 16 位元 ｜ 共約 3.4 × 10³⁸ 個地址（:: 只能使用一次，否則無法確定各段零的數量）</text>
</svg>
