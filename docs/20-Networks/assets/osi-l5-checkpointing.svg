<svg viewBox="0 0 780 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="240" fill="#ffffff"/>
  <text x="390" y="26" font-size="15" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L5 會話層：斷點續傳（Checkpointing）機制</text>

  <!-- Scenario label -->
  <text x="390" y="46" font-size="11" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">場景：下載一個 100MB 的大型檔案</text>

  <!-- ===== Progress Bar Track ===== -->
  <rect x="60" y="65" width="660" height="32" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5" rx="6"/>

  <!-- Completed section (0% to 50%): blue -->
  <rect x="60" y="65" width="330" height="32" fill="#3b82f6" rx="6"/>

  <!-- In-progress then lost (50% to 60%): lighter orange, showing what was "in transit" -->
  <rect x="390" y="65" width="66" height="32" fill="#fed7aa" rx="0"/>

  <!-- ===== Percentage markers ===== -->
  <!-- 0% -->
  <text x="60" y="58" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">0%</text>
  <line x1="60" y1="97" x2="60" y2="108" stroke="#475569" stroke-width="1"/>
  <text x="60" y="118" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">0 MB</text>

  <!-- 25% checkpoint -->
  <line x1="225" y1="57" x2="225" y2="97" stroke="#16a34a" stroke-width="2"/>
  <circle cx="225" cy="57" r="7" fill="#16a34a"/>
  <text x="225" y="61" font-size="9" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">C</text>
  <text x="225" y="118" font-size="10" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Checkpoint</text>
  <text x="225" y="130" font-size="10" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">25 MB</text>

  <!-- 50% checkpoint -->
  <line x1="390" y1="57" x2="390" y2="97" stroke="#16a34a" stroke-width="2"/>
  <circle cx="390" cy="57" r="7" fill="#16a34a"/>
  <text x="390" y="61" font-size="9" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">C</text>
  <text x="390" y="118" font-size="10" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Checkpoint</text>
  <text x="390" y="130" font-size="10" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">50 MB ✓ 已儲存</text>

  <!-- 60%: Network break -->
  <line x1="456" y1="57" x2="456" y2="108" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <circle cx="456" cy="57" r="9" fill="#ef4444"/>
  <text x="456" y="61" font-size="11" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">✕</text>
  <text x="456" y="118" font-size="10" fill="#b91c1c" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">網路中斷！</text>
  <text x="456" y="130" font-size="10" fill="#b91c1c" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">60 MB</text>

  <!-- 100% -->
  <text x="720" y="58" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">100%</text>
  <line x1="720" y1="97" x2="720" y2="108" stroke="#475569" stroke-width="1"/>
  <text x="720" y="118" font-size="10" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">100 MB</text>

  <!-- ===== Resume arrow ===== -->
  <!-- Curved arrow from 60MB position back to 50% checkpoint -->
  <path d="M 456,133 C 456,158 390,158 390,133" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <text x="423" y="175" font-size="11" font-weight="bold" fill="#b45309" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">斷線重連後，從 50MB 繼續！</text>
  <text x="423" y="188" font-size="11" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">無需從頭開始重新下載</text>

  <!-- Without checkpointing comparison -->
  <rect x="60" y="212" width="660" height="22" fill="#fee2e2" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="390" y="227" font-size="11" fill="#b91c1c" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">若無 Checkpointing：斷線後必須從 0MB 重頭下載，損失所有進度</text>

  <!-- Legend -->
  <circle cx="68" cy="148" r="6" fill="#16a34a"/>
  <text x="80" y="152" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">C = Checkpoint（檢查點，已記錄的安全存檔點）</text>

  <defs>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
