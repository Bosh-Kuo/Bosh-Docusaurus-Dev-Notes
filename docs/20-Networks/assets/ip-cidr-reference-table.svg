<svg viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="920" height="360" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">常用 CIDR 區塊速查表</text>

  <!-- Table outer border -->
  <rect x="20" y="42" width="880" height="298" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" rx="4"/>

  <!-- Header row background (green) -->
  <rect x="20" y="42" width="880" height="36" fill="#16a34a" rx="4"/>
  <rect x="20" y="60" width="880" height="18" fill="#16a34a"/>

  <!-- Column layout:
       CIDR:           x=20,  w=110  center=75
       Subnet Mask:    x=130, w=185  center=222
       Total Addresses:x=315, w=175  center=402
       Usable Hosts:   x=490, w=175  center=577
       典型用途:        x=665, w=235  center=782
  -->

  <!-- Header text -->
  <text x="75" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">CIDR</text>
  <text x="222" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Subnet Mask</text>
  <text x="402" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">總地址數</text>
  <text x="577" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">可用主機數</text>
  <text x="782" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">典型用途</text>

  <!-- Column dividers -->
  <line x1="130" y1="42" x2="130" y2="340" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="315" y1="42" x2="315" y2="340" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="490" y1="42" x2="490" y2="340" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="665" y1="42" x2="665" y2="340" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row height = 42px. Starting y=78 -->

  <!-- === ROW 1: /8 === y=78 to 120, white -->
  <rect x="21" y="79" width="878" height="41" fill="#ffffff"/>
  <!-- CIDR badge -->
  <rect x="30" y="87" width="54" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="8"/>
  <text x="57" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">/8</text>
  <!-- Subnet Mask -->
  <text x="222" y="104" text-anchor="middle" font-size="13" fill="#1e293b">255.0.0.0</text>
  <!-- Total -->
  <text x="402" y="104" text-anchor="middle" font-size="13" fill="#1e293b">16,777,216</text>
  <!-- Usable -->
  <text x="577" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">16,777,214</text>
  <!-- Use -->
  <text x="782" y="104" text-anchor="middle" font-size="12" fill="#475569">大型雲端供應商</text>

  <!-- Row divider -->
  <line x1="20" y1="120" x2="900" y2="120" stroke="#e2e8f0" stroke-width="1"/>

  <!-- === ROW 2: /16 === y=120 to 162, light gray -->
  <rect x="21" y="121" width="878" height="41" fill="#f8fafc"/>
  <!-- CIDR badge -->
  <rect x="27" y="129" width="60" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="8"/>
  <text x="57" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">/16</text>
  <!-- Subnet Mask -->
  <text x="222" y="146" text-anchor="middle" font-size="13" fill="#1e293b">255.255.0.0</text>
  <!-- Total -->
  <text x="402" y="146" text-anchor="middle" font-size="13" fill="#1e293b">65,536</text>
  <!-- Usable -->
  <text x="577" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">65,534</text>
  <!-- Use -->
  <text x="782" y="146" text-anchor="middle" font-size="12" fill="#475569">大型 VPC、企業網路</text>

  <!-- Row divider -->
  <line x1="20" y1="162" x2="900" y2="162" stroke="#e2e8f0" stroke-width="1"/>

  <!-- === ROW 3: /20 === y=162 to 204, white -->
  <rect x="21" y="163" width="878" height="41" fill="#ffffff"/>
  <!-- CIDR badge -->
  <rect x="27" y="171" width="60" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="8"/>
  <text x="57" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">/20</text>
  <!-- Subnet Mask -->
  <text x="222" y="188" text-anchor="middle" font-size="13" fill="#1e293b">255.255.240.0</text>
  <!-- Total -->
  <text x="402" y="188" text-anchor="middle" font-size="13" fill="#1e293b">4,096</text>
  <!-- Usable -->
  <text x="577" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">4,094</text>
  <!-- Use -->
  <text x="782" y="188" text-anchor="middle" font-size="12" fill="#475569">中型子網路</text>

  <!-- Row divider -->
  <line x1="20" y1="204" x2="900" y2="204" stroke="#e2e8f0" stroke-width="1"/>

  <!-- === ROW 4: /24 === y=204 to 246, HIGHLIGHTED light green (most common) -->
  <rect x="21" y="205" width="878" height="41" fill="#dcfce7"/>
  <!-- CIDR badge -->
  <rect x="27" y="213" width="60" height="24" fill="#16a34a" rx="8"/>
  <text x="57" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">/24</text>
  <!-- Subnet Mask -->
  <text x="222" y="230" text-anchor="middle" font-size="13" fill="#1e293b">255.255.255.0</text>
  <!-- Total -->
  <text x="402" y="230" text-anchor="middle" font-size="13" fill="#1e293b">256</text>
  <!-- Usable -->
  <text x="577" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">254</text>
  <!-- Use -->
  <text x="782" y="225" text-anchor="middle" font-size="12" fill="#15803d" font-weight="bold">小型子網路</text>
  <text x="782" y="240" text-anchor="middle" font-size="11" fill="#16a34a">（最常見）</text>

  <!-- Row divider -->
  <line x1="20" y1="246" x2="900" y2="246" stroke="#bbf7d0" stroke-width="1"/>

  <!-- === ROW 5: /28 === y=246 to 288, light gray -->
  <rect x="21" y="247" width="878" height="41" fill="#f8fafc"/>
  <!-- CIDR badge -->
  <rect x="27" y="255" width="60" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="8"/>
  <text x="57" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">/28</text>
  <!-- Subnet Mask -->
  <text x="222" y="272" text-anchor="middle" font-size="13" fill="#1e293b">255.255.255.240</text>
  <!-- Total -->
  <text x="402" y="272" text-anchor="middle" font-size="13" fill="#1e293b">16</text>
  <!-- Usable -->
  <text x="577" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">14</text>
  <!-- Use -->
  <text x="782" y="272" text-anchor="middle" font-size="12" fill="#475569">小型伺服器群組</text>

  <!-- Row divider -->
  <line x1="20" y1="288" x2="900" y2="288" stroke="#e2e8f0" stroke-width="1"/>

  <!-- === ROW 6: /32 === y=288 to 330, white -->
  <rect x="21" y="289" width="878" height="51" fill="#ffffff"/>
  <!-- CIDR badge -->
  <rect x="27" y="300" width="60" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="8"/>
  <text x="57" y="317" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">/32</text>
  <!-- Subnet Mask -->
  <text x="222" y="317" text-anchor="middle" font-size="13" fill="#1e293b">255.255.255.255</text>
  <!-- Total -->
  <text x="402" y="317" text-anchor="middle" font-size="13" fill="#1e293b">1</text>
  <!-- Usable -->
  <text x="577" y="317" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">1</text>
  <!-- Use -->
  <text x="782" y="312" text-anchor="middle" font-size="12" fill="#475569">單一主機</text>
  <text x="782" y="327" text-anchor="middle" font-size="11" fill="#64748b">（精確匹配路由規則）</text>

  <!-- Footnote area -->
  <text x="460" y="350" text-anchor="middle" font-size="11" fill="#475569">可用主機數 = 2^(32−N) − 2　　/32 例外：單一主機，用於精確路由匹配，不套用此公式</text>
</svg>
