<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="28" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MAC 地址 vs IP 地址：兩種截然不同的定址哲學</text>

  <!-- ===== LEFT SIDE: MAC (Flat) ===== -->
  <rect x="20" y="44" width="390" height="340" fill="#fef9f0" stroke="#d97706" stroke-width="2" rx="8"/>
  <text x="215" y="68" font-size="14" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MAC 地址：扁平式結構</text>
  <text x="215" y="86" font-size="11" fill="#b45309" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">地址本身不帶任何位置資訊（如身分證號碼）</text>

  <!-- Device circles -->
  <!-- Device A -->
  <circle cx="100" cy="155" r="28" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="100" y="150" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">裝置</text>
  <text x="100" y="164" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">A</text>
  <text x="100" y="196" font-size="9" fill="#78350f" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">AA:BB:CC:11:22:33</text>

  <!-- Device B -->
  <circle cx="215" cy="135" r="28" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="215" y="130" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">裝置</text>
  <text x="215" y="144" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">B</text>
  <text x="215" y="176" font-size="9" fill="#78350f" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">00:1A:2B:FF:44:55</text>

  <!-- Device C -->
  <circle cx="330" cy="155" r="28" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="330" y="150" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">裝置</text>
  <text x="330" y="164" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">C</text>
  <text x="330" y="196" font-size="9" fill="#78350f" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">3C:4D:5E:90:AB:CD</text>

  <!-- Device D -->
  <circle cx="120" cy="270" r="28" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="120" y="265" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">裝置</text>
  <text x="120" y="279" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">D</text>
  <text x="120" y="310" font-size="9" fill="#78350f" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">7F:E0:C1:DA:B2:99</text>

  <!-- Device E -->
  <circle cx="290" cy="270" r="28" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="290" y="265" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">裝置</text>
  <text x="290" y="279" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">E</text>
  <text x="290" y="310" font-size="9" fill="#78350f" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">52:54:00:12:34:56</text>

  <!-- Flat connecting lines between devices -->
  <line x1="128" y1="155" x2="187" y2="140" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="243" y1="140" x2="302" y2="155" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="100" y1="183" x2="112" y2="242" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="215" y1="163" x2="135" y2="242" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="270" y1="252" x2="230" y2="160" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="148" y1="270" x2="262" y2="270" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Key insight label -->
  <rect x="35" y="334" width="360" height="38" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="4"/>
  <text x="215" y="350" font-size="11" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">地址之間毫無規律，路由器若只靠 MAC 尋址</text>
  <text x="215" y="364" font-size="11" fill="#92400e" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">就必須廣播全網，路由表將達數百億條</text>

  <!-- ===== CENTER DIVIDER ===== -->
  <line x1="430" y1="44" x2="430" y2="384" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6"/>

  <!-- ===== RIGHT SIDE: IP (Hierarchical) ===== -->
  <rect x="450" y="44" width="390" height="340" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="645" y="68" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">IP 地址：層級式結構</text>
  <text x="645" y="86" font-size="11" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">地址本身就告訴路由器「目標在哪個方向」</text>

  <!-- Root: NTU network block -->
  <rect x="565" y="100" width="160" height="44" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" rx="6"/>
  <text x="645" y="120" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">台大校園</text>
  <text x="645" y="136" font-size="11" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">140.112.0.0 / 16</text>

  <!-- Branch lines from root -->
  <line x1="595" y1="144" x2="545" y2="186" stroke="#16a34a" stroke-width="2"/>
  <line x1="695" y1="144" x2="745" y2="186" stroke="#16a34a" stroke-width="2"/>

  <!-- Subnet A -->
  <rect x="467" y="186" width="156" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="545" y="203" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">電機系子網</text>
  <text x="545" y="218" font-size="10" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">140.112.1.0 / 24</text>

  <!-- Subnet B -->
  <rect x="667" y="186" width="156" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="745" y="203" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">資工系子網</text>
  <text x="745" y="218" font-size="10" fill="#15803d" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">140.112.2.0 / 24</text>

  <!-- Host lines from Subnet A -->
  <line x1="515" y1="226" x2="490" y2="264" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="565" y1="226" x2="590" y2="264" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Host lines from Subnet B -->
  <line x1="715" y1="226" x2="690" y2="264" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="765" y1="226" x2="790" y2="264" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Hosts under Subnet A -->
  <circle cx="490" cy="280" r="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="490" y="276" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">主機</text>
  <text x="490" y="288" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">.1</text>

  <circle cx="590" cy="280" r="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="276" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">主機</text>
  <text x="590" y="288" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">.2</text>

  <!-- Hosts under Subnet B -->
  <circle cx="690" cy="280" r="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="690" y="276" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">主機</text>
  <text x="690" y="288" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">.1</text>

  <circle cx="790" cy="280" r="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="790" y="276" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">主機</text>
  <text x="790" y="288" font-size="9" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">.2</text>

  <!-- Key insight label -->
  <rect x="465" y="322" width="360" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="4"/>
  <text x="645" y="339" font-size="11" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">路由器只需知道「140.112 的方向」</text>
  <text x="645" y="354" font-size="11" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">即可逐步導向正確目標（路由匯總）</text>
  <text x="645" y="368" font-size="11" fill="#166534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">路由表從「數百億條」縮減為「數十萬條網段」</text>
</svg>
