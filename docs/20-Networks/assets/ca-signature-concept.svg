<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .bg { fill: #ffffff; rx: 12; }
            .env { fill: #fef08a; stroke: #ca8a04; stroke-width: 2; rx: 4; }
            .seal { fill: #ef4444; stroke: #991b1b; stroke-width: 2; }
            .text-main { font-family: system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
            .text-desc { font-family: system-ui, sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }
            .arrow { fill: none; stroke: #94a3b8; stroke-width: 3; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
        </marker>
    </defs>
    <rect width="800" height="400" class="bg" />

    <!-- Left: CA Certificate Creation -->
    <rect x="100" y="80" width="160" height="120" class="env" />
    <path d="M 100 80 L 180 140 L 260 80" fill="none" stroke="#ca8a04" stroke-width="2" />
    <text x="180" y="230" class="text-main">數位憑證 (信封)</text>
    <text x="180" y="255" class="text-desc">內含：目標伺服器公鑰</text>
    <text x="180" y="275" class="text-desc">網域名稱名稱</text>
    
    <!-- Seal (Private Key Encrypt) -->
    <circle cx="180" cy="140" r="25" class="seal" />
    <text x="180" y="145" class="text-main" fill="#ffffff" font-size="20">簽</text>
    <text x="180" y="185" class="text-main" fill="#b91c1c">CA 專屬熱蠟印記</text>
    <text x="180" y="305" class="text-desc" fill="#b91c1c" font-size="12">(利用 CA 絕對保密的私鑰壓印)</text>

    <!-- Arrow Right -->
    <path d="M 320 140 L 480 140" class="arrow" marker-end="url(#arrowhead)" />
    <text x="400" y="130" class="text-desc">傳送給瀏覽器</text>

    <!-- Right: Client Verification -->
    <rect x="540" y="80" width="160" height="120" class="env" />
    <path d="M 540 80 L 620 140 L 760 80" fill="none" stroke="#ca8a04" stroke-width="2" />
    <circle cx="620" cy="140" r="25" class="seal" />
    <text x="620" y="145" class="text-main" fill="#ffffff" font-size="20">簽</text>

    <!-- Magnifying Glass (Public Key) -->
    <circle cx="640" cy="160" r="30" fill="#bae6fd" fill-opacity="0.6" stroke="#0284c7" stroke-width="4" />
    <line x1="660" y1="180" x2="690" y2="210" stroke="#0284c7" stroke-width="6" stroke-linecap="round" />
    
    <text x="620" y="260" class="text-main" fill="#0369a1">驗證封印！</text>
    <text x="620" y="285" class="text-desc">使用內建的「CA 公鑰」檢視印記</text>
    <text x="620" y="305" class="text-desc">破掉或假印章一律警告危險！</text>

</svg>
