<svg viewBox="0 0 920 625" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="625" fill="#ffffff"/>

  <!-- Title -->
  <text x="460" y="30" font-size="17" font-weight="bold" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">OSI 七層參考模型 (OSI Reference Model)</text>

  <!-- Header Row -->
  <rect x="20" y="44" width="880" height="29" fill="#f1f5f9" rx="4"/>
  <text x="65" y="63" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">層級</text>
  <text x="255" y="63" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">層名稱 / 常見裝置或協定</text>
  <text x="475" y="63" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">資料單元 (PDU)</text>
  <text x="640" y="63" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">識別地址</text>
  <text x="810" y="63" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">傳輸範疇</text>

  <!-- Column dividers: 115 | 390 | 560 | 720 -->
  <line x1="115" y1="44" x2="115" y2="603" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="390" y1="44" x2="390" y2="603" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="560" y1="44" x2="560" y2="603" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="720" y1="44" x2="720" y2="603" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Outer border -->
  <rect x="20" y="44" width="880" height="560" fill="none" stroke="#94a3b8" stroke-width="1.5" rx="4"/>

  <!-- ========== L7 Application ========== -->
  <rect x="21" y="73" width="878" height="72" fill="#dbeafe"/>
  <rect x="30" y="82" width="72" height="54" rx="8" fill="#3b82f6"/>
  <text x="66" y="109" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L7</text>
  <text x="66" y="127" font-size="10" fill="#bfdbfe" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Application</text>
  <text x="126" y="98" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">應用層 Application Layer</text>
  <text x="126" y="114" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">HTTP · HTTPS · DNS · SMTP</text>
  <text x="126" y="129" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">FTP · SSH · DHCP · WebSocket</text>
  <text x="475" y="112" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Data / Message</text>
  <text x="640" y="112" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">服務協定 (Protocol)</text>
  <text x="810" y="106" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">進程到進程</text>
  <text x="810" y="122" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Process-to-Process</text>
  <line x1="21" y1="145" x2="899" y2="145" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ========== L6 Presentation ========== -->
  <rect x="21" y="146" width="878" height="72" fill="#eff6ff"/>
  <rect x="30" y="155" width="72" height="54" rx="8" fill="#3b82f6"/>
  <text x="66" y="182" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L6</text>
  <text x="66" y="200" font-size="10" fill="#bfdbfe" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Presentation</text>
  <text x="126" y="171" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">表達層 Presentation Layer</text>
  <text x="126" y="187" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">翻譯 · 加密 (TLS/SSL)</text>
  <text x="126" y="202" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">壓縮 (JPEG · MP4 · MP3)</text>
  <text x="475" y="185" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Data / Message</text>
  <text x="640" y="185" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">編碼格式 (UTF-8)</text>
  <text x="810" y="179" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">進程到進程</text>
  <text x="810" y="195" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Process-to-Process</text>
  <line x1="21" y1="218" x2="899" y2="218" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ========== L5 Session ========== -->
  <rect x="21" y="219" width="878" height="72" fill="#dbeafe"/>
  <rect x="30" y="228" width="72" height="54" rx="8" fill="#3b82f6"/>
  <text x="66" y="255" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L5</text>
  <text x="66" y="273" font-size="10" fill="#bfdbfe" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Session</text>
  <text x="126" y="244" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">會話層 Session Layer</text>
  <text x="126" y="260" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">建立 · 管理 · 終止通訊對話</text>
  <text x="126" y="275" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">斷點續傳 (Checkpointing)</text>
  <text x="475" y="258" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Data / Message</text>
  <text x="640" y="258" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Session ID</text>
  <text x="810" y="252" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">進程到進程</text>
  <text x="810" y="268" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Process-to-Process</text>
  <line x1="21" y1="291" x2="899" y2="291" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ========== L4 Transport ========== -->
  <rect x="21" y="292" width="878" height="72" fill="#ede9fe"/>
  <rect x="30" y="301" width="72" height="54" rx="8" fill="#7c3aed"/>
  <text x="66" y="328" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L4</text>
  <text x="66" y="346" font-size="10" fill="#ddd6fe" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Transport</text>
  <text x="126" y="317" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">傳輸層 Transport Layer</text>
  <text x="126" y="333" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">TCP · UDP</text>
  <text x="475" y="331" font-size="12" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Segment / Datagram</text>
  <text x="640" y="331" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Port（連接埠）</text>
  <text x="810" y="325" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">端到端</text>
  <text x="810" y="341" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">End-to-End</text>
  <line x1="21" y1="364" x2="899" y2="364" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ========== L3 Network ========== -->
  <rect x="21" y="365" width="878" height="72" fill="#dcfce7"/>
  <rect x="30" y="374" width="72" height="54" rx="8" fill="#16a34a"/>
  <text x="66" y="401" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L3</text>
  <text x="66" y="419" font-size="10" fill="#bbf7d0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Network</text>
  <text x="126" y="390" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">網路層 Network Layer</text>
  <text x="126" y="406" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">路由器 (Router) · IP · ICMP · ARP</text>
  <text x="475" y="404" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Packet（封包）</text>
  <text x="640" y="404" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">IP 地址</text>
  <text x="810" y="398" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">主機到主機</text>
  <text x="810" y="414" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Host-to-Host（跨網段）</text>
  <line x1="21" y1="437" x2="899" y2="437" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ========== L2 Data Link ========== -->
  <rect x="21" y="438" width="878" height="72" fill="#fef3c7"/>
  <rect x="30" y="447" width="72" height="54" rx="8" fill="#d97706"/>
  <text x="66" y="474" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L2</text>
  <text x="66" y="492" font-size="10" fill="#fde68a" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Data Link</text>
  <text x="126" y="463" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">資料連結層 Data Link Layer</text>
  <text x="126" y="479" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">交換機 (Switch) · 網路卡 (NIC)</text>
  <text x="126" y="494" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">乙太網路 (Ethernet)</text>
  <text x="475" y="477" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Frame（幀）</text>
  <text x="640" y="477" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MAC 地址</text>
  <text x="810" y="471" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">跳到跳</text>
  <text x="810" y="487" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Hop-to-Hop（點對點）</text>
  <line x1="21" y1="510" x2="899" y2="510" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ========== L1 Physical ========== -->
  <rect x="21" y="511" width="878" height="92" fill="#f1f5f9"/>
  <rect x="30" y="520" width="72" height="54" rx="8" fill="#64748b"/>
  <text x="66" y="547" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">L1</text>
  <text x="66" y="565" font-size="10" fill="#e2e8f0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Physical</text>
  <text x="126" y="539" font-size="14" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">實體層 Physical Layer</text>
  <text x="126" y="555" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">網路線 (Cat6) · 光纖 · 無線電波</text>
  <text x="126" y="570" font-size="10" fill="#475569" font-family="system-ui, -apple-system, sans-serif">集線器 (Hub) · 中繼器 (Repeater)</text>
  <text x="475" y="557" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Bits（位元）</text>
  <text x="640" y="557" font-size="13" fill="#1e293b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">實體訊號 / 電壓</text>
  <text x="810" y="551" font-size="12" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">位元流傳輸</text>
  <text x="810" y="567" font-size="11" fill="#475569" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Bit Transmission</text>
</svg>
