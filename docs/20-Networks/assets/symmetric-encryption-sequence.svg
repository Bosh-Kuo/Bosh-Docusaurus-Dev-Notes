<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .actor { fill: #f8fafc; stroke: #475569; stroke-width: 2; rx: 8; }
            .actor-text { font-family: system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
            .line { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 4; }
            .msg-line { stroke: #3b82f6; stroke-width: 2; }
            .msg-text { font-family: system-ui, sans-serif; font-size: 14px; fill: #1e40af; text-anchor: middle; }
            .danger-line { stroke: #ef4444; stroke-width: 2; }
            .danger-text { font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #b91c1c; text-anchor: middle; }
            .box { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 4; }
            .box-text { font-family: system-ui, sans-serif; font-size: 14px; fill: #92400e; text-anchor: middle; }
        </style>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
        </marker>
        <marker id="danger-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
        </marker>
        <g id="key-icon" transform="scale(0.8)">
            <circle cx="10" cy="10" r="6" fill="none" stroke="#d97706" stroke-width="3"/>
            <line x1="15" y1="10" x2="30" y2="10" stroke="#d97706" stroke-width="3"/>
            <line x1="22" y1="10" x2="22" y2="16" stroke="#d97706" stroke-width="3"/>
            <line x1="28" y1="10" x2="28" y2="16" stroke="#d97706" stroke-width="3"/>
        </g>
        <g id="data-icon" transform="scale(0.8)">
            <!-- Document icon representing plaintext data -->
            <rect x="0" y="0" width="20" height="26" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
            <path d="M 5 7 h 10 M 5 13 h 10 M 5 19 h 6" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
        </g>
        <g id="ciphertext-icon" transform="scale(0.8)">
            <!-- Document icon with a lock representing encrypted data -->
            <rect x="0" y="0" width="20" height="26" rx="2" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
            <path d="M 5 7 h 10 M 5 13 h 10 M 5 19 h 6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
            <rect x="10" y="14" width="14" height="10" rx="1.5" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
            <path d="M 13 14 V 9 A 4 4 0 0 1 21 9 V 14" fill="none" stroke="#d97706" stroke-width="2"/>
        </g>
    </defs>

    <rect width="800" height="450" fill="#ffffff" rx="12" />

    <!-- Actors -->
    <rect x="100" y="40" width="120" height="40" class="actor" />
    <text x="160" y="66" class="actor-text">Client (客戶端)</text>
    <line x1="160" y1="80" x2="160" y2="420" class="line" />

    <rect x="340" y="40" width="120" height="40" class="actor" fill="#fee2e2" stroke="#ef4444" />
    <text x="400" y="66" class="actor-text" fill="#b91c1c">駭客 / 監聽者</text>
    <line x1="400" y1="80" x2="400" y2="420" class="line" stroke="#fca5a5" />

    <rect x="580" y="40" width="120" height="40" class="actor" />
    <text x="640" y="66" class="actor-text">Server (伺服器)</text>
    <line x1="640" y1="80" x2="640" y2="420" class="line" />

    <!-- Step 1: Key Exchange (Insecure) -->
    <path d="M 160 120 L 630 120" class="danger-line" marker-end="url(#danger-arrow)" />
    <text x="240" y="110" class="danger-text">1. 傳遞共同鑰匙</text>
    <use href="#key-icon" x="375" y="115" /> <!-- Pos mapping: 375 * 0.8 = 300 -->

    <rect x="420" y="95" width="120" height="30" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="4" />
    <text x="480" y="115" class="danger-text" font-size="12">攔截並複製鑰匙！</text>

    <!-- Client Encrypts -->
    <rect x="70" y="150" width="180" height="60" class="box" />
    <text x="160" y="170" class="box-text">使用鑰匙加密資料</text>
    <use href="#key-icon" x="90" y="185" />
    <text x="125" y="195" class="box-text">+</text>
    <use href="#data-icon" x="140" y="180" />
    <text x="173" y="195" class="box-text">→</text>
    <use href="#ciphertext-icon" x="190" y="180" />

    <!-- Step 2: Data Transfer -->
    <path d="M 160 240 L 630 240" class="msg-line" marker-end="url(#arrow)" />
    <text x="250" y="230" class="msg-text">2. [密文] 遞給 Server</text>
    <use href="#ciphertext-icon" x="360" y="215" />
    
    <rect x="420" y="215" width="190" height="30" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="4" />
    <text x="515" y="235" class="danger-text" font-size="12">使用偷來的鑰匙解密看光光！</text>

    <!-- Process Box Server -->
    <rect x="530" y="280" width="200" height="60" class="box" />
    <text x="630" y="300" class="box-text">使用鑰匙解密密文</text>
    <use href="#ciphertext-icon" x="565" y="310" />
    <text x="595" y="325" class="box-text">+</text>
    <use href="#key-icon" x="610" y="315" />
    <text x="640" y="325" class="box-text">→</text>
    <use href="#data-icon" x="660" y="310" />

    <!-- Conclusion Box -->
    <rect x="140" y="360" width="520" height="50" class="box" fill="#f1f5f9" stroke="#cbd5e1" />
    <text x="400" y="380" class="actor-text" font-size="14">痛點：金鑰配送問題</text>
    <text x="400" y="400" class="box-text" fill="#475569">在不安全的網路上傳遞「對稱金鑰」非常危險，容易被攔截且破解全部通訊。</text>
</svg>
