<svg viewBox="0 0 800 780" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .actor { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
            .actor-text { font-family: system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
            .line { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 4; }
            .msg-line { stroke: #8b5cf6; stroke-width: 2; }
            .msg-text { font-family: system-ui, sans-serif; font-size: 14px; fill: #5b21b6; text-anchor: middle; }
            .sym-line { stroke: #f59e0b; stroke-width: 3; }
            .sym-text { font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #b45309; text-anchor: middle; }
            .box { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2; rx: 4; }
            .box-text { font-family: system-ui, sans-serif; font-size: 14px; fill: #4c1d95; text-anchor: middle; }
        </style>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6" />
        </marker>
        <marker id="arrow-sym" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
        </marker>
        
        <!-- Definitions for Icons used in diagram -->
        <g id="pub-key" transform="scale(0.8)">
            <rect x="8" y="14" width="16" height="12" rx="2" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <path d="M 11 14 V 9 A 5 5 0 0 1 21 9 V 14" fill="none" stroke="#0284c7" stroke-width="2"/>
        </g>
        <g id="priv-key" transform="scale(0.8)">
            <circle cx="10" cy="10" r="5" fill="none" stroke="#2563eb" stroke-width="2"/>
            <line x1="15" y1="10" x2="28" y2="10" stroke="#2563eb" stroke-width="2"/>
            <line x1="22" y1="10" x2="22" y2="14" stroke="#2563eb" stroke-width="2"/>
            <line x1="26" y1="10" x2="26" y2="14" stroke="#2563eb" stroke-width="2"/>
        </g>
        
        <!-- Premaster Secret (Pink Key) -->
        <g id="premaster-key" transform="scale(0.8)">
            <circle cx="10" cy="10" r="5" fill="#fbcfe8" stroke="#db2777" stroke-width="2"/>
            <line x1="15" y1="10" x2="28" y2="10" stroke="#db2777" stroke-width="2"/>
            <line x1="22" y1="10" x2="22" y2="14" stroke="#db2777" stroke-width="2"/>
        </g>

        <!-- Master Secret (Orange Key) -->
        <g id="master-key" transform="scale(0.8)">
            <circle cx="10" cy="10" r="6" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
            <line x1="16" y1="10" x2="30" y2="10" stroke="#ea580c" stroke-width="2"/>
            <line x1="22" y1="10" x2="22" y2="16" stroke="#ea580c" stroke-width="2"/>
            <line x1="26" y1="10" x2="26" y2="16" stroke="#ea580c" stroke-width="2"/>
        </g>

        <!-- Session Key (Yellow/Gold Key) -->
        <g id="session-key" transform="scale(0.8)">
            <circle cx="10" cy="10" r="6" fill="#fef08a" stroke="#d97706" stroke-width="2"/>
            <line x1="16" y1="10" x2="30" y2="10" stroke="#d97706" stroke-width="2"/>
            <line x1="22" y1="10" x2="22" y2="16" stroke="#d97706" stroke-width="2"/>
            <line x1="28" y1="10" x2="28" y2="16" stroke="#d97706" stroke-width="2"/>
        </g>

        <!-- Data Icon -->
        <g id="data-icon" transform="scale(0.8)">
            <rect x="0" y="0" width="20" height="26" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
            <path d="M 5 7 h 10 M 5 13 h 10 M 5 19 h 6" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
        </g>

        <!-- Asymmetric Ciphertext Icon -->
        <g id="ciphertext-icon" transform="scale(0.8)">
            <rect x="0" y="0" width="20" height="26" rx="2" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
            <path d="M 5 7 h 10 M 5 13 h 10 M 5 19 h 6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
            <rect x="10" y="14" width="14" height="10" rx="1.5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <path d="M 13 14 V 9 A 4 4 0 0 1 21 9 V 14" fill="none" stroke="#0284c7" stroke-width="2"/>
        </g>

        <!-- Symmetric Ciphertext Icon -->
        <g id="sym-ciphertext-icon" transform="scale(0.8)">
            <rect x="0" y="0" width="20" height="26" rx="2" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
            <path d="M 5 7 h 10 M 5 13 h 10 M 5 19 h 6" stroke="#fdba74" stroke-width="2" stroke-linecap="round"/>
            <rect x="10" y="14" width="14" height="10" rx="1.5" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
            <path d="M 13 14 V 9 A 4 4 0 0 1 21 9 V 14" fill="none" stroke="#d97706" stroke-width="2"/>
        </g>
    </defs>

    <rect width="800" height="780" fill="#ffffff" rx="12" />

    <!-- Actors -->
    <rect x="150" y="40" width="140" height="40" class="actor" />
    <text x="220" y="66" class="actor-text">Client (瀏覽器)</text>
    <line x1="220" y1="80" x2="220" y2="760" class="line" />

    <rect x="520" y="40" width="140" height="40" class="actor" />
    <text x="590" y="66" class="actor-text">Server (伺服器)</text>
    <line x1="590" y1="80" x2="590" y2="760" class="line" />

    <!-- Server Generates Keys -->
    <rect x="500" y="80" width="180" height="70" class="box" fill="#ecfdf5" stroke="#10b981" />
    <text x="590" y="100" class="box-text" fill="#065f46">生成一對：</text>
    <text x="590" y="117" class="box-text" fill="#065f46">公鑰 / 私鑰</text>
    <use href="#pub-key" x="545" y="125" />
    <use href="#priv-key" x="615" y="125" />

    <!-- Step 1: Send Public Key -->
    <path d="M 590 170 L 230 170" class="msg-line" marker-end="url(#arrow)" />
    <text x="410" y="160" class="msg-text">1. Server 傳遞公鑰 (啟動非對稱加密)</text>
    <use href="#pub-key" x="390" y="125" />

    <!-- Client Generates Premaster -->
    <rect x="120" y="190" width="200" height="40" class="box" />
    <text x="210" y="215" class="box-text">生出 Premaster Secret</text>
    <use href="#premaster-key" x="290" y="200" />

    <!-- Client Encrypts Premaster -->
    <rect x="80" y="240" width="280" height="60" class="box" />
    <text x="220" y="260" class="box-text">用「公鑰」將 Premaster Secret 鎖上</text>
    <use href="#pub-key" x="125" y="270" />
    <text x="160" y="285" class="box-text">+</text>
    <use href="#premaster-key" x="180" y="272" />
    <text x="215" y="285" class="box-text">→</text>
    <use href="#ciphertext-icon" x="240" y="270" />

    <!-- Step 2: Send Encrypted Secret -->
    <path d="M 220 330 L 590 330" class="msg-line" marker-end="url(#arrow)" />
    <text x="410" y="320" class="msg-text">2. [密文] 傳送被鎖住的 Premaster Secret</text>
    <use href="#ciphertext-icon" x="400" y="285" />

    <!-- Server Decrypts -->
    <rect x="480" y="350" width="220" height="60" class="box" />
    <text x="590" y="370" class="box-text">用「私鑰」解開獲得密鑰</text>
    <use href="#ciphertext-icon" x="500" y="380" />
    <text x="535" y="395" class="box-text">+</text>
    <use href="#priv-key" x="555" y="382" />
    <text x="590" y="395" class="box-text">→</text>
    <use href="#premaster-key" x="615" y="380" />

    <!-- Make Master Secret & Session Key -->
    <rect x="220" y="440" width="370" height="90" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="10" />
    <text x="405" y="465" class="sym-text">3. 雙方各自提煉出最終「Session Key」</text>
    
    <use href="#premaster-key" x="280" y="480" />
    <text x="320" y="495" class="sym-text">→</text>
    <use href="#master-key" x="340" y="480" />
    <text x="380" y="495" class="sym-text">→</text>
    <use href="#session-key" x="400" y="480" />
    
    <text x="270" y="515" class="sym-text" font-size="12">=</text>
    <text x="405" y="515" class="sym-text" font-size="12" text-anchor="start">Premaster ➔ Master ➔ Session Key</text>

    <!-- Fast HTTP Notification -->
    <rect x="180" y="550" width="450" height="40" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" rx="4" />
    <text x="405" y="575" class="sym-text" font-size="14">極速通訊：使用剛算好的 Session Key 來加密/解密！</text>

    <!-- Client sending data with Sym Encryption -->
    <path d="M 220 620 L 590 620" class="sym-line" marker-end="url(#arrow-sym)" />
    <text x="405" y="610" class="sym-text">HTTP 網頁傳輸 (Session Key 加密)</text>
    <use href="#data-icon" x="330" y="625" />
    <text x="365" y="640" class="sym-text">+</text>
    <use href="#session-key" x="385" y="625" />
    <text x="425" y="640" class="sym-text">→</text>
    <use href="#sym-ciphertext-icon" x="450" y="625" />

    <!-- Server sending data with Sym Encryption -->
    <path d="M 590 700 L 220 700" class="sym-line" marker-end="url(#arrow-sym)" />
    <text x="405" y="690" class="sym-text">HTTP 網頁傳輸 (Session Key 加密)</text>
    <use href="#data-icon" x="330" y="705" />
    <text x="365" y="720" class="sym-text">+</text>
    <use href="#session-key" x="385" y="705" />
    <text x="425" y="720" class="sym-text">→</text>
    <use href="#sym-ciphertext-icon" x="450" y="705" />

</svg>
